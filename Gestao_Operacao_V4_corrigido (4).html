        // ========== RELATÓRIOS ==========
        function Relatorios({ operacoes }) {
            const [dataInicio, setDataInicio] = useState('');
            const [dataFim, setDataFim] = useState('');
            const [operacaoSelecionada, setOperacaoSelecionada] = useState('');

            // Obter lista única de operações
            const listaOperacoes = useMemo(() => {
                const ops = [...new Set(operacoes.map(op => op.operacao))];
                return ops.sort();
            }, [operacoes]);

            const relatorioGeral = useMemo(() => {
                let ops = operacoes;
                if (dataInicio && dataFim) {
                    ops = operacoes.filter(op => op.data >= dataInicio && op.data <= dataFim);
                }

                const porOperacao = {};
                ops.forEach(op => {
                    if (!porOperacao[op.operacao]) {
                        porOperacao[op.operacao] = {
                            total: 0,
                            verde: 0,
                            vermelho: 0,
                            amarelo: 0,
                            nfTotal: 0,
                            volTotal: 0,
                            cubagemTotal: 0
                        };
                    }
                    porOperacao[op.operacao].total += 1;
                    porOperacao[op.operacao][op.status] += 1;
                    porOperacao[op.operacao].nfTotal += op.nf || 0;
                    porOperacao[op.operacao].volTotal += op.vol || 0;
                    porOperacao[op.operacao].cubagemTotal += op.cubagem || 0;
                });

                return porOperacao;
            }, [operacoes, dataInicio, dataFim]);

            const handleExportarExcel = () => {
                // Filtrar operações pelo período se necessário
                let ops = operacoes;
                if (dataInicio && dataFim) {
                    ops = operacoes.filter(op => op.data >= dataInicio && op.data <= dataFim);
                }
                
                // Filtrar por operação se selecionada
                if (operacaoSelecionada) {
                    ops = ops.filter(op => op.operacao === operacaoSelecionada);
                }

                // Criar dados para a planilha
                const dadosExcel = ops.map(op => ({
                    'Data': op.data,
                    'Operação': op.operacao,
                    'NF': op.nf || 0,
                    'Volumes': op.vol || 0,
                    'Cubagem': op.cubagem || 0,
                    'Início': op.inicio || '',
                    'Término': op.termino || '',
                    'Meta (min)': op.meta || 0,
                    'Status': op.status === 'verde' ? 'Verde' : op.status === 'vermelho' ? 'Vermelho' : 'Amarelo'
                }));

                // Criar workbook
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(dadosExcel);

                // Definir largura das colunas
                ws['!cols'] = [
                    { wch: 12 },  // Data
                    { wch: 25 },  // Operação
                    { wch: 8 },   // NF
                    { wch: 10 },  // Volumes
                    { wch: 10 },  // Cubagem
                    { wch: 10 },  // Início
                    { wch: 10 },  // Término
                    { wch: 12 },  // Meta
                    { wch: 12 }   // Status
                ];

                // Adicionar worksheet ao workbook
                XLSX.utils.book_append_sheet(wb, ws, 'Relatório');

                // Gerar nome do arquivo
                let nomeArquivo = 'Relatorio_Operacoes';
                if (operacaoSelecionada) {
                    nomeArquivo += `_${operacaoSelecionada.replace(/[^a-zA-Z0-9]/g, '_')}`;
                }
                if (dataInicio && dataFim) {
                    nomeArquivo += `_${dataInicio}_a_${dataFim}`;
                } else {
                    nomeArquivo += `_${new Date().toISOString().split('T')[0]}`;
                }
                nomeArquivo += '.xlsx';

                // Fazer download
                XLSX.writeFile(wb, nomeArquivo);
            };

            return (
                <div className="animate-slide-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold text-gray-800"><span className="icon-pulse inline-block">📈</span> Relatórios</h2>
                        <button
                            onClick={handleExportarExcel}
                            className="btn-animated bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold flex items-center gap-2 shadow-lg"
                        >
                            <span className="icon-bounce inline-block">📊</span>
                            Exportar Excel
                        </button>
                    </div>
                    
                    <div className="bg-blue-50 p-6 rounded-lg mb-6">
                        <h3 className="text-xl font-bold mb-4"><span className="icon-pulse inline-block">📅</span> Filtrar por Período e Operação</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label className="block text-sm font-bold mb-2">Data Início</label>
                                <input 
                                    type="date"
                                    value={dataInicio}
                                    onChange={(e) => setDataInicio(e.target.value)}
                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2">Data Fim</label>
                                <input 
                                    type="date"
                                    value={dataFim}
                                    onChange={(e) => setDataFim(e.target.value)}
                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2">Operação</label>
                                <select
                                    value={operacaoSelecionada}
                                    onChange={(e) => setOperacaoSelecionada(e.target.value)}
                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                                >
                                    <option value="">Todas as Operações</option>
                                    {listaOperacoes.map(op => (
                                        <option key={op} value={op}>{op}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow-lg overflow-hidden">
                        <div className="bg-gradient-to-r from-purple-600 to-blue-600 p-4">
                            <h3 className="text-xl font-bold text-white"><span className="icon-bounce inline-block">📊</span> Resumo por Operação</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-gray-100">
                                    <tr>
                                        <th className="px-4 py-3 text-left">Operação</th>
                                        <th className="px-4 py-3 text-left">Total</th>
                                        <th className="px-4 py-3 text-left"><span className="icon-bounce inline-block">✅</span> Verde</th>
                                        <th className="px-4 py-3 text-left"><span className="icon-swing inline-block">❌</span> Vermelho</th>
                                        <th className="px-4 py-3 text-left"><span className="icon-pulse inline-block">⏳</span> Amarelo</th>
                                        <th className="px-4 py-3 text-left">Taxa Sucesso</th>
                                        <th className="px-4 py-3 text-left">Total NF</th>
                                        <th className="px-4 py-3 text-left">Total Vol</th>
                                        <th className="px-4 py-3 text-left">Total Cubagem</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {Object.entries(relatorioGeral).map(([operacao, dados]) => {
                                        const taxa = dados.total > 0 ? ((dados.verde / dados.total) * 100).toFixed(1) : 0;
                                        return (
                                            <tr key={operacao} className="border-b hover:bg-gray-50">
                                                <td className="px-4 py-3 font-bold">{operacao}</td>
                                                <td className="px-4 py-3">{dados.total}</td>
                                                <td className="px-4 py-3 text-green-600 font-bold">{dados.verde}</td>
                                                <td className="px-4 py-3 text-red-600 font-bold">{dados.vermelho}</td>
                                                <td className="px-4 py-3 text-yellow-600 font-bold">{dados.amarelo}</td>
                                                <td className="px-4 py-3">
                                                    <span className={`px-3 py-1 rounded-full text-white text-sm font-bold ${
                                                        taxa >= 80 ? 'bg-green-500' : taxa >= 50 ? 'bg-yellow-500' : 'bg-red-500'
                                                    }`}>
                                                        {taxa}%
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3">{dados.nfTotal}</td>
                                                <td className="px-4 py-3">{dados.volTotal}</td>
                                                <td className="px-4 py-3">{dados.cubagemTotal.toFixed(2)}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ========== UPLOAD & BACKUP ==========
        function UploadBackup({ db, operacoes, listaOperacoes, onUpdate, onSalvarLista }) {
            // ── Estados Upload Excel ──
            const [upFile,       setUpFile]       = useState(null);
            const [upStatus,     setUpStatus]     = useState('');
            const [upDrag,       setUpDrag]       = useState(false);
            const [upPreview,    setUpPreview]    = useState([]);
            const [upCols,       setUpCols]       = useState([]);
            const [upMap,        setUpMap]        = useState({});
            const [upStep,       setUpStep]       = useState('idle'); // idle|preview|importing|done
            const [upMode,       setUpMode]       = useState('substituir'); // substituir|adicionar
            const upRef = useRef(null);

            // ── Estados Backup ──
            const [bkPastaHandle,   setBkPastaHandle]   = useState(null);
            const [bkPastaNome,     setBkPastaNome]      = useState(() => { try { return localStorage.getItem('bk_pasta_nome') || ''; } catch(e) { return ''; } });
            const [bkStatus,        setBkStatus]         = useState('');
            const [bkHorario,       setBkHorario]        = useState(() => { try { return localStorage.getItem('bk_horario') || '00:00'; } catch(e) { return '00:00'; } });
            const [bkAtivo,         setBkAtivo]          = useState(() => { try { return localStorage.getItem('bk_ativo') === 'true'; } catch(e) { return false; } });
            const [bkUltimoLog,     setBkUltimoLog]      = useState(() => { try { return localStorage.getItem('bk_ultimo_log') || ''; } catch(e) { return ''; } });
            const [bkContagem,      setBkContagem]       = useState('');
            const [bkNeedRelink,    setBkNeedRelink]     = useState(() => { try { return localStorage.getItem('bk_pasta_nome') ? true : false; } catch(e) { return false; } });
            const bkTimer = useRef(null);
            const bkPastaRef = useRef(null);
            const bkHorarioRef = useRef(() => { try { return localStorage.getItem('bk_horario') || '00:00'; } catch(e) { return '00:00'; } });
            const bkAtivoRef = useRef(() => { try { return localStorage.getItem('bk_ativo') === 'true'; } catch(e) { return false; } });

            // Campos do sistema (destino do mapeamento)
            const CAMPOS_SISTEMA = [
                { key: '__ignorar', label: '— Ignorar coluna —' },
                { key: 'data',      label: '📅 Data' },
                { key: 'operacao',  label: '🏷️ Operação' },
                { key: 'inicio',    label: '🕐 Início' },
                { key: 'fim',       label: '🕔 Fim' },
                { key: 'turno',     label: '☀️ Turno' },
                { key: 'nf',        label: '📄 NF' },
                { key: 'volumes',   label: '📦 Volumes' },
                { key: 'separadores', label: '👤 Separadores' },
                { key: 'conferentes', label: '✔️ Conferentes' },
                { key: 'auxiliares',  label: '🙌 Auxiliares' },
                { key: 'status',    label: '🔖 Status' },
                { key: 'obs',       label: '💬 Observações' },
            ];

            // ── Ler Excel ──
            const lerArquivo = (file) => {
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (!['xlsx','xls','csv'].includes(ext)) {
                    setUpStatus('err|❌ Formato inválido. Use .xlsx, .xls ou .csv'); return;
                }
                setUpFile(file);
                setUpStatus('load|⏳ Lendo arquivo...');
                setUpStep('idle');
                setUpPreview([]);
                setUpCols([]);
                setUpMap({});

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        let rows = [];
                        if (ext === 'csv') {
                            const text = new TextDecoder('utf-8').decode(e.target.result);
                            const lines = text.split('\n').filter(l=>l.trim());
                            rows = lines.map(l => l.split(';').map(c=>c.replace(/"/g,'').trim()));
                        } else {
                            const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'dd/mm/yyyy' });
                        }
                        rows = rows.filter(r => r.some(c => c !== null && c !== undefined && c !== ''));
                        if (rows.length < 2) { setUpStatus('err|⚠️ Planilha vazia ou sem dados.'); return; }

                        const header = rows[0].map(h => String(h||'').trim());
                        const dataRows = rows.slice(1).map(r =>
                            Object.fromEntries(header.map((h,i) => [h, r[i] !== undefined ? String(r[i]||'').trim() : '']))
                        );

                        // Auto-mapear colunas por similaridade
                        const autoMap = {};
                        const patterns = {
                            data:        /data|date|dt/i,
                            operacao:    /opera|oper|nome|descri/i,
                            inicio:      /inicio|in[ií]cio|start|hora.?ini/i,
                            fim:         /fim|end|termino|término|hora.?fim/i,
                            turno:       /turno|shift/i,
                            nf:          /nf|nota.?fiscal|notas?$/i,
                            volumes:     /vol(ume)?s?|qtd|quantidade|pcs|peças/i,
                            separadores: /sep(arador)?es?|separ/i,
                            conferentes: /conf(erente)?s?|confer/i,
                            auxiliares:  /aux(iliar)?es?|aux/i,
                            status:      /status|situa/i,
                            obs:         /obs|observa|coment/i,
                        };
                        header.forEach(h => {
                            const match = Object.entries(patterns).find(([,rx]) => rx.test(h));
                            autoMap[h] = match ? match[0] : '__ignorar';
                        });

                        setUpCols(header);
                        setUpMap(autoMap);
                        setUpPreview(dataRows.slice(0, 5));
                        setUpStep('preview');
                        setUpStatus('ok|✅ Arquivo lido! Verifique o mapeamento abaixo e clique em Importar.');
                    } catch(err) {
                        setUpStatus('err|❌ Erro ao ler: ' + err.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const onDrop = e => { e.preventDefault(); setUpDrag(false); lerArquivo(e.dataTransfer.files[0]); };
            const onFileChange = e => { lerArquivo(e.target.files[0]); e.target.value=''; };

            // ── Importar para o sistema ──
            const executarImport = async () => {
                setUpStep('importing');
                setUpStatus('load|⏳ Importando dados...');
                try {
                    // Re-ler o arquivo completo
                    const ext = upFile.name.split('.').pop().toLowerCase();
                    const buffer = await upFile.arrayBuffer();
                    let rows = [];
                    if (ext === 'csv') {
                        const text = new TextDecoder('utf-8').decode(buffer);
                        const lines = text.split('\n').filter(l=>l.trim());
                        rows = lines.map(l => l.split(';').map(c=>c.replace(/"/g,'').trim()));
                    } else {
                        const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'dd/mm/yyyy' });
                    }
                    rows = rows.filter(r => r.some(c => c !== null && c !== undefined && c !== ''));
                    const header = rows[0].map(h => String(h||'').trim());
                    const dataRows = rows.slice(1);

                    const operacoesNovas = dataRows.map(r => {
                        const obj = {};
                        header.forEach((h, i) => {
                            const destino = upMap[h];
                            if (destino && destino !== '__ignorar') {
                                obj[destino] = String(r[i] || '').trim();
                            }
                        });
                        return obj;
                    }).filter(o => Object.keys(o).length > 0);

                    if (upMode === 'substituir') await db.clearAll();
                    let ok = 0;
                    for (const op of operacoesNovas) {
                        try { await db.addOperacao(op); ok++; } catch(e) {}
                    }
                    await onUpdate(db);
                    setUpStep('done');
                    setUpStatus(`ok|✅ ${ok} registros importados com sucesso! ${upMode==='substituir'?'(dados anteriores substituídos)':'(adicionados aos existentes)'}`);
                    setTimeout(() => setUpStatus(''), 8000);
                } catch(err) {
                    setUpStatus('err|❌ Erro na importação: ' + err.message);
                    setUpStep('preview');
                }
            };

            // ── Backup Automático ──
            useEffect(() => { bkHorarioRef.current = bkHorario; try { localStorage.setItem('bk_horario', bkHorario); } catch(e) {} }, [bkHorario]);
            useEffect(() => { bkAtivoRef.current = bkAtivo;     try { localStorage.setItem('bk_ativo', String(bkAtivo)); } catch(e) {} }, [bkAtivo]);
            useEffect(() => { bkPastaRef.current = bkPastaHandle; }, [bkPastaHandle]);

            const calcProximoBackup = (horario) => {
                const [h, m] = horario.split(':').map(Number);
                const agora = new Date();
                const alvo = new Date();
                alvo.setHours(h, m, 0, 0);
                if (alvo <= agora) alvo.setDate(alvo.getDate() + 1);
                const diff = alvo - agora;
                const hh = Math.floor(diff / 3600000);
                const mm = Math.floor((diff % 3600000) / 60000);
                const ss = Math.floor((diff % 60000) / 1000);
                return { diff, texto: `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}` };
            };

            const executarBackup = async (pasta, nome, ops) => {
                try {
                    const dados = {
                        __versao: '2.0',
                        __sistema: 'Gestao_Operacoes',
                        geradoEm: new Date().toISOString(),
                        totalOperacoes: ops.length,
                        operacoes: ops,
                        listaOperacoes: listaOperacoes,
                    };
                    const json  = JSON.stringify(dados, null, 2);
                    const blob  = new Blob([json], { type: 'application/json' });

                    // Tenta gravar no diretório vinculado (File System Access API)
                    if (pasta) {
                        try {
                            const nomeArq = nome || 'backup_operacoes.json';
                            const fh = await pasta.getFileHandle(nomeArq, { create: true });
                            const ws = await fh.createWritable();
                            await ws.write(blob);
                            await ws.close();
                            return `✅ Backup salvo em "${nomeArq}" (${new Date().toLocaleString('pt-BR')})`;
                        } catch(e) {
                            // fallback: download
                        }
                    }
                    // Fallback: download automático
                    const url  = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href  = url;
                    link.download = nome || `backup_operacoes_${new Date().toISOString().split('T')[0]}.json`;
                    link.click();
                    URL.revokeObjectURL(url);
                    return `✅ Backup baixado (${new Date().toLocaleString('pt-BR')})`;
                } catch(err) {
                    return `❌ Erro no backup: ${err.message}`;
                }
            };

            // Timer que dispara backup
            useEffect(() => {
                if (bkTimer.current) clearInterval(bkTimer.current);
                if (!bkAtivo) { setBkContagem(''); return; }

                bkTimer.current = setInterval(async () => {
                    const { diff, texto } = calcProximoBackup(bkHorarioRef.current);
                    setBkContagem(texto);
                    if (diff < 2000) {
                        // É hora! Executa backup
                        const db2 = bkPastaRef.current;
                        const resultado = await executarBackup(db2, 'backup_operacoes.json', operacoes);
                        setBkUltimoLog(resultado);
                        try { localStorage.setItem('bk_ultimo_log', resultado); } catch(e) {}
                        setBkStatus(resultado.startsWith('✅') ? 'ok|' + resultado : 'err|' + resultado);
                        setTimeout(() => setBkStatus(''), 6000);
                        // Recalcular para amanhã
                        await new Promise(r => setTimeout(r, 3000));
                    }
                }, 1000);

                return () => clearInterval(bkTimer.current);
            }, [bkAtivo, bkHorario]);

            const vincularPastaBackup = async () => {
                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setBkPastaHandle(handle);
                    setBkPastaNome(handle.name);
                    setBkNeedRelink(false);
                    try { localStorage.setItem('bk_pasta_nome', handle.name); } catch(e) {}
                    setBkStatus('ok|✅ Pasta vinculada: ' + handle.name);
                    setTimeout(() => setBkStatus(''), 4000);
                } catch(e) {
                    if (e.name !== 'AbortError') setBkStatus('err|❌ Erro ao vincular pasta: ' + e.message);
                }
            };

            const fazerBackupAgora = async () => {
                setBkStatus('load|⏳ Gerando backup...');
                const resultado = await executarBackup(bkPastaHandle, 'backup_operacoes.json', operacoes);
                setBkUltimoLog(resultado);
                try { localStorage.setItem('bk_ultimo_log', resultado); } catch(e) {}
                setBkStatus(resultado.startsWith('✅') ? 'ok|' + resultado : 'err|' + resultado);
                setTimeout(() => setBkStatus(''), 6000);
            };

            // ── Renderização de status ──
            const renderStatus = (raw) => {
                if (!raw) return null;
                const [kind, ...rest] = raw.split('|');
                const text = rest.join('|');
                const cfg = {
                    ok:   { bg:'#d1fae5', cl:'#065f46' },
                    err:  { bg:'#fee2e2', cl:'#991b1b' },
                    warn: { bg:'#fef3c7', cl:'#92400e' },
                    load: { bg:'#e0e7ff', cl:'#3730a3' },
                }[kind] || { bg:'#f3f4f6', cl:'#374151' };
                return (
                    <div style={{padding:'10px 14px',borderRadius:'8px',background:cfg.bg,color:cfg.cl,fontWeight:'600',fontSize:'13px',display:'flex',alignItems:'center',gap:'8px',marginTop:'10px'}}>
                        {kind==='load' && <span style={{display:'inline-block',animation:'rotate 1s linear infinite',fontSize:'16px'}}>⏳</span>}
                        {text}
                    </div>
                );
            };

            const hasPastaSupport = 'showDirectoryPicker' in window;

            return (

                    {/* ══════════════════════════════════════════════

                    <div style={{border:'2px solid #bbf7d0',borderRadius:'16px',overflow:'hidden'}}>

                            <div style={{display:'flex',gap:'20px',flexWrap:'wrap',alignItems:'flex-end'}}>
                                <div style={{flex:'1',minWidth:'180px'}}>

                                    <input
                                        type="time"
                                        value={bkHorario}
                                        onChange={e=>setBkHorario(e.target.value)}
                                        style={{width:'100%',padding:'10px 14px',border:'2px solid #d1fae5',borderRadius:'8px',fontSize:'16px',fontFamily:'monospace',fontWeight:'700',color:'#065f46',outline:'none',boxSizing:'border-box'}}
                                    />
                                </div>
                                <div style={{flex:'2',minWidth:'220px'}}>

                                    <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                                        <div style={{flex:'1',padding:'10px 14px',border:'2px solid #d1fae5',borderRadius:'8px',fontSize:'13px',fontWeight:'600',color:bkPastaHandle?'#065f46':'#9ca3af',background:'#f0fdf4',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                                            {bkPastaHandle ? '📂 ' + bkPastaNome : '— Nenhuma pasta vinculada (usará download) —'}
                                        </div>
                                        {hasPastaSupport ? (
                                            <button onClick={vincularPastaBackup} style={{background:'linear-gradient(135deg,#059669,#10b981)',color:'white',border:'none',borderRadius:'8px',padding:'10px 16px',fontWeight:'700',fontSize:'12px',cursor:'pointer',whiteSpace:'nowrap'}}>
                                                {bkPastaHandle?'🔄 Trocar':'📁 Vincular Pasta'}

                                        ) : (
                                            <span style={{fontSize:'11px',color:'#ef4444',fontWeight:'600'}}>⚠️ Use Chrome/Edge</span>
                                        )}
                                        {bkPastaHandle && (
                                            <button onClick={()=>{
                                                setBkPastaHandle(null);
                                                setBkPastaNome('');
                                                setBkNeedRelink(false);
                                                try { localStorage.removeItem('bk_pasta_nome'); } catch(e) {}
                                            }} style={{background:'#ef4444',color:'white',border:'none',borderRadius:'8px',padding:'10px 12px',fontWeight:'700',fontSize:'12px',cursor:'pointer'}}>🗑️</button>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Controles */}
                            <div style={{display:'flex',gap:'10px',flexWrap:'wrap',alignItems:'center'}}>
                                <button
                                    onClick={()=>setBkAtivo(!bkAtivo)}
                                    style={{background:bkAtivo?'linear-gradient(135deg,#dc2626,#ef4444)':'linear-gradient(135deg,#059669,#10b981)',color:'white',border:'none',borderRadius:'10px',padding:'12px 24px',fontWeight:'800',fontSize:'14px',cursor:'pointer',boxShadow:`0 4px 12px ${bkAtivo?'rgba(220,38,38,0.35)':'rgba(5,150,105,0.35)'}`}}
                                >
                                    {bkAtivo ? '⏹️ Desativar Backup Auto' : '▶️ Ativar Backup Auto'}
                                </button>
                                <button
                                    onClick={fazerBackupAgora}
                                    style={{background:'linear-gradient(135deg,#1e40af,#3b82f6)',color:'white',border:'none',borderRadius:'10px',padding:'12px 24px',fontWeight:'700',fontSize:'14px',cursor:'pointer',boxShadow:'0 4px 12px rgba(30,64,175,0.3)'}}
                                >
                                    💾 Fazer Backup Agora
                                </button>
                            </div>

                            {/* Painel de status */}
                            {bkAtivo && (
                                <div style={{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:'12px',padding:'16px 20px',display:'flex',gap:'24px',flexWrap:'wrap'}}>
                                    <div style={{textAlign:'center'}}>
                                        <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'4px'}}>Próximo backup em</div>
                                        <div style={{fontSize:'24px',fontWeight:'900',color:'#059669',fontFamily:'monospace'}}>{bkContagem || '...'}</div>
                                    </div>
                                    <div style={{textAlign:'center'}}>
                                        <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'4px'}}>Horário configurado</div>

                                    <div style={{textAlign:'center'}}>
                                        <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'4px'}}>Total de registros</div>

                                    </div>

                                        <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'4px'}}>Destino</div>
                                        <div style={{fontSize:'13px',fontWeight:'700',color:'#065f46'}}>{bkPastaHandle ? '📂 ' + bkPastaNome : '⬇️ Download automático'}</div>

                            {renderStatus(bkStatus)}

                            {bkUltimoLog && (
                                <div style={{fontSize:'12px',color:'#6b7280',padding:'8px 12px',background:'#f9fafb',borderRadius:'8px',border:'1px solid #e5e7eb'}}>

                                </div>

                            {/* Info */}

                                <strong>ℹ️ Como funciona:</strong> O backup salva <strong>todos os dados do sistema</strong> (operações cadastradas + lista de operações configuradas) em um arquivo JSON com identificador de versão.<br/>
                                Se uma pasta estiver vinculada, o arquivo <code>backup_operacoes.json</code> será <strong>substituído</strong> a cada backup.
                                Sem pasta vinculada, o arquivo é baixado automaticamente.
                                <strong> Mantenha esta aba aberta</strong> para o backup automático funcionar.
                            </div>

                    {/* ══════════════════════════════════════════════
                        SEÇÃO 3: RESTAURAR BACKUP
                    ══════════════════════════════════════════════ */}
                    {(() => {
                        const [restFile, setRestFile] = React.useState(null);
                        const [restStatus, setRestStatus] = React.useState('');
                        const [restPreview, setRestPreview] = React.useState(null);
                        const restRef = React.useRef(null);

                        const lerBackup = (file) => {
                            if (!file) return;
                            if (!file.name.endsWith('.json')) { setRestStatus('err|❌ Selecione um arquivo .json de backup.'); return; }
                            setRestFile(file);
                            setRestStatus('load|⏳ Lendo arquivo de backup...');
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                try {
                                    const dados = JSON.parse(e.target.result);
                                    if (!dados.__sistema || dados.__sistema !== 'Gestao_Operacoes') {
                                        setRestStatus('err|❌ Arquivo inválido. Este não é um backup deste sistema.');
                                        return;
                                    }
                                    setRestPreview(dados);
                                    setRestStatus('ok|✅ Backup reconhecido! Clique em "Restaurar" para aplicar.');
                                } catch(err) {
                                    setRestStatus('err|❌ Arquivo corrompido ou inválido: ' + err.message);
                                }
                            };
                            reader.readAsText(file);
                        };

                        const executarRestauracao = async () => {
                            if (!restPreview) return;
                            if (!confirm(`⚠️ Isso vai SUBSTITUIR todos os dados atuais do sistema pelos dados do backup de ${new Date(restPreview.geradoEm).toLocaleString('pt-BR')}.\n\nDeseja continuar?`)) return;
                            setRestStatus('load|⏳ Restaurando sistema...');
                            try {
                                // Restaurar operacoes
                                await db.clearAll();
                                for (const op of (restPreview.operacoes || [])) {
                                    const { id, ...opSemId } = op;
                                    await db.addOperacao(opSemId);
                                }
                                // Restaurar lista de operações configuradas
                                if (restPreview.listaOperacoes) {
                                    await onSalvarLista(restPreview.listaOperacoes);
                                }
                                await onUpdate(db);
                                setRestStatus(`ok|✅ Sistema restaurado! ${(restPreview.operacoes||[]).length} operações e ${(restPreview.listaOperacoes||[]).length} tipos de operação restaurados.`);
                                setRestPreview(null);
                                setRestFile(null);
                                setTimeout(() => setRestStatus(''), 7000);
                            } catch(err) {
                                setRestStatus('err|❌ Erro na restauração: ' + err.message);
                            }
                        };

                        const renderSt = (raw) => {
                            if (!raw) return null;
                            const [k, ...r] = raw.split('|');
                            const text = r.join('|');
                            const cfg = {ok:{bg:'#d1fae5',cl:'#065f46'},err:{bg:'#fee2e2',cl:'#991b1b'},load:{bg:'#e0e7ff',cl:'#3730a3'}}[k]||{bg:'#f3f4f6',cl:'#374151'};
                            return <div style={{padding:'10px 14px',borderRadius:'8px',background:cfg.bg,color:cfg.cl,fontWeight:'600',fontSize:'13px',display:'flex',alignItems:'center',gap:'8px',marginTop:'10px'}}>
                                {k==='load'&&<span style={{display:'inline-block',animation:'rotate 1s linear infinite',fontSize:'16px'}}>⏳</span>}
                                {text}
                            </div>;
                        };

                        return (
                            <div style={{border:'2px solid #fbbf24',borderRadius:'16px',overflow:'hidden',marginTop:'24px'}}>
                                <div style={{background:'linear-gradient(135deg,#d97706,#f59e0b)',padding:'14px 20px',display:'flex',alignItems:'center',gap:'12px'}}>
                                    <span style={{fontSize:'22px'}}>🔄</span>
                                    <div>
                                        <div style={{color:'white',fontWeight:'800',fontSize:'16px'}}>Restaurar Sistema a partir de Backup</div>
                                        <div style={{color:'rgba(255,255,255,0.85)',fontSize:'12px'}}>Carregue um arquivo .json gerado por este sistema para restaurar tudo exatamente como estava</div>
                                    </div>
                                </div>
                                <div style={{padding:'20px',background:'white',display:'flex',flexDirection:'column',gap:'14px'}}>

                                    <div

        // ========== CONFIGURAÇÕES ==========
        function Configuracoes({ db, operacoes, onUpdate }) {
            const [mensagem, setMensagem] = useState('');
            const [usuariosPresenca, setUsuariosPresenca] = useState([]);

            // Listener de presença em tempo real
            useEffect(() => {
                if (!window.__firebaseReady) return;
                const { collection, onSnapshot } = window.__firebaseFns;
                const fsDb = window.__firebaseDb;
                const unsubscribe = onSnapshot(
                    collection(fsDb, 'presenca'),
                    (snapshot) => {
                        const agora = Date.now();
                        const lista = snapshot.docs.map(d => {
                            const data = d.data();
                            const ultima = data.ultimaAtividade ? new Date(data.ultimaAtividade).getTime() : 0;
                            const ativo = data.online && (agora - ultima) < 90000;
                            return {
                                uid: d.id,
                                email: data.email || 'Desconhecido',
                                online: ativo,
                                ultimaAtividade: data.ultimaAtividade
                            };
                        }).sort((a, b) => b.online - a.online);
                        setUsuariosPresenca(lista);
                    }
                );
                return () => unsubscribe();
            }, []);

            const handleExportarJSON = () => {
                const dataStr = JSON.stringify(operacoes, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `operacoes_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                setMensagem('✅ Dados exportados com sucesso!');
                setTimeout(() => setMensagem(''), 3000);
            };

            const handleImportarJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const dados = JSON.parse(event.target.result);
                        await db.clearAll();
                        for (const op of dados) {
                            const { id, ...opSemId } = op;
                            await db.addOperacao(opSemId);
                        }
                        onUpdate(db);
                        setMensagem('✅ Dados importados com sucesso!');
                        setTimeout(() => setMensagem(''), 3000);
                    } catch (error) {
                        setMensagem('❌ Erro ao importar dados!');
                    }
                };
                reader.readAsText(file);
            };

            const handleLimparDados = async () => {
                if (confirm('⚠️ ATENÇÃO! Isso irá deletar TODOS os dados. Deseja continuar?')) {
                    await db.clearAll();
                    onUpdate(db);
                    setMensagem('✅ Todos os dados foram removidos!');
                    setTimeout(() => setMensagem(''), 3000);
                }
            };

            return (
                <div className="animate-slide-in">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800"><span className="icon-rotate inline-block">⚙️</span> Configurações</h2>
                    
                    {mensagem && (
                        <div className={`p-4 rounded-lg mb-4 ${
                            mensagem.includes('sucesso') || mensagem.includes('removidos') ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
                        }`}>
                            {mensagem}
                        </div>
                    )}

                    <div className="space-y-4">
                        <div className="bg-white p-6 rounded-lg shadow-lg">
                            <h3 className="text-xl font-bold mb-4">📤 Exportar Dados</h3>
                            <p className="text-gray-600 mb-4">Faça backup dos seus dados em formato JSON</p>
                            <button 
                                onClick={handleExportarJSON}
                                className="bg-blue-500 text-white font-bold px-6 py-3 rounded-lg hover:bg-blue-600 btn-animated"
                            >
                                💾 Exportar JSON
                            </button>
                        </div>

                        <div className="bg-white p-6 rounded-lg shadow-lg">
                            <h3 className="text-xl font-bold mb-4">📥 Importar Dados</h3>
                            <p className="text-gray-600 mb-4">Restaure dados de um arquivo JSON (substituirá todos os dados atuais)</p>
                            <input 
                                type="file"
                                accept=".json"
                                onChange={handleImportarJSON}
                                className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                            />
                        </div>

                        <div className="bg-red-50 p-6 rounded-lg shadow-lg border-2 border-red-200">
                            <h3 className="text-xl font-bold mb-4 text-red-700">🗑️ Zona de Perigo</h3>
                            <p className="text-red-600 mb-4">Esta ação é IRREVERSÍVEL e deletará TODOS os dados!</p>
                            <button 
                                onClick={handleLimparDados}
                                className="bg-red-500 text-white font-bold px-6 py-3 rounded-lg hover:bg-red-600 btn-animated"
                            >
                                ⚠️ Limpar Todos os Dados
                            </button>
                        </div>

                        <div className="bg-white p-6 rounded-lg shadow-lg">
                            <h3 className="text-xl font-bold mb-4">ℹ️ Informações do Sistema</h3>
                            <div className="space-y-2 text-gray-700">
                                <p><strong>Total de Operações:</strong> {operacoes.length}</p>
                                <p><strong>Versão:</strong> 1.0 - Com Filtros Avançados</p>
                                <p><strong>Última Atualização:</strong> {new Date().toLocaleDateString('pt-BR')}</p>
                                <p className="flex items-center gap-2"><strong>Sincronização:</strong> <span style={{display:'inline-flex',alignItems:'center',gap:'5px',color:'#10b981',fontWeight:'700'}}><span style={{width:8,height:8,borderRadius:'50%',background:'#10b981',display:'inline-block',animation:'pulse 2s infinite'}}></span> Tempo Real (onSnapshot)</span></p>
                            </div>
                        </div>

                        {/* PAINEL DE USUÁRIOS ONLINE */}
                        <div className="bg-white p-6 rounded-lg shadow-lg">
                            <h3 className="text-xl font-bold mb-1 flex items-center gap-2">
                                👥 Monitoramento de Usuários
                                <span style={{background:'#dcfce7',color:'#16a34a',fontSize:'12px',fontWeight:'700',padding:'2px 10px',borderRadius:'99px',marginLeft:'4px'}}>
                                    {usuariosPresenca.filter(u => u.online).length} online
                                </span>
                            </h3>
                            <p className="text-gray-500 text-sm mb-4">Usuários conectados ao sistema agora (atualização em tempo real).</p>
                            {usuariosPresenca.length === 0 ? (
                                <p className="text-gray-400 italic text-sm">Nenhum registro de presença encontrado. Os usuários aparecerão aqui ao logar.</p>
                            ) : (
                                <div className="space-y-2">
                                    {usuariosPresenca.map(u => {
                                        const ultimaStr = u.ultimaAtividade
                                            ? new Date(u.ultimaAtividade).toLocaleString('pt-BR', {timeZone:'America/Sao_Paulo'})
                                            : '—';
                                        return (
                                            <div key={u.uid} style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',borderRadius:'10px',background: u.online ? '#f0fdf4' : '#f9fafb',border:`1.5px solid ${u.online ? '#bbf7d0' : '#e5e7eb'}`}}>
                                                <div style={{width:10,height:10,borderRadius:'50%',background: u.online ? '#10b981' : '#d1d5db',flexShrink:0,boxShadow: u.online ? '0 0 0 3px rgba(16,185,129,0.2)' : 'none'}}></div>
                                                <div style={{flex:1}}>
                                                    <div style={{fontWeight:'700',fontSize:'13px',color:'#1f2937'}}>{u.email}</div>
                                                    <div style={{fontSize:'11px',color:'#6b7280'}}>Última atividade: {ultimaStr}</div>
                                                </div>
                                                <span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'99px',background: u.online ? '#dcfce7' : '#f3f4f6',color: u.online ? '#16a34a' : '#9ca3af'}}>
                                                    {u.online ? '🟢 Online' : '⚫ Offline'}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ========== ANÁLISE DE CAPACIDADE ==========

        // ========== COMPONENTE: GRÁFICOS DE ANÁLISE DO DIMENSIONAMENTO ==========
        function DiagCharts({ totalNF, totalVol, sepP, confP, auxP, sepNecessarios, confNecessarios,
            nfPorSeparadorDia, volPorSeparadorDia, nfPorConferenteDia, volPorConferenteDia,
            TURNO_HORAS, horaTurnoInicio, horaTurnoFim, horasDesconto, dadosPorDia, diag }) {

            const refDist   = useRef(null); const instDist   = useRef(null);
            const refUtil   = useRef(null); const instUtil   = useRef(null);
            const refHora   = useRef(null); const instHora   = useRef(null);
            const refDonut  = useRef(null); const instDonut  = useRef(null);
            const refCenario= useRef(null); const instCenario= useRef(null);
            const refTrend  = useRef(null); const instTrend  = useRef(null);

            const destroy = (r) => { if(r.current){r.current.destroy();r.current=null;} };

            const parseH = (s) => { if(!s||!s.includes(':'))return 0; const[h,m]=s.split(':').map(Number);return h+m/60; };

            // ── Gráfico 1: Distribuição da equipe (Donut) ──
            useEffect(()=>{
                destroy(instDonut);
                if(!refDonut.current) return;
                const ctx = refDonut.current.getContext('2d');
                const hasPeople = sepP>0||confP>0||auxP>0;
                const data = hasPeople
                    ? [sepP, confP, auxP].filter((_,i)=>([sepP,confP,auxP][i])>0)
                    : [sepNecessarios, confNecessarios, 0].filter(v=>v>0);
                const labels = hasPeople
                    ? ['Separadores','Conferentes','Auxiliares'].filter((_,i)=>([sepP,confP,auxP][i])>0)
                    : ['Sep. Necessários','Conf. Necessários'].filter((_,i)=>([sepNecessarios,confNecessarios][i])>0);
                instDonut.current = new Chart(ctx, {
                    type:'doughnut',
                    data:{ labels, datasets:[{ data, backgroundColor:['#6366f1cc','#0ea5e9cc','#8b5cf6cc'], borderColor:['#6366f1','#0ea5e9','#8b5cf6'], borderWidth:2, hoverOffset:8 }] },
                    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
                        plugins:{ legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},
                            datalabels:{display:true,color:'white',font:{size:13,weight:'900'},formatter:(v,ctx)=>{
                                const total=ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
                                return total>0?Math.round((v/total)*100)+'%':'';
                            }}
                        }
                    },
                    plugins:[ChartDataLabels]
                });
            },[sepP,confP,auxP,sepNecessarios,confNecessarios]);

            // ── Gráfico 2: Utilização da capacidade — barras horizontais ──
            useEffect(()=>{
                destroy(instUtil);
                if(!refUtil.current||(totalNF===0&&totalVol===0)) return;
                const ctx = refUtil.current.getContext('2d');
                const effSep = sepP>0?sepP:sepNecessarios;
                const effConf = confP>0?confP:confNecessarios;
                const capNF = effSep * nfPorSeparadorDia + auxP * nfPorSeparadorDia * 0.7;
                const capVol = effSep * volPorSeparadorDia + auxP * volPorSeparadorDia * 0.7;
                const capConfNF = effConf * nfPorConferenteDia;
                const capConfVol = effConf * volPorConferenteDia;
                const pcts = [
                    capNF>0?Math.min(Math.round((totalNF/capNF)*100),150):0,
                    capVol>0?Math.min(Math.round((totalVol/capVol)*100),150):0,
                    capConfNF>0?Math.min(Math.round((totalNF/capConfNF)*100),150):0,
                    capConfVol>0?Math.min(Math.round((totalVol/capConfVol)*100),150):0,
                ];
                instUtil.current = new Chart(ctx,{
                    type:'bar',
                    data:{
                        labels:['NF (Sep.)','Vol (Sep.)','NF (Conf.)','Vol (Conf.)'],
                        datasets:[{
                            label:'Utilização (%)',
                            data:pcts,
                            backgroundColor:pcts.map(p=>p>=100?'#ef444499':p>=80?'#f59e0b99':'#10b98199'),
                            borderColor:pcts.map(p=>p>=100?'#ef4444':p>=80?'#f59e0b':'#10b981'),
                            borderWidth:2, borderRadius:8
                        }]
                    },
                    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
                        plugins:{ legend:{display:false},
                            datalabels:{display:true,align:'end',anchor:'end',color:'#374151',font:{size:11,weight:'700'},formatter:v=>v+'%'}
                        },
                        scales:{
                            x:{beginAtZero:true,max:160,grid:{color:'#f1f5f9'},ticks:{callback:v=>v+'%',font:{size:10}},border:{display:false}},
                            y:{grid:{display:false},ticks:{font:{size:11,weight:'600'}}},
                        }
                    },
                    plugins:[ChartDataLabels]
                });
            },[totalNF,totalVol,sepP,confP,auxP,nfPorSeparadorDia,volPorSeparadorDia,nfPorConferenteDia,volPorConferenteDia,sepNecessarios,confNecessarios]);

            // ── Gráfico 3: Necessário vs Presente (barras agrupadas) ──
            useEffect(()=>{
                destroy(instDist);
                if(!refDist.current) return;
                const ctx = refDist.current.getContext('2d');
                instDist.current = new Chart(ctx,{
                    type:'bar',
                    data:{
                        labels:['Separadores','Conferentes'],
                        datasets:[
                            { label:'Necessário', data:[sepNecessarios,confNecessarios], backgroundColor:['#6366f188','#0ea5e988'], borderColor:['#6366f1','#0ea5e9'], borderWidth:2, borderRadius:8, borderSkipped:false },
                            ...(sepP>0||confP>0?[{ label:'Presente', data:[sepP,confP], backgroundColor:['#10b98188','#10b98188'], borderColor:['#10b981','#10b981'], borderWidth:2, borderRadius:8, borderSkipped:false }]:[]),
                        ]
                    },
                    options:{ responsive:true, maintainAspectRatio:false,
                        plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:12,padding:10}},
                            datalabels:{display:true,align:'top',anchor:'end',color:'#374151',font:{size:12,weight:'800'},formatter:v=>v}
                        },
                        scales:{
                            x:{grid:{display:false},ticks:{font:{size:11}}},
                            y:{beginAtZero:true,grid:{color:'#f8fafc'},ticks:{font:{size:10},stepSize:1}},
                        }
                    },
                    plugins:[ChartDataLabels]
                });
            },[sepP,confP,sepNecessarios,confNecessarios]);

            // ── Gráfico 4: Produção por hora do turno ──
            useEffect(()=>{
                destroy(instHora);
                if(!refHora.current||totalNF===0) return;
                const ctx = refHora.current.getContext('2d');
                const inicio = parseH(horaTurnoInicio);
                const fim = parseH(horaTurnoFim);
                const horas = [];
                for(let h=inicio;h<fim;h+=1){ horas.push(`${Math.floor(h).toString().padStart(2,'0')}:00`); }
                const nfH = Math.round(totalNF/TURNO_HORAS);
                const volH = Math.round(totalVol/TURNO_HORAS);
                const effSep = sepP>0?sepP:sepNecessarios;
                const capNFH = Math.round(effSep*(nfPorSeparadorDia/TURNO_HORAS));
                const capVolH = Math.round(effSep*(volPorSeparadorDia/TURNO_HORAS));
                instHora.current = new Chart(ctx,{
                    type:'line',
                    data:{
                        labels:horas,
                        datasets:[
                            { label:'Demanda NF/h', data:horas.map(()=>nfH), borderColor:'#6366f1', backgroundColor:'#6366f115', borderWidth:2.5, tension:0, pointRadius:0, fill:true },
                            { label:`Cap. NF/h (${effSep} sep.)`, data:horas.map(()=>capNFH), borderColor:'#ef4444', backgroundColor:'transparent', borderWidth:2, borderDash:[6,3], tension:0, pointRadius:0, fill:false },
                            { label:'Demanda Vol/h', data:horas.map(()=>volH), borderColor:'#8b5cf6', backgroundColor:'#8b5cf615', borderWidth:2.5, tension:0, pointRadius:0, fill:true, yAxisID:'y2' },
                            { label:`Cap. Vol/h (${effSep} sep.)`, data:horas.map(()=>capVolH), borderColor:'#f59e0b', backgroundColor:'transparent', borderWidth:2, borderDash:[6,3], tension:0, pointRadius:0, fill:false, yAxisID:'y2' },
                        ]
                    },
                    options:{ responsive:true, maintainAspectRatio:false,
                        interaction:{mode:'index',intersect:false},
                        plugins:{ legend:{position:'top',labels:{font:{size:10},boxWidth:12,padding:8}}, datalabels:{display:false} },
                        scales:{
                            x:{grid:{display:false},ticks:{font:{size:9}}},
                            y:{beginAtZero:true,grid:{color:'#f8fafc'},title:{display:true,text:'NF',font:{size:10,weight:'600'}},ticks:{font:{size:9},callback:v=>v.toLocaleString('pt-BR')}},
                            y2:{beginAtZero:true,position:'right',grid:{display:false},title:{display:true,text:'Volumes',font:{size:10,weight:'600'}},ticks:{font:{size:9},callback:v=>v.toLocaleString('pt-BR')}},
                        }
                    }
                });
            },[totalNF,totalVol,sepP,sepNecessarios,nfPorSeparadorDia,volPorSeparadorDia,TURNO_HORAS,horaTurnoInicio,horaTurnoFim]);

            // ── Gráfico 5: Linha do tempo do turno — produção acumulada esperada ──
            useEffect(()=>{
                destroy(instCenario);
                if(!refCenario.current||totalNF===0) return;
                const ctx = refCenario.current.getContext('2d');

                // Monta pontos a cada 20 minutos entre 13:40 e 22:00
                const toMin = (s) => { const[h,m]=s.split(':').map(Number); return h*60+m; };
                const toHHMM = (min) => `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;

                const INICIO = toMin(horaTurnoInicio);   // 13:40 = 820
                const FIM    = toMin(horaTurnoFim);      // 22:00 = 1320
                const JANTA_INICIO = INICIO + 240;       // após 4h = 17:40
                const JANTA_FIM    = JANTA_INICIO + 60;  // 18:40
                const STEP = 20; // minutos

                const pontos = [];
                for(let m=INICIO; m<=FIM; m+=STEP) pontos.push(m);

                // Horas efetivas acumuladas até cada ponto (desconta janta)
                const horasEfAcum = pontos.map(m => {
                    if(m <= INICIO) return 0;
                    const bruto = (m - INICIO) / 60;
                    // desconta período de janta já transcorrido
                    const jantaDecorrida = m < JANTA_INICIO ? 0
                        : m < JANTA_FIM ? (m - JANTA_INICIO) / 60
                        : horasDesconto;
                    return Math.max(bruto - jantaDecorrida, 0);
                });

                const effSep  = sepP > 0 ? sepP  : sepNecessarios;
                const nfHora  = nfPorSeparadorDia  / TURNO_HORAS;
                const volHora = volPorSeparadorDia / TURNO_HORAS;

                // Meta acumulada: o que cada configuração de equipe deveria ter feito
                const metaVolAcum  = pontos.map((_,i) => Math.round(effSep  * volHora * horasEfAcum[i]));
                const metaNFAcum   = pontos.map((_,i) => Math.round(effSep  * nfHora  * horasEfAcum[i]));

                // Linha de meta com 1 sep a mais e 1 a menos (cenários)
                const metaVolMenos = pontos.map((_,i) => Math.round(Math.max(effSep-1,1) * volHora * horasEfAcum[i]));
                const metaVolMais  = pontos.map((_,i) => Math.round((effSep+1) * volHora * horasEfAcum[i]));

                // Faixas de janta como anotação via dataset transparente (banda cinza)
                const jantaFaixa = pontos.map(m => (m >= JANTA_INICIO && m <= JANTA_FIM) ? totalVol * 1.15 : null);

                const labels = pontos.map(toHHMM);

                instCenario.current = new Chart(ctx, {
                    type:'line',
                    data:{
                        labels,
                        datasets:[
                            // Faixa de janta (área cinza)
                            { label:'Intervalo (janta)', data:jantaFaixa, borderColor:'transparent', backgroundColor:'#94a3b830', borderWidth:0, pointRadius:0, fill:true, tension:0, order:10 },
                            // Cenário -1 sep
                            { label:`-1 sep. (${Math.max(effSep-1,1)})`, data:metaVolMenos, borderColor:'#f59e0b', backgroundColor:'transparent', borderWidth:1.5, borderDash:[4,4], pointRadius:0, tension:0.3 },
                            // Meta principal volumes
