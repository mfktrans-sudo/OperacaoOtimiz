        }

        // ========== GRÁFICOS DE TENDÊNCIA ==========



        // ── Paleta de cores disponíveis para novos destinos ──────────────────
        const PALETA_CORES = [
            '#667eea','#ec4899','#f59e0b','#10b981','#ef4444',
            '#8b5cf6','#06b6d4','#f97316','#84cc16','#64748b',
            '#a855f7','#0ea5e9','#d946ef','#14b8a6','#e11d48'
        ];

        const CORES_EXTRAS = [
            '#8b5cf6','#06b6d4','#f97316','#84cc16','#64748b','#a855f7','#0ea5e9','#d946ef'
        ];

        // ── Destinos prioritários padrão (usados quando não há dados no localStorage) ─
        const DESTINOS_PRIORITARIOS_DEFAULT = [
            { nome: 'CONTAGEM',       cor: '#667eea', keywords: ['CONTAGEM'] },
            { nome: 'PAVUNA',         cor: '#ec4899', keywords: ['PAVUNA'] },
            { nome: 'UBERLÂNDIA',     cor: '#f59e0b', keywords: ['UBERLÂNDIA','UBERLANDIA'] },
            { nome: 'RIBEIRÃO PRETO', cor: '#10b981', keywords: ['RIBEIRÃO PRETO','RIBEIRAO PRETO','RIBEIRÃO','RIBEIRAO'] },
            { nome: 'PINHAIS',        cor: '#ef4444', keywords: ['PINHAIS'] },
        ];

        // ── Carregar / salvar destinos prioritários no localStorage ─────────────
        const LS_KEY_PRIO = 'destinosPrioritarios_v1';

        function carregarDestinosPrio() {
            try {
                const raw = localStorage.getItem(LS_KEY_PRIO);
                if (raw) return JSON.parse(raw);
            } catch(e) {}
            return DESTINOS_PRIORITARIOS_DEFAULT.map(d => ({ ...d }));
        }

        function salvarDestinosPrio(lista) {
            try { localStorage.setItem(LS_KEY_PRIO, JSON.stringify(lista)); } catch(e) {}
        }

        // ── Helpers para compatibilidade com o restante do código ───────────────
        // Retornam sempre baseados na lista atual passada como argumento
        function buildCoresPrioritarias(lista) {
            const m = {};
            lista.forEach(d => { m[d.nome] = d.cor; });
            return m;
        }

        function buildNomesPrioritarios(lista) {
            return lista.map(d => d.nome);
        }

        // normalizarOperacao agora recebe a lista dinâmica como 2º argumento
        const normalizarOperacao = (nome, destinosPrio) => {
            if (!nome) return nome;
            let n = nome.trim().toUpperCase();
            n = n.replace(/[\s\-\/]+\d+\s*$/, '').trim();
            n = n.replace(/\d+\s*$/, '').trim();
            // Testar cada destino prioritário pelas suas keywords
            for (const dest of (destinosPrio || DESTINOS_PRIORITARIOS_DEFAULT)) {
                for (const kw of (dest.keywords || [dest.nome])) {
                    if (n.includes(kw.toUpperCase())) return dest.nome;
                }
            }
            return n;
        };

        // ── Variáveis globais de compatibilidade (lidas no carregamento) ─────────
        // Usadas fora do componente (ex: isPrioritario nos mini-gráficos)
        // Serão sobrescritas pelo estado do componente Graficos em runtime.
        let DESTINOS_PRIORITARIOS = buildNomesPrioritarios(carregarDestinosPrio());
        let CORES_PRIORITARIAS    = buildCoresPrioritarias(carregarDestinosPrio());

        function Graficos({ operacoes, listaOperacoes }) {
            // ── Estado de destinos prioritários (persistido em localStorage) ──────
            const [destinosPrio, setDestinosPrio] = useState(() => carregarDestinosPrio());
            const [mostrarGerenciar, setMostrarGerenciar] = useState(false);
            // form do novo destino
            const [novoNome,     setNovoNome]     = useState('');
            const [novoKeywords, setNovoKeywords] = useState('');
            const [novaCor,      setNovaCor]      = useState('#667eea');
            const [msgPrio,      setMsgPrio]      = useState('');

            // Derivados síncronos para uso no componente
            const nomesPrioritarios = buildNomesPrioritarios(destinosPrio);
            const coresPrioritarias = buildCoresPrioritarias(destinosPrio);

            // Helpers internos que usam destinosPrio dinâmico
            const normOp = (nome) => normalizarOperacao(nome, destinosPrio);

            const salvarEAtualizar = (novaLista) => {
                salvarDestinosPrio(novaLista);
                setDestinosPrio(novaLista);
                // Atualizar globais de compatibilidade
                DESTINOS_PRIORITARIOS = buildNomesPrioritarios(novaLista);
                CORES_PRIORITARIAS    = buildCoresPrioritarias(novaLista);
            };

            const adicionarDestino = () => {
                const nome = novoNome.trim().toUpperCase();
                if (!nome) { setMsgPrio('⚠️ Selecione uma operação da lista.'); return; }
                if (destinosPrio.find(d => d.nome === nome)) { setMsgPrio('⚠️ Destino já existe.'); return; }
                // A keyword é exatamente o nome da operação nos dados — garante match perfeito
                const novaLista = [...destinosPrio, { nome, cor: novaCor, keywords: [nome] }];
                salvarEAtualizar(novaLista);
                setNovoNome(''); setNovaCor('#667eea');
                setMsgPrio('✅ Destino adicionado com sucesso!');
                setTimeout(() => setMsgPrio(''), 3000);
            };

            const removerDestino = (nome) => {
                if (!confirm(`Remover "${nome}" dos destinos prioritários?`)) return;
                const novaLista = destinosPrio.filter(d => d.nome !== nome);
                salvarEAtualizar(novaLista);
                if (operacaoFiltro === nome) setOperacaoFiltro('PRIORITARIAS');
            };

            const editarCor = (nome, cor) => {
                const novaLista = destinosPrio.map(d => d.nome === nome ? { ...d, cor } : d);
                salvarEAtualizar(novaLista);
            };

            const restaurarPadrao = () => {
                if (!confirm('Restaurar destinos padrão? (Contagem, Pavuna, Uberlândia, Ribeirão Preto, Pinhais)')) return;
                salvarEAtualizar(DESTINOS_PRIORITARIOS_DEFAULT.map(d => ({ ...d })));
                setMsgPrio('✅ Destinos restaurados!');
                setTimeout(() => setMsgPrio(''), 3000);
            };

            const [filtroDataTipo, setFiltroDataTipo] = useState('periodo');
            const [dataInicio, setDataInicio] = useState(() => {
                const d = new Date(); d.setDate(d.getDate() - 13);
                return d.toISOString().split('T')[0];
            });
            const [dataFim, setDataFim] = useState(() => new Date().toISOString().split('T')[0]);
            // 'PRIORITARIAS' = só as 5 prioridades | 'TODAS' = todas | nome específico = uma só
            const [operacaoFiltro, setOperacaoFiltro] = useState('PRIORITARIAS');
            const [metricaGeral, setMetricaGeral] = useState('vol');
            const chartGeralRef = useRef(null);
            const chartGeralInst = useRef(null);
            const chartRefs = useRef({});
            const chartInsts = useRef({});

            const formatLabel = (d) => {
                const dt = new Date(d + 'T00:00:00');
                return dt.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
            };

            // Todas as operações com nome normalizado
            const operacoesNormalizadas = useMemo(() => {
                return operacoes.map(o => ({ ...o, _opNorm: normOp(o.operacao) }));
            }, [operacoes, destinosPrio]);

            // Lista de nomes normalizados únicos (para filtros)
            const operacoesUnicas = useMemo(() => {
                const s = new Set(operacoesNormalizadas.map(o => o._opNorm));
                return Array.from(s).sort();
            }, [operacoesNormalizadas]);

            // Operações extras (não prioritárias) presentes nos dados
            const operacoesExtras = useMemo(() => {
                return operacoesUnicas.filter(op => !nomesPrioritarios.includes(op));
            }, [operacoesUnicas, nomesPrioritarios]);

            // Dados filtrados por período e operação
            const opsFiltradas = useMemo(() => {
                return operacoesNormalizadas.filter(o => {
                    const dentroData = o.data >= dataInicio && o.data <= dataFim;
                    let dentroOp = false;
                    if (operacaoFiltro === 'PRIORITARIAS') {
                        dentroOp = nomesPrioritarios.includes(o._opNorm);
                    } else if (operacaoFiltro === 'TODAS') {
                        dentroOp = true;
                    } else {
                        dentroOp = o._opNorm === operacaoFiltro;
                    }
                    return dentroData && dentroOp;
                });
            }, [operacoesNormalizadas, dataInicio, dataFim, operacaoFiltro, nomesPrioritarios]);

            // Datas únicas ordenadas
            const datasUnicas = useMemo(() => {
                const s = new Set(opsFiltradas.map(o => o.data));
                return Array.from(s).sort();
            }, [opsFiltradas]);

            // Quais operações exibir no gráfico geral e mini gráficos
            const opsParaExibir = useMemo(() => {
                if (operacaoFiltro === 'PRIORITARIAS') {
                    // Inclui todos os prioritários — com ou sem dados no período
                    return nomesPrioritarios;
                }
                if (operacaoFiltro === 'TODAS') return operacoesUnicas;
                return operacoesUnicas.filter(op => op === operacaoFiltro);
            }, [operacaoFiltro, operacoesUnicas, nomesPrioritarios]);

            const getCorOp = (op, idx) => coresPrioritarias[op] || CORES_EXTRAS[idx % CORES_EXTRAS.length];

            // Agrega valores de uma métrica por operação normalizada e data
            const agregar = (data, opNorm, metrica) => {
                const reg = opsFiltradas.filter(o => o.data === data && o._opNorm === opNorm);
                if (metrica === 'vol') return reg.reduce((a, r) => a + (r.vol || 0), 0);
                if (metrica === 'nf') return reg.reduce((a, r) => a + (r.nf || 0), 0);
                if (metrica === 'cubagem') return reg.reduce((a, r) => a + (r.cubagem || 0), 0);
                if (metrica === 'taxa') {
                    const total = reg.length;
                    const verde = reg.filter(r => r.status === 'verde').length;
                    return total > 0 ? parseFloat(((verde/total)*100).toFixed(1)) : 0;
                }
                return 0;
            };

            // Datasets do gráfico geral (linhas)
            const dadosGeral = useMemo(() => {
                return opsParaExibir.map((op, idx) => ({
                    label: op,
                    data: datasUnicas.map(d => agregar(d, op, metricaGeral)),
                    borderColor: getCorOp(op, idx),
                    backgroundColor: getCorOp(op, idx) + '18',
                    tension: 0.4,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    borderWidth: 2.5,
                    fill: false
                }));
            }, [opsParaExibir, datasUnicas, metricaGeral, opsFiltradas]);

            // Dados mini gráficos (sempre volume)
            const dadosPorOperacao = useMemo(() => {
                return opsParaExibir.map((op, idx) => {
                    const valores = datasUnicas.map(d => agregar(d, op, metricaGeral));
                    const soma = valores.reduce((a, v) => a + v, 0);
                    return { op, valores, cor: getCorOp(op, idx), soma };
                }).filter(d => d.soma > 0);
            }, [opsParaExibir, datasUnicas, opsFiltradas, metricaGeral]);

            const nomeMetrica = { vol: 'Volume', nf: 'NF', cubagem: 'Cubagem (m³)', taxa: 'Taxa de Sucesso (%)' };

            // Gráfico Geral
            useEffect(() => {
                if (chartGeralInst.current) {
                    chartGeralInst.current.destroy();
                    chartGeralInst.current = null;
                }
                if (!chartGeralRef.current || datasUnicas.length === 0 || dadosGeral.length === 0) return;
                const ctx = chartGeralRef.current.getContext('2d');
                chartGeralInst.current = new Chart(ctx, {
                    type: 'line',
                    data: { labels: datasUnicas.map(formatLabel), datasets: dadosGeral },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'top', labels: { font: { size: 12 }, boxWidth: 16, padding: 14 } },
                            datalabels: { display: false }
                        },
                        scales: {
                            x: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } },
                            y: {
                                beginAtZero: true,
                                grid: { color: '#f1f5f9' },
                                ticks: { callback: v => metricaGeral === 'taxa' ? v + '%' : v.toLocaleString('pt-BR') }
                            }
                        }
                    }
                });
            }, [dadosGeral, datasUnicas, metricaGeral]);

            // Mini gráficos — setTimeout garante que o DOM (canvas refs) está pronto após re-render
            useEffect(() => {
                Object.values(chartInsts.current).forEach(c => { if (c) c.destroy(); });
                chartInsts.current = {};
                if (datasUnicas.length === 0 || dadosPorOperacao.length === 0) return;
                const timer = setTimeout(() => {
                    dadosPorOperacao.forEach(({ op, valores, cor }) => {
                        const canvas = chartRefs.current[op];
                        if (!canvas) return;
                        // Se já existe uma instância neste canvas, destrói antes
                        if (chartInsts.current[op]) { chartInsts.current[op].destroy(); }
                        const ctx = canvas.getContext('2d');
                        chartInsts.current[op] = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: datasUnicas.map(formatLabel),
                                datasets: [{ label: nomeMetrica[metricaGeral], data: valores, borderColor: cor, backgroundColor: cor + '22', tension: 0.4, pointRadius: 4, borderWidth: 2.5, fill: true }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false },
                                    datalabels: { display: true, align: 'top', anchor: 'end', color: '#374151', font: { size: 10, weight: 'bold' }, formatter: v => v > 0 ? v.toLocaleString('pt-BR') : '' }
                                },
                                scales: {
                                    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                                    y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 }, callback: v => v.toLocaleString('pt-BR') } }
                                }
                            },
                            plugins: [ChartDataLabels]
                        });
                    });
                }, 50);
                return () => { clearTimeout(timer); Object.values(chartInsts.current).forEach(c => { if (c) c.destroy(); }); };
            }, [dadosPorOperacao, datasUnicas, metricaGeral]);

            const handleSalvarGrafico = async () => {
                const el = document.getElementById('graficos-evolucao-container');
                if (!el) return;
                const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', logging: false });
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url;
                    a.download = `Evolucao_${dataInicio}_${dataFim}.png`; a.click();
                    URL.revokeObjectURL(url);
                });
            };

            const html2canvasLoaded = typeof html2canvas !== 'undefined';

            return (
                <div className="animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold text-gray-800">
                            <span className="icon-pulse inline-block">📈</span> Evolução da Produtividade
                        </h2>
                        {html2canvasLoaded && (
                            <button onClick={handleSalvarGrafico} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-lg flex items-center gap-2 btn-animated shadow">
                                <span>💾</span> Salvar Gráfico
                            </button>
                        )}
                    </div>

                    {/* BOTÃO GERENCIAR DESTINOS PRIORITÁRIOS */}
                    <div className="mb-4 flex justify-end">
                        <button
                            onClick={() => setMostrarGerenciar(v => !v)}
                            className="flex items-center gap-2 bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-5 py-2 rounded-lg btn-animated shadow transition-all"
                        >
                            <span>⭐</span>
                            {mostrarGerenciar ? 'Fechar Gerenciamento' : 'Gerenciar Destinos Prioritários'}
                        </button>
                    </div>

                    {/* PAINEL DE GERENCIAMENTO DE DESTINOS PRIORITÁRIOS */}
                    {mostrarGerenciar && (
                        <div className="bg-white border-2 border-yellow-300 rounded-2xl shadow-xl p-6 mb-6 animate-slide-in">
                            <h3 className="text-xl font-bold text-gray-800 mb-1 flex items-center gap-2">
                                <span className="text-2xl">⭐</span> Gerenciar Destinos Prioritários
                            </h3>
                            <p className="text-sm text-gray-500 mb-5">
                                Destinos marcados como prioritários aparecem em destaque (badge ⭐) nos gráficos e no filtro "Destinos Prioritários".
                                As <strong>palavras-chave</strong> determinam quais nomes de operação são reconhecidos como esse destino.
                            </p>

                            {msgPrio && (
                                <div className={`mb-4 px-4 py-3 rounded-lg font-semibold text-sm ${msgPrio.startsWith('✅') ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}`}>
                                    {msgPrio}
                                </div>
                            )}

                            {/* Lista de destinos atuais */}
                            <div className="mb-6">
                                <h4 className="font-bold text-gray-700 mb-3">📋 Destinos Cadastrados ({destinosPrio.length})</h4>
                                {destinosPrio.length === 0 ? (
                                    <p className="text-gray-400 italic text-sm">Nenhum destino prioritário cadastrado.</p>
                                ) : (
                                    <div className="space-y-2">
                                        {destinosPrio.map((dest, idx) => (
                                            <div key={dest.nome} className="flex items-center gap-3 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 hover:bg-yellow-50 transition-colors">
                                                {/* Cor — clicável para editar */}
                                                <div className="relative flex-shrink-0">
                                                    <input
                                                        type="color"
                                                        value={dest.cor}
                                                        onChange={e => editarCor(dest.nome, e.target.value)}
                                                        title="Clique para alterar a cor"
                                                        style={{
                                                            width: 28, height: 28, borderRadius: '50%',
                                                            border: 'none', cursor: 'pointer', padding: 0,
                                                            background: 'none'
                                                        }}
                                                    />
                                                </div>
                                                {/* Nome */}
                                                <span className="font-bold text-gray-800 text-sm min-w-[130px]">{dest.nome}</span>
                                                {/* Keywords */}
                                                <div className="flex-1 flex flex-wrap gap-1">
                                                    {(dest.keywords || [dest.nome]).map(kw => (
                                                        <span key={kw} className="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2 py-0.5 rounded-full">{kw}</span>
                                                    ))}
                                                </div>
                                                {/* Badge da cor */}
                                                <span className="text-xs text-gray-400 font-mono">{dest.cor}</span>
                                                {/* Remover */}
                                                <button
                                                    onClick={() => removerDestino(dest.nome)}
                                                    className="ml-2 bg-red-100 hover:bg-red-500 text-red-600 hover:text-white font-bold w-7 h-7 rounded-full flex items-center justify-center transition-all text-sm flex-shrink-0"
                                                    title="Remover destino"
                                                >✕</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Formulário para novo destino */}
                            <div className="border-t-2 border-dashed border-gray-200 pt-5">
                                <h4 className="font-bold text-gray-700 mb-3">➕ Adicionar Novo Destino Prioritário</h4>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Operação existente *</label>
                                        <select
                                            value={novoNome}
                                            onChange={e => setNovoNome(e.target.value)}
                                            className="w-full p-2 border-2 border-gray-300 rounded-lg text-sm focus:border-yellow-400 focus:outline-none"
                                        >
                                            <option value="">Selecione uma operação...</option>
                                            {(() => {
                                                const nomesListaOps = (listaOperacoes || []).map(lo => lo.nome.trim().toUpperCase());
                                                const todasOps = Array.from(new Set([...nomesListaOps, ...operacoesUnicas])).sort();
                                                return todasOps
                                                    .filter(op => !nomesPrioritarios.includes(op))
                                                    .map(op => <option key={op} value={op}>{op}</option>);
                                            })()}
                                        </select>
                                        <p className="text-xs text-gray-400 mt-1">Mostrando operações cadastradas e com registros, exceto as já priorizadas.</p>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Cor no Gráfico</label>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="color"
                                                value={novaCor}
                                                onChange={e => setNovaCor(e.target.value)}
                                                className="w-10 h-10 rounded-lg border-2 border-gray-300 cursor-pointer"
                                            />
                                            <div className="flex flex-wrap gap-1">
                                                {PALETA_CORES.slice(0,8).map(c => (
                                                    <div
                                                        key={c}
                                                        onClick={() => setNovaCor(c)}
                                                        title={c}
                                                        style={{
                                                            width:20, height:20, borderRadius:4,
                                                            background:c, cursor:'pointer',
                                                            border: novaCor===c ? '2px solid #1f2937' : '2px solid transparent'
                                                        }}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3 flex-wrap">
                                    <button
                                        onClick={adicionarDestino}
                                        className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-6 py-2 rounded-lg btn-animated shadow"
                                    >
                                        ⭐ Adicionar Destino
                                    </button>
                                    <button
                                        onClick={restaurarPadrao}
                                        className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-6 py-2 rounded-lg btn-animated"
                                    >
                                        🔄 Restaurar Padrão
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FILTROS */}
                    <div className="filter-panel mb-6">
                        <h3 className="text-lg font-bold text-white mb-4"><span className="icon-pulse inline-block">🔍</span> Filtros de Análise</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="bg-white p-4 rounded-lg">
                                <label className="block text-sm font-bold text-gray-700 mb-2">📅 Tipo de Período</label>
                                <select value={filtroDataTipo} onChange={e => { setFiltroDataTipo(e.target.value); if (e.target.value === 'dia') setDataFim(dataInicio); }} className="w-full p-2 border-2 border-gray-300 rounded-lg">
                                    <option value="dia">Dia Específico</option>
                                    <option value="periodo">Intervalo Personalizado</option>
                                    <option value="semana">Atalhos Rápidos</option>
                                </select>
                            </div>
                            <div className="bg-white p-4 rounded-lg">
                                <label className="block text-sm font-bold text-gray-700 mb-2">📆 {filtroDataTipo === 'dia' ? 'Data' : 'Data Início'}</label>
                                <input type="date" value={dataInicio} onChange={e => { setDataInicio(e.target.value); if (filtroDataTipo === 'dia') setDataFim(e.target.value); }} className="w-full p-2 border-2 border-gray-300 rounded-lg" />
                                {filtroDataTipo === 'periodo' && (
                                    <div className="mt-2">
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Data Fim</label>
                                        <input type="date" value={dataFim} onChange={e => setDataFim(e.target.value)} className="w-full p-2 border-2 border-gray-300 rounded-lg" />
                                    </div>
                                )}
                                {filtroDataTipo === 'semana' && (
                                    <div className="flex gap-2 mt-2 flex-wrap">
                                        <button onClick={() => { const d=new Date(); setDataFim(d.toISOString().split('T')[0]); const i=new Date(); i.setDate(i.getDate()-6); setDataInicio(i.toISOString().split('T')[0]); }} className="bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded">7 dias</button>
                                        <button onClick={() => { const d=new Date(); setDataFim(d.toISOString().split('T')[0]); const i=new Date(); i.setDate(i.getDate()-14); setDataInicio(i.toISOString().split('T')[0]); }} className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded">15 dias</button>
                                        <button onClick={() => { const d=new Date(); setDataFim(d.toISOString().split('T')[0]); const i=new Date(); i.setDate(i.getDate()-29); setDataInicio(i.toISOString().split('T')[0]); }} className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">30 dias</button>
                                    </div>
                                )}
                            </div>
                            <div className="bg-white p-4 rounded-lg">
                                <label className="block text-sm font-bold text-gray-700 mb-2">🏭 Operação / Destino</label>
                                <select value={operacaoFiltro} onChange={e => setOperacaoFiltro(e.target.value)} className="w-full p-2 border-2 border-gray-300 rounded-lg">
                                    <optgroup label="⭐ Prioridade">
                                        <option value="PRIORITARIAS">Destinos Prioritários</option>
                                    </optgroup>
                                    <optgroup label="Prioritários Individuais">
                                        {nomesPrioritarios.map(op => (
                                            <option key={op} value={op}>{op}</option>
                                        ))}
                                    </optgroup>
                                    {operacoesExtras.length > 0 && (
                                        <optgroup label="Demais Operações">
                                            <option value="TODAS">Todas (incluindo extras)</option>
                                            {operacoesExtras.map(op => (
                                                <option key={op} value={op}>{op}</option>
                                            ))}
                                        </optgroup>
                                    )}
                                </select>
                                <p className="text-xs text-gray-400 mt-1">
                                    {operacaoFiltro === 'PRIORITARIAS' ? `⭐ Exibindo: ${nomesPrioritarios.join(', ')}` :
                                     operacaoFiltro === 'TODAS' ? 'Exibindo todas as operações' :
                                     `Exibindo: ${operacaoFiltro}`}
                                </p>
                            </div>
                            <div className="bg-white p-4 rounded-lg">
                                <label className="block text-sm font-bold text-gray-700 mb-2">📊 Métrica</label>
                                <select value={metricaGeral} onChange={e => setMetricaGeral(e.target.value)} className="w-full p-2 border-2 border-gray-300 rounded-lg">
                                    <option value="vol">Volume</option>
                                    <option value="nf">NF</option>
                                    <option value="cubagem">Cubagem (m³)</option>
                                    <option value="taxa">Taxa de Sucesso (%)</option>
                                </select>
                                {/* Legenda de cores das prioridades */}
                                <div className="mt-3 space-y-1">
                                    {nomesPrioritarios.map(op => (
                                        <div key={op} className="flex items-center gap-2">
                                            <div style={{width:12, height:12, borderRadius:3, background: coresPrioritarias[op], flexShrink:0}}></div>
                                            <span className="text-xs text-gray-600 font-medium">{op}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {datasUnicas.length === 0 ? (
                        <div className="bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-16 text-center">
                            <div className="text-5xl mb-4">📉</div>
                            <p className="text-xl text-gray-500 font-bold">Nenhum dado encontrado para o período selecionado</p>
                            <p className="text-gray-400 mt-2">Ajuste os filtros ou cadastre operações para este período</p>
                            {operacaoFiltro === 'PRIORITARIAS' && operacoes.length > 0 && (
                                <div className="mt-6 bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-left max-w-lg mx-auto">
                                    <p className="text-yellow-800 font-bold text-sm mb-2">⚠️ Dica: Nenhuma operação do período corresponde aos Destinos Prioritários configurados.</p>
                                    <p className="text-yellow-700 text-xs mb-3">Os destinos prioritários ({nomesPrioritarios.join(', ')}) são comparados com os nomes das operações cadastradas. Verifique se as palavras-chave estão corretas.</p>
                                    <button
                                        onClick={() => setOperacaoFiltro('TODAS')}
                                        className="bg-yellow-500 text-white font-bold px-4 py-2 rounded-lg text-sm hover:bg-yellow-600"
                                    >
                                        👁️ Ver Todas as Operações
                                    </button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div id="graficos-evolucao-container">
                            {/* GRÁFICO GERAL */}
                            <div className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-gray-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                        <span className="text-2xl">📊</span> Evolução Geral — {nomeMetrica[metricaGeral]}
                                        {operacaoFiltro === 'PRIORITARIAS' && <span className="ml-2 text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full font-semibold">⭐ Destinos Prioritários</span>}
                                        {operacaoFiltro !== 'PRIORITARIAS' && operacaoFiltro !== 'TODAS' && <span className="ml-2 text-sm bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-semibold">{operacaoFiltro}</span>}
                                    </h3>
                                    <span className="text-sm text-gray-500 font-medium">{dataInicio === dataFim ? formatLabel(dataInicio) : `${formatLabel(dataInicio)} → ${formatLabel(dataFim)}`}</span>
                                </div>
                                <div style={{height: '340px', position:'relative'}}>
                                    <canvas ref={chartGeralRef}></canvas>
                                </div>
                            </div>

                            {/* MINI GRÁFICOS */}
                            {dadosPorOperacao.length > 0 && (
                                <div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                        <span className="text-2xl">🔍</span> Evolução Individual por Operação — {nomeMetrica[metricaGeral]}
                                    </h3>
                                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(360px, 1fr))', gap:'20px'}}>
                                        {dadosPorOperacao.map(({ op, valores, cor }) => {
                                            const total = valores.reduce((a,v)=>a+v,0);
                                            const max = Math.max(...valores);
                                            const min = Math.min(...valores.filter(v=>v>0));
                                            const isPrioritario = nomesPrioritarios.includes(op);
                                            return (
                                                <div key={op} className={`bg-white rounded-xl p-5 border-2 hover:shadow-md transition-shadow ${isPrioritario ? 'shadow-md' : 'shadow border-gray-100'}`} style={isPrioritario ? {borderColor: cor + '66'} : {}}>
                                                    <div className="flex justify-between items-center mb-3">
                                                        <h4 className="font-bold text-gray-800 flex items-center gap-2">
                                                            {isPrioritario && <span className="text-yellow-500">⭐</span>}
                                                            <span style={{borderBottom:`3px solid ${cor}`, paddingBottom:'2px'}}>Evolução — {op}</span>
                                                        </h4>
                                                        <div className="text-right">
                                                            <div className="text-xs text-gray-500">Total período</div>
                                                            <div className="font-bold text-lg" style={{color: cor}}>{total.toLocaleString('pt-BR')}</div>
                                                        </div>
                                                    </div>
                                                    <div style={{height:'210px', position:'relative'}}>
                                                        <canvas ref={el => { if(el) chartRefs.current[op]=el; }}></canvas>
                                                    </div>
                                                    <div className="flex justify-between mt-3 text-xs text-gray-500 border-t pt-2">
                                                        <span>📈 Pico: <strong style={{color:cor}}>{max.toLocaleString('pt-BR')}</strong></span>
                                                        <span>Dias c/ dados: <strong>{valores.filter(v=>v>0).length}</strong></span>
                                                        <span>📉 Mín: <strong>{min ? min.toLocaleString('pt-BR') : '—'}</strong></span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ========== CADASTRAR ==========
        function Cadastrar({ onSalvar, listaOperacoes }) {
            const _nowCad = new Date(); const _brtCad = new Date(_nowCad.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
            const _hojeCad = `${_brtCad.getFullYear()}-${String(_brtCad.getMonth()+1).padStart(2,'0')}-${String(_brtCad.getDate()).padStart(2,'0')}`;
            const [formData, setFormData] = useState({
                data: _hojeCad,
                operacao: '',
                nf: '',
                vol: '',
                cubagem: '',
                inicio: '',
                termino: '',
                obs: ''
            });

            const [mensagem, setMensagem] = useState('');

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!formData.operacao || !formData.data) {
                    setMensagem('⚠️ Preencha os campos obrigatórios!');
                    return;
                }

                const operacaoConfig = listaOperacoes.find(op => op.nome === formData.operacao);
                const meta = operacaoConfig?.meta || '12:00';

                const novaOperacao = {
                    ...formData,
                    nf: parseInt(formData.nf) || 0,
                    vol: parseInt(formData.vol) || 0,
                    cubagem: parseFloat(formData.cubagem) || 0,
                    meta: meta,
                    status: calcularStatus(meta, formData.termino)
                };

                await onSalvar(novaOperacao);
                
                setMensagem('✅ Operação cadastrada com sucesso!');
                const _nowR = new Date(); const _brtR = new Date(_nowR.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
                const _hojeR = `${_brtR.getFullYear()}-${String(_brtR.getMonth()+1).padStart(2,'0')}-${String(_brtR.getDate()).padStart(2,'0')}`;
                setFormData({
                    data: _hojeR,
                    operacao: '',
                    nf: '',
                    vol: '',
                    cubagem: '',
                    inicio: '',
                    termino: '',
                    obs: ''
                });

                setTimeout(() => setMensagem(''), 3000);
            };

            return (
                <div className="animate-slide-in">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800"><span className="icon-bounce inline-block">➕</span> Cadastrar Nova Operação</h2>
                    
                    {mensagem && (
                        <div className={`p-4 rounded-lg mb-4 ${
                            mensagem.includes('sucesso') ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                        }`}>
                            {mensagem}
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>

        // ========== EDITAR ==========
        function Editar({ operacoes, onEditar, onDeletar }) {
            const [filtro, setFiltro] = useState('');
            const [editando, setEditando] = useState(null);
            const [dadosEdicao, setDadosEdicao] = useState({});

            const operacoesFiltradas = useMemo(() => {
                const ops = filtro 
                    ? operacoes.filter(op => 
                        op.operacao.toLowerCase().includes(filtro.toLowerCase()) ||
                        op.data.includes(filtro)
                    )
                    : operacoes;
                
                // Ordenar por data decrescente (mais recente primeiro)
                return [...ops].sort((a, b) => {
                    const dataA = new Date(a.data + ' ' + (a.inicio || '00:00'));
                    const dataB = new Date(b.data + ' ' + (b.inicio || '00:00'));
                    return dataB - dataA;
                });
            }, [operacoes, filtro]);

            const handleEditar = (op) => {
                setEditando(op.id);
                setDadosEdicao({ ...op });
            };

            const handleSalvar = async () => {
                const meta = dadosEdicao.meta;
                const operacaoAtualizada = {
                    ...dadosEdicao,
                    status: calcularStatus(meta, dadosEdicao.termino)
                };
                await onEditar(operacaoAtualizada);
                setEditando(null);
            };

            const handleCancelar = () => {
                setEditando(null);
                setDadosEdicao({});
            };

            const handleChange = (campo, valor) => {
                setDadosEdicao(prev => ({ ...prev, [campo]: valor }));
            };

            return (
                <div className="animate-slide-in">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800"><span className="icon-swing inline-block">✏️</span> Editar Operações</h2>
                    
                    <div className="mb-6">
                        <input 
                            type="text"
                            placeholder="🔍 Buscar por operação ou data..."
                            value={filtro}
                            onChange={(e) => setFiltro(e.target.value)}
                            className="w-full p-4 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none text-lg"
                        />
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full bg-white rounded-lg shadow-lg">
                            <thead className="bg-gradient-to-r from-purple-600 to-blue-600 text-white">
                                <tr>
                                    <th className="px-4 py-3 text-left">Data</th>
                                    <th className="px-4 py-3 text-left">Operação</th>
                                    <th className="px-4 py-3 text-left">NF</th>
                                    <th className="px-4 py-3 text-left">Vol</th>
                                    <th className="px-4 py-3 text-left">Cubagem</th>
                                    <th className="px-4 py-3 text-left">Início</th>
                                    <th className="px-4 py-3 text-left">Término</th>
                                    <th className="px-4 py-3 text-left">Status</th>
                                    <th className="px-4 py-3 text-left">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                {operacoesFiltradas.length === 0 ? (
                                    <tr>
                                        <td colSpan="9" className="text-center py-8 text-gray-500">
                                            Nenhuma operação encontrada
                                        </td>
                                    </tr>
                                ) : (
                                    operacoesFiltradas.map((op) => (
                                        <tr key={op.id} className="border-b hover:bg-gray-50 editable-row">
                                            {editando === op.id ? (
                                                <>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="date"
                                                            value={dadosEdicao.data}
                                                            onChange={(e) => handleChange('data', e.target.value)}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="text"
                                                            value={dadosEdicao.operacao}
                                                            onChange={(e) => handleChange('operacao', e.target.value)}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="number"
                                                            value={dadosEdicao.nf}
                                                            onChange={(e) => handleChange('nf', parseInt(e.target.value))}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="number"
                                                            value={dadosEdicao.vol}
                                                            onChange={(e) => handleChange('vol', parseInt(e.target.value))}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="number"
                                                            step="0.01"
                                                            value={dadosEdicao.cubagem}
                                                            onChange={(e) => handleChange('cubagem', parseFloat(e.target.value))}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="time"
                                                            value={dadosEdicao.inicio}
                                                            onChange={(e) => handleChange('inicio', e.target.value)}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="time"
                                                            value={dadosEdicao.termino}
                                                            onChange={(e) => handleChange('termino', e.target.value)}
                                                            className="w-full p-2 border rounded input-edit"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <span className={`px-3 py-1 rounded-full text-white text-xs font-bold status-${calcularStatus(dadosEdicao.meta, dadosEdicao.termino)}`}>
                                                            {calcularStatus(dadosEdicao.meta, dadosEdicao.termino).toUpperCase()}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <div className="flex gap-2">
                                                            <button 
                                                                onClick={handleSalvar}
                                                                className="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 btn-animated"
                                                            >
                                                                ✓
                                                            </button>
                                                            <button 
                                                                onClick={handleCancelar}
                                                                className="bg-gray-500 text-white px-3 py-1 rounded hover:bg-gray-600 btn-animated"
                                                            >
                                                                ✗
                                                            </button>
                                                        </div>
                                                    </td>
                                                </>
                                            ) : (
                                                <>
                                                    <td className="px-4 py-3">{formatarData(op.data)}</td>
                                                    <td className="px-4 py-3 font-medium">{op.operacao}</td>
                                                    <td className="px-4 py-3">{op.nf}</td>
                                                    <td className="px-4 py-3">{op.vol}</td>
                                                    <td className="px-4 py-3">{op.cubagem}</td>
                                                    <td className="px-4 py-3">{op.inicio}</td>
                                                    <td className="px-4 py-3">{op.termino}</td>
                                                    <td className="px-4 py-3">
                                                        <span className={`px-3 py-1 rounded-full text-white text-xs font-bold status-${op.status}`}>
                                                            {op.status.toUpperCase()}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <div className="flex gap-2">
                                                            <button 
                                                                onClick={() => handleEditar(op)}
                                                                title="Editar"
                                                                style={{background:'linear-gradient(135deg,#3b82f6,#6366f1)',color:'white',border:'none',borderRadius:'7px',padding:'5px 11px',fontWeight:'700',fontSize:'13px',cursor:'pointer',boxShadow:'0 2px 6px rgba(99,102,241,0.35)',transition:'all 0.18s'}}
                                                                onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.1)';e.currentTarget.style.boxShadow='0 4px 12px rgba(99,102,241,0.5)';}}
                                                                onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 2px 6px rgba(99,102,241,0.35)';}}
                                                            >✏️</button>
                                                            <button 
                                                                onClick={() => {
                                                                    if (confirm('Deseja realmente deletar esta operação?')) {
                                                                        onDeletar(op.id);
                                                                    }
                                                                }}
                                                                title="Excluir"
                                                                style={{background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'white',border:'none',borderRadius:'7px',padding:'5px 11px',fontWeight:'700',fontSize:'13px',cursor:'pointer',boxShadow:'0 2px 6px rgba(220,38,38,0.3)',transition:'all 0.18s'}}
                                                                onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.1)';e.currentTarget.style.boxShadow='0 4px 12px rgba(220,38,38,0.5)';}}
                                                                onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 2px 6px rgba(220,38,38,0.3)';}}
                                                            >🗑</button>
                                                        </div>
                                                    </td>
                                                </>
                                            )}
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ========== GERENCIAR OPERAÇÕES ==========
        function GerenciarOperacoes({ listaOperacoes, onSalvar, setPendingChanges }) {
            const [lista, setLista] = useState([...listaOperacoes]);
            const [novaOperacao, setNovaOperacao] = useState({ nome: '', meta: '12:00', cubMax: '' });
            const [mensagem, setMensagem] = useState('');
            const [editandoIdx, setEditandoIdx] = useState(null);
            const [editForm, setEditForm] = useState({});

            const handleAdicionar = async () => {
                if (!novaOperacao.nome || !novaOperacao.meta) {
                    setMensagem('warn|⚠️ Preencha todos os campos!');
                    return;
                }
                const nova = { ...novaOperacao, cubMax: novaOperacao.cubMax !== '' ? parseFloat(novaOperacao.cubMax) : null };
                const novaLista = [...lista, nova];
                setLista(novaLista);
                setNovaOperacao({ nome: '', meta: '12:00', cubMax: '' });
                // Auto-salvar imediatamente
                await onSalvar(novaLista);
                setPendingChanges(false);
                setMensagem('ok|✅ Operação adicionada e salva automaticamente!');
                setTimeout(() => setMensagem(''), 3000);
            };

            const handleRemover = async (index) => {
                if (!confirm('Deseja remover esta operação?')) return;
                const novaLista = lista.filter((_, i) => i !== index);
                setLista(novaLista);
                await onSalvar(novaLista);
                setPendingChanges(false);
                setMensagem('ok|✅ Operação removida e salva!');
                setTimeout(() => setMensagem(''), 3000);
            };

            const handleIniciarEdicao = (index) => {
                setEditandoIdx(index);
                setEditForm({ ...lista[index] });
                setPendingChanges(true);
            };

            const handleSalvarEdicao = async () => {
                const novaLista = lista.map((op, i) => i === editandoIdx ? { ...editForm } : op);
                setLista(novaLista);
                setEditandoIdx(null);
                await onSalvar(novaLista);
                setPendingChanges(false);
                setMensagem('ok|✅ Alterações salvas com sucesso!');
                setTimeout(() => setMensagem(''), 3000);
            };

            const handleCancelarEdicao = () => {
                setEditandoIdx(null);
                setEditForm({});
                setPendingChanges(false);
            };

            const handleEditarMeta = (index, novaMeta) => {
                const novaLista = [...lista];
                novaLista[index].meta = novaMeta;
                setLista(novaLista);
                setPendingChanges(true);
            };

            const handleEditarCubMax = (index, valor) => {
                const novaLista = [...lista];
                novaLista[index].cubMax = valor !== '' ? parseFloat(valor) : null;
                setLista(novaLista);
                setPendingChanges(true);
            };

            const handleSalvar = async () => {
                await onSalvar(lista);
                setPendingChanges(false);
                setMensagem('ok|✅ Alterações salvas com sucesso!');
                setTimeout(() => setMensagem(''), 3000);
            };

            return (
                <div className="animate-slide-in">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800"><span className="icon-rotate inline-block">🔧</span> Gerenciar Operações</h2>
                    
                    {mensagem && (() => {
                        const [kind, ...rest] = mensagem.split('|');
                        const text = rest.join('|') || kind;
                        const isOk = kind === 'ok';
                        return (
                            <div style={{padding:'12px 16px',borderRadius:'10px',marginBottom:'16px',fontWeight:'600',fontSize:'14px',background:isOk?'#d1fae5':'#fef3c7',color:isOk?'#065f46':'#92400e',display:'flex',alignItems:'center',gap:'8px'}}>
                                {text}
                            </div>
                        );
                    })()}

                    {/* Banner explicativo cubagem */}
                    <div style={{background:'linear-gradient(135deg,#fef3c7,#fffbeb)',border:'1.5px solid #f59e0b',borderRadius:'12px',padding:'14px 18px',marginBottom:'20px',display:'flex',alignItems:'center',gap:'12px'}}>
                        <span style={{fontSize:'28px'}}>🚛</span>
                        <div>
                            <div style={{fontWeight:'800',fontSize:'14px',color:'#92400e'}}>Parâmetro de Cubagem Máxima por Operação</div>
                            <div style={{fontSize:'12px',color:'#b45309',marginTop:'2px'}}>Defina o limite de cubagem (m³) aceitável para cada operação. O Dashboard alertará automaticamente quando uma carga estiver acima deste valor, indicando risco de inchaço, avaria ou necessidade de redistribuição.</div>
                        </div>
                    </div>

                    <div className="bg-blue-50 p-6 rounded-lg mb-6">
                        <h3 className="text-xl font-bold mb-4"><span className="icon-bounce inline-block">➕</span> Adicionar Nova Operação</h3>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <input 
                                type="text"
                                placeholder="Nome da Operação"
                                value={novaOperacao.nome}
                                onChange={(e) => setNovaOperacao({ ...novaOperacao, nome: e.target.value })}
                                className="p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                            />
                            <input 
                                type="time"
                                value={novaOperacao.meta}
                                onChange={(e) => setNovaOperacao({ ...novaOperacao, meta: e.target.value })}
                                className="p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                            />
                            <input
                                type="number"
                                min="0"
                                step="0.01"
                                placeholder="Cubagem máx. (m³)"
                                value={novaOperacao.cubMax}
                                onChange={(e) => setNovaOperacao({ ...novaOperacao, cubMax: e.target.value })}
                                className="p-3 border-2 border-orange-300 rounded-lg focus:border-orange-500 focus:outline-none"
                                style={{background:'#fff7ed'}}
                            />
                            <button 
                                onClick={handleAdicionar}
                                className="bg-blue-500 text-white font-bold py-3 rounded-lg hover:bg-blue-600 btn-animated"
                            >
                                ➕ Adicionar e Salvar
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow-lg overflow-hidden mb-6">
                        <div className="bg-gradient-to-r from-purple-600 to-blue-600 p-4">
                            <h3 className="text-xl font-bold text-white">📋 Lista de Operações</h3>
                        </div>
                        <div className="p-4">
                            {lista.length === 0 ? (
                                <p className="text-center text-gray-500 py-8">Nenhuma operação cadastrada</p>
                            ) : (
                                <div className="space-y-3">
                                    {lista.map((op, index) => (
                                        <div key={index} className="flex items-center gap-4 p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-all" style={{flexWrap:'wrap'}}>
                                            {editandoIdx === index ? (
                                                <>
                                                    <input
                                                        type="text"
                                                        value={editForm.nome}
                                                        onChange={e=>setEditForm({...editForm,nome:e.target.value})}
                                                        style={{flex:'1',minWidth:'120px',padding:'8px 12px',border:'2px solid #6366f1',borderRadius:'8px',fontSize:'14px',fontWeight:'700',outline:'none'}}
                                                    />
                                                    <input
                                                        type="time"
                                                        value={editForm.meta}
                                                        onChange={e=>setEditForm({...editForm,meta:e.target.value})}
                                                        style={{padding:'8px 10px',border:'2px solid #6366f1',borderRadius:'8px',fontSize:'14px',outline:'none'}}
                                                    />
                                                    <input
                                                        type="number"
                                                        min="0"
                                                        step="0.01"
                                                        placeholder="Cubagem máx."
                                                        value={editForm.cubMax !== null && editForm.cubMax !== undefined ? editForm.cubMax : ''}
                                                        onChange={e=>setEditForm({...editForm,cubMax:e.target.value!==''?parseFloat(e.target.value):null})}
                                                        style={{width:'130px',padding:'8px 10px',border:'2px solid #f59e0b',borderRadius:'8px',fontSize:'14px',fontWeight:'700',color:'#92400e',background:'#fffbeb',outline:'none'}}
                                                    />
                                                    <button onClick={handleSalvarEdicao} style={{background:'linear-gradient(135deg,#059669,#10b981)',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontWeight:'700',fontSize:'13px',cursor:'pointer',boxShadow:'0 2px 8px rgba(5,150,105,0.4)',transition:'all 0.2s'}}>💾 Salvar</button>
                                                    <button onClick={handleCancelarEdicao} style={{background:'#6b7280',color:'white',border:'none',borderRadius:'8px',padding:'8px 12px',fontWeight:'700',fontSize:'13px',cursor:'pointer'}}>✕</button>
                                                </>
                                            ) : (
                                                <>
                                                    <div className="flex-1" style={{minWidth:'120px'}}>
                                                        <div className="font-bold text-gray-800">{op.nome}</div>
                                                        <div className="text-sm text-gray-600">Meta: {op.meta}</div>
                                                    </div>
                                                    <input 
                                                        type="time"
                                                        value={op.meta}
                                                        onChange={(e) => handleEditarMeta(index, e.target.value)}
                                                        className="p-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none"
                                                    />
                                                    <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                                                        <label style={{fontSize:'10px',fontWeight:'700',color:'#b45309',textTransform:'uppercase',letterSpacing:'0.4px'}}>🚛 Cubagem máx. (m³)</label>
                                                        <input
                                                            type="number"
                                                            min="0"
                                                            step="0.01"
                                                            placeholder="Sem limite"
                                                            value={op.cubMax !== null && op.cubMax !== undefined ? op.cubMax : ''}
                                                            onChange={(e) => handleEditarCubMax(index, e.target.value)}
                                                            style={{width:'130px',padding:'8px 10px',border:'2px solid #f59e0b',borderRadius:'8px',fontSize:'14px',fontWeight:'700',color:'#92400e',background:'#fffbeb',outline:'none'}}
                                                        />
                                                    </div>
                                                    <div style={{display:'flex',gap:'6px'}}>
                                                        <button 
                                                            onClick={() => handleIniciarEdicao(index)}
                                                            title="Editar operação"
                                                            style={{background:'linear-gradient(135deg,#3b82f6,#6366f1)',color:'white',border:'none',borderRadius:'8px',padding:'7px 12px',fontWeight:'700',fontSize:'13px',cursor:'pointer',boxShadow:'0 2px 8px rgba(99,102,241,0.35)',transition:'all 0.18s',display:'flex',alignItems:'center',gap:'4px'}}
                                                            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.08)';e.currentTarget.style.boxShadow='0 4px 14px rgba(99,102,241,0.5)';}}
                                                            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 2px 8px rgba(99,102,241,0.35)';}}
                                                        >✏️ <span style={{fontSize:'12px'}}>Editar</span></button>
                                                        <button

                                                            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.08)';e.currentTarget.style.boxShadow='0 4px 14px rgba(220,38,38,0.5)';}}
