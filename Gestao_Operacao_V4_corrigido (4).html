                              datalabels:{ display:(ctx)=>{ const i=ctx.dataIndex; return i>0&&i%3===0&&pontos[i]!==JANTA_INICIO&&pontos[i]!==JANTA_FIM; }, align:'top', anchor:'end', color:'#7c3aed', font:{size:9,weight:'700'}, formatter:v=>v!=null?v.toLocaleString('pt-BR'):'' }
                            },
                            // Cenário +1 sep
                            { label:`+1 sep. (${effSep+1})`, data:metaVolMais, borderColor:'#10b981', backgroundColor:'transparent', borderWidth:1.5, borderDash:[4,4], pointRadius:0, tension:0.3 },
                            // Meta NF acumulado (eixo secundário)
                            { label:`Meta NF acumulado (${effSep} sep.)`, data:metaNFAcum, borderColor:'#6366f1', backgroundColor:'transparent', borderWidth:2, borderDash:[6,2], pointRadius:(ctx)=>{ const i=ctx.dataIndex; return pontos[i]===FIM?7:0; }, tension:0.3, yAxisID:'y2',
                              datalabels:{ display:(ctx)=>{ const i=ctx.dataIndex; return i>0&&i%3===0&&pontos[i]!==JANTA_INICIO&&pontos[i]!==JANTA_FIM; }, align:'bottom', anchor:'end', color:'#4338ca', font:{size:9,weight:'700'}, formatter:v=>v!=null?v.toLocaleString('pt-BR'):'' }
                            },
                            // Linha de meta total (teto)
                            { label:'Meta total volumes', data:pontos.map(()=>totalVol), borderColor:'#ef4444', backgroundColor:'transparent', borderWidth:1.5, borderDash:[3,3], pointRadius:0, tension:0 },
                        ]
                    },
                    options:{
                        responsive:true, maintainAspectRatio:false,
                        interaction:{mode:'index',intersect:false},
                        plugins:{
                            legend:{position:'top',labels:{font:{size:10},boxWidth:12,padding:8}},
                            datalabels:{display:false},
                            tooltip:{
                                callbacks:{
                                    title: (items) => {
                                        const idx = items[0].dataIndex;
                                        const m = pontos[idx];
                                        const isJanta = m>=JANTA_INICIO&&m<=JANTA_FIM;
                                        return toHHMM(m)+(isJanta?' 🍽️ Janta':'');
                                    },
                                    afterBody: (items) => {
                                        const idx = items[0].dataIndex;
                                        const hef = horasEfAcum[idx];
                                        const pct = totalVol>0?Math.round((metaVolAcum[idx]/totalVol)*100):0;
                                        return [`⏱️ ${hef.toFixed(1)}h efetivas acumuladas`,`📊 ${pct}% da meta de volumes`];
                                    }
                                }
                            }
                        },
                        scales:{
                            x:{ grid:{color:(ctx)=>{ const m=pontos[ctx.index]; return(m===JANTA_INICIO||m===JANTA_FIM)?'#f59e0b66':'#f1f5f9'; }}, ticks:{font:{size:9}, maxTicksLimit:14,
                                callback:(val,i)=>{ const m=pontos[i]; if(m%60===0||m===INICIO||m===FIM)return toHHMM(m); return ''; } }
                            },
                            y:{ beginAtZero:true, grid:{color:'#f8fafc'}, title:{display:true,text:'Volumes acumulados',font:{size:10,weight:'600'}}, ticks:{font:{size:9},callback:v=>v.toLocaleString('pt-BR')} },
                            y2:{ beginAtZero:true, position:'right', grid:{display:false}, title:{display:true,text:'NF acumuladas',font:{size:10,weight:'600'}}, ticks:{font:{size:9},callback:v=>v.toLocaleString('pt-BR')} },
                        }
                    },
                    plugins:[ChartDataLabels]
                });
            },[totalNF,totalVol,sepP,sepNecessarios,nfPorSeparadorDia,volPorSeparadorDia,TURNO_HORAS,horaTurnoInicio,horaTurnoFim,horasDesconto]);

            // ── Gráfico 6: Tendência de NF por dia (se tiver mais de 1 dia) ──
            useEffect(()=>{
                destroy(instTrend);
                if(!refTrend.current||dadosPorDia.length<2) return;
                const ctx = refTrend.current.getContext('2d');
                instTrend.current = new Chart(ctx,{
                    type:'bar',
                    data:{
                        labels:dadosPorDia.map(d=>d.label),
                        datasets:[
                            { label:'NF/dia', data:dadosPorDia.map(d=>d.nf), backgroundColor:'#6366f188', borderColor:'#6366f1', borderWidth:2, borderRadius:6, yAxisID:'y' },
                            { label:'Volume/dia', data:dadosPorDia.map(d=>d.vol), backgroundColor:'#8b5cf688', borderColor:'#8b5cf6', borderWidth:2, borderRadius:6, yAxisID:'y2' },
                            { label:'Sep. Necessários', data:dadosPorDia.map(d=>d.sepNec), type:'line', borderColor:'#ef4444', backgroundColor:'transparent', borderWidth:2, borderDash:[5,3], tension:0.3, pointRadius:4, yAxisID:'y3' },
                        ]
                    },
                    options:{ responsive:true, maintainAspectRatio:false,
                        interaction:{mode:'index',intersect:false},
                        plugins:{ legend:{position:'top',labels:{font:{size:10},boxWidth:12,padding:8}},
                            datalabels:{display:true,align:'top',anchor:'end',color:'#374151',font:{size:9,weight:'700'},formatter:(v,c)=>c.datasetIndex===2?v+'👷':''}
                        },
                        scales:{
                            x:{grid:{display:false},ticks:{font:{size:10}}},
                            y:{beginAtZero:true,grid:{color:'#f8fafc'},title:{display:true,text:'NF',font:{size:10}},ticks:{font:{size:9},callback:v=>v.toLocaleString('pt-BR')}},
                            y2:{beginAtZero:true,position:'right',grid:{display:false},title:{display:true,text:'Volumes',font:{size:10}},ticks:{font:{size:9},callback:v=>v.toLocaleString('pt-BR')}},
                            y3:{beginAtZero:true,position:'right',display:false},
                        }
                    },
                    plugins:[ChartDataLabels]
                });
            },[dadosPorDia]);

            const card = (children, title, subtitle, emoji) => (
                <div style={{background:'white',borderRadius:'16px',border:'1px solid #e2e8f0',padding:'20px',boxShadow:'0 2px 12px rgba(0,0,0,0.04)'}}>
                    <div style={{marginBottom:'12px'}}>
                        <div style={{fontSize:'14px',fontWeight:'800',color:'#0f172a'}}>{emoji} {title}</div>
                        {subtitle&&<div style={{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}}>{subtitle}</div>}
                    </div>
                    {children}
                </div>
            );

            return (
                <div style={{marginTop:'28px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',paddingTop:'20px',borderTop:'2px solid #f1f5f9'}}>
                        <div style={{flex:1,height:'1px',background:'linear-gradient(to right,#6366f1,transparent)'}}></div>
                        <div style={{fontSize:'15px',fontWeight:'800',color:'#0f172a',whiteSpace:'nowrap'}}>📊 Gráficos de Análise</div>
                        <div style={{flex:1,height:'1px',background:'linear-gradient(to left,#6366f1,transparent)'}}></div>
                    </div>
                    <p style={{fontSize:'13px',color:'#64748b',marginBottom:'20px',textAlign:'center'}}>Visualizações detalhadas para apoio à decisão operacional</p>

                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:'20px'}}>

                        {card(
                            <div style={{height:'240px',position:'relative'}}><canvas ref={refDist}></canvas></div>,
                            'Necessário vs Presente','Separadores e conferentes: demanda x equipe atual','👷'
                        )}

                        {card(
                            <div style={{height:'240px',position:'relative'}}><canvas ref={refDonut}></canvas></div>,
                            sepP>0||confP>0?'Composição da equipe presente':'Composição mínima necessária',
                            sepP>0||confP>0?`${sepP+confP+auxP} colaboradores presentes`:`${sepNecessarios+confNecessarios} colaboradores mínimos`,'🧩'
                        )}

                        {card(
                            <div style={{height:'240px',position:'relative'}}><canvas ref={refUtil}></canvas></div>,
                            'Utilização da capacidade','% de uso por tipo de função e métrica — 🔴 acima do limite, 🟡 atenção, 🟢 ok','📈'
                        )}

                        {card(
                            <div style={{height:'240px',position:'relative'}}><canvas ref={refHora}></canvas></div>,
                            'Demanda vs Capacidade por hora','NF e Volumes por hora do turno vs capacidade da equipe','⏱️'
                        )}

                        {dadosPorDia.length >= 2 && card(
                            <div style={{height:'240px',position:'relative'}}><canvas ref={refTrend}></canvas></div>,
                            'Tendência do Período','NF e volumes por dia com necessidade de equipe','📅'
                        )}

                    </div>

                    {card(
                        <div style={{height:'340px',position:'relative'}}><canvas ref={refCenario}></canvas></div>,
                        'Linha do Tempo do Turno — Produção Acumulada',`${horaTurnoInicio} → ${horaTurnoFim} · ${horasDesconto}h janta · ${TURNO_HORAS.toFixed(1)}h efetivas · meta diária: ${totalVol.toLocaleString('pt-BR')} vol e ${totalNF.toLocaleString('pt-BR')} NF`,'⏱️'
                    )}
                </div>
            );
        }

        // ========== ANÁLISE DE CAPACIDADE — NOVA VERSÃO COM DIMENSIONAMENTO ==========
        function AnaliseCapacidade({ operacoes }) {
            const _now2 = new Date(); const _brt2 = new Date(_now2.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
            const hoje = `${_brt2.getFullYear()}-${String(_brt2.getMonth()+1).padStart(2,'0')}-${String(_brt2.getDate()).padStart(2,'0')}`;
            const [filtroTipo, setFiltroTipo] = useState('dia');
            const [dataInicio, setDataInicio] = useState(hoje);
            const [dataFim, setDataFim] = useState(hoje);

            // Parâmetros operacionais configuráveis
            const [horaTurnoInicio, setHoraTurnoInicio] = useState('13:40');
            const [horaTurnoFim, setHoraTurnoFim] = useState('22:00');
            const [horasDesconto, setHorasDesconto] = useState(1); // horas de intervalo

            // Capacidade individual — FONTE DA VERDADE para todos os cálculos
            const PADRAO_NF_SEP  = 80;  const PADRAO_VOL_SEP  = 600;
            const PADRAO_NF_CONF = 120; const PADRAO_VOL_CONF = 900;
            const PADRAO_NF_AUX  = 56;  const PADRAO_VOL_AUX  = 420;
            const [nfIndSep,  setNfIndSep]  = useState(PADRAO_NF_SEP);
            const [volIndSep, setVolIndSep] = useState(PADRAO_VOL_SEP);
            const [nfIndConf, setNfIndConf] = useState(PADRAO_NF_CONF);
            const [volIndConf,setVolIndConf]= useState(PADRAO_VOL_CONF);
            const [nfIndAux,  setNfIndAux]  = useState(PADRAO_NF_AUX);
            const [volIndAux, setVolIndAux] = useState(PADRAO_VOL_AUX);
            const resetIndividual = () => {
                setNfIndSep(PADRAO_NF_SEP); setVolIndSep(PADRAO_VOL_SEP);
                setNfIndConf(PADRAO_NF_CONF); setVolIndConf(PADRAO_VOL_CONF);
                setNfIndAux(PADRAO_NF_AUX); setVolIndAux(PADRAO_VOL_AUX);
            };
            // Espelhos — painéis superiores seguem os valores individuais
            const nfPorSeparadorDia  = nfIndSep;
            const volPorSeparadorDia = volIndSep;
            const nfPorConferenteDia  = nfIndConf;
            const volPorConferenteDia = volIndConf;

            // Equipe presente — salvo por data no localStorage
            const EQ_KEY = 'cap_equipe_v2';
            const AS_KEY = 'cap_autosave_hora';
            const lerTodos = () => { try { return JSON.parse(localStorage.getItem(EQ_KEY)||'{}'); } catch(e){ return {}; } };
            const lerDia   = (d) => { const t=lerTodos(); return t[d]||{sep:'',conf:'',aux:''}; };
            const [separadoresPresentes, setSeparadoresPresentes] = useState(() => lerDia(hoje).sep);
            const [conferentesPresentes, setConferentesPresentes] = useState(() => lerDia(hoje).conf);
            const [auxiliaresPresentes,  setAuxiliaresPresentes]  = useState(() => lerDia(hoje).aux);
            const [presencaSalva,  setPresencaSalva]  = useState(() => { const d=lerTodos(); return !!d[hoje]; });
            const [presencaMsg,    setPresencaMsg]    = useState('');
            const [autoSaveHora,   setAutoSaveHora]   = useState(() => { try { return localStorage.getItem(AS_KEY)||''; } catch(e){ return ''; } });
            const [autoSaveStatus, setAutoSaveStatus] = useState('');
            React.useEffect(() => {
                const v = lerDia(dataInicio);
                setSeparadoresPresentes(v.sep); setConferentesPresentes(v.conf); setAuxiliaresPresentes(v.aux);
                setPresencaSalva(!!lerTodos()[dataInicio]); setPresencaMsg('');
            }, [dataInicio]);
            React.useEffect(() => { setPresencaSalva(false); }, [separadoresPresentes, conferentesPresentes, auxiliaresPresentes]);
            const salvarPresenca = React.useCallback((silencioso) => {
                const todos = lerTodos();
                todos[dataInicio] = { sep: separadoresPresentes, conf: conferentesPresentes, aux: auxiliaresPresentes, salvoEm: new Date().toISOString() };
                localStorage.setItem(EQ_KEY, JSON.stringify(todos));
                setPresencaSalva(true);
                if (!silencioso) {
                    const hora = new Date().toLocaleTimeString('pt-BR', { timeZone:'America/Sao_Paulo', hour:'2-digit', minute:'2-digit' });
                    setPresencaMsg('✅ Presença salva às ' + hora);
                    setTimeout(() => setPresencaMsg(''), 4000);
                }
            }, [dataInicio, separadoresPresentes, conferentesPresentes, auxiliaresPresentes]);
            const salvarConfigAutoSave = React.useCallback(() => {
                try { localStorage.setItem(AS_KEY, autoSaveHora); } catch(e){}
                setAutoSaveStatus('✅ Auto-save configurado para ' + autoSaveHora + ' (Brasília)');
                setTimeout(() => setAutoSaveStatus(''), 4000);
            }, [autoSaveHora]);
            React.useEffect(() => {
                if (!autoSaveHora) return;
                const id = setInterval(() => {
                    const agora = new Date().toLocaleTimeString('pt-BR', { timeZone:'America/Sao_Paulo', hour:'2-digit', minute:'2-digit' });
                    if (agora === autoSaveHora) {
                        salvarPresenca(true);
                        setAutoSaveStatus('🕐 Auto-save executado às ' + agora);
                        setTimeout(() => setAutoSaveStatus(''), 6000);
                    }
                }, 30000);
                return () => clearInterval(id);
            }, [autoSaveHora, salvarPresenca]);

            // Tabs internas
            const [subAba, setSubAba] = useState('dimensionamento');

            // Gráfico refs
            const chartNFRef = useRef(null); const chartNFInst = useRef(null);
            const chartVolRef = useRef(null); const chartVolInst = useRef(null);
            const chartSepRef = useRef(null); const chartSepInst = useRef(null);
            const chartHoraRef = useRef(null); const chartHoraInst = useRef(null);
            const chartGaugeRef = useRef(null); const chartGaugeInst = useRef(null);
            const [tabelaAberta, setTabelaAberta] = useState(false);

            // Cálculo horas efetivas do turno
            const calcTurnoHoras = () => {
                const parseH = (s) => { if(!s||!s.includes(':')) return 0; const [h,m]=s.split(':').map(Number); return h+m/60; };
                const dur = parseH(horaTurnoFim) - parseH(horaTurnoInicio);
                return Math.max(dur - horasDesconto, 0.1);
            };
            const TURNO_HORAS = calcTurnoHoras();

            const formatLabel = (d) => {
                const dt = new Date(d + 'T00:00:00');
                return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            };

            // Dados filtrados
            const dadosFiltrados = useMemo(() => {
                return operacoes.filter(o => {
                    if (filtroTipo === 'dia') return o.data === dataInicio;
                    return o.data >= dataInicio && o.data <= dataFim;
                });
            }, [operacoes, filtroTipo, dataInicio, dataFim]);

            const datasUnicas = useMemo(() => {
                const s = new Set(dadosFiltrados.map(o => o.data));
                return Array.from(s).sort();
            }, [dadosFiltrados]);

            const isSingleDay = filtroTipo === 'dia';

            // Totais do período
            const totalNF = useMemo(() => dadosFiltrados.reduce((a,r) => a+(r.nf||0), 0), [dadosFiltrados]);
            const totalVol = useMemo(() => dadosFiltrados.reduce((a,r) => a+(r.vol||0), 0), [dadosFiltrados]);

            // ── DIMENSIONAMENTO NECESSÁRIO ──
            const sepNecPorNF = Math.ceil(totalNF / Math.max(nfPorSeparadorDia, 1));
            const sepNecPorVol = Math.ceil(totalVol / Math.max(volPorSeparadorDia, 1));
            const sepNecessarios = Math.max(sepNecPorNF, sepNecPorVol);
            const confNecPorNF = Math.ceil(totalNF / Math.max(nfPorConferenteDia, 1));
            const confNecPorVol = Math.ceil(totalVol / Math.max(volPorConferenteDia, 1));
            const confNecessarios = Math.max(confNecPorNF, confNecPorVol);

            // Capacidades por hora
            const nfCapHora = (nfPorSeparadorDia / TURNO_HORAS).toFixed(1);
            const volCapHora = (volPorSeparadorDia / TURNO_HORAS).toFixed(1);

            // ── ANÁLISE DA EQUIPE PRESENTE ──
            const sepP = parseInt(separadoresPresentes) || 0;
            const confP = parseInt(conferentesPresentes) || 0;
            const auxP = parseInt(auxiliaresPresentes) || 0;
            const totalPresentes = sepP + confP + auxP;

            const calcDiagnostico = () => {
                if (totalNF === 0) return { nivel: 'sem_dados', cor: '#94a3b8', label: 'Sem dados', descricao: 'Nenhuma operação cadastrada para este período.' };
                if (sepP === 0 && confP === 0) return { nivel: 'aguardando', cor: '#94a3b8', label: 'Aguardando equipe', descricao: 'Informe a quantidade de cada função presente para análise.' };

                const capNF = (sepP * nfIndSep) + (auxP * nfIndAux);
                const capVol = (sepP * volIndSep) + (auxP * volIndAux);
                const capConfNF = confP * nfIndConf;
                const capConfVol = confP * volIndConf;

                const pctNF = capNF > 0 ? (totalNF / capNF) * 100 : 999;
                const pctVol = capVol > 0 ? (totalVol / capVol) * 100 : 999;
                const pctConfNF = capConfNF > 0 ? (totalNF / capConfNF) * 100 : 0;
                const pctConfVol = capConfVol > 0 ? (totalVol / capConfVol) * 100 : 0;
                const pctMax = Math.max(pctNF, pctVol, pctConfNF, pctConfVol);

                // Calcula previsão de término
                const nfPorHora = (sepP * (nfPorSeparadorDia / TURNO_HORAS)) + (auxP * (nfPorSeparadorDia / TURNO_HORAS) * 0.7);
                const horasNecessarias = nfPorHora > 0 ? totalNF / nfPorHora : 999;
                const parseH = (s) => { if(!s||!s.includes(':')) return 0; const [h,m]=s.split(':').map(Number); return h+m/60; };
                const inicioH = parseH(horaTurnoInicio);
                const terminoH = inicioH + horasNecessarias + horasDesconto;
                const terminoHHMM = () => {
                    const h = Math.floor(terminoH);
                    const m = Math.round((terminoH - h) * 60);
                    return `${String(h%24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                };
                const terminoFim = parseH(horaTurnoFim);
                const atrasoHoras = terminoH - terminoFim;
                const atrasoMin = Math.round(Math.abs(atrasoHoras) * 60);

                let nivel, cor, label, descricao;
                if (terminoH <= 20) {
                    nivel = 'controle'; cor = '#10b981';
                    label = '✅ Operação sob controle';
                    descricao = `Equipe suficiente. Previsão de término: ${terminoHHMM()} (${atrasoMin}min antes do prazo). Capacidade utilizada: ${Math.round(pctMax)}%.`;
                } else if (terminoH <= 21) {
                    nivel = 'atencao'; cor = '#f59e0b';
                    label = '⚡ Atenção — operação no limite';
                    descricao = `Previsão de término: ${terminoHHMM()}. Capacidade utilizada em ${Math.round(pctMax)}%. Risco de leve atraso — monitore a evolução.`;
                } else if (terminoH <= 21 + 50/60) {
                    nivel = 'gargalo'; cor = '#ef4444';
                    label = '⚠️ Gargalo detectado';
                    descricao = `Previsão de término: ${terminoHHMM()} — atraso estimado de ${atrasoMin} min. Demanda ${Math.round(pctMax - 100)}% acima da capacidade atual.`;
                } else {
                    nivel = 'critico'; cor = '#dc2626';
                    label = '🚨 Situação crítica — reforce a equipe';
                    descricao = `Previsão de término: ${terminoHHMM()} — atraso estimado de ${atrasoMin} min. Sem reforço urgente a operação não será concluída no prazo. Necessário: +${Math.max(sepNecessarios-sepP,0)} separador(es) e +${Math.max(confNecessarios-confP,0)} conferente(s).`;
                }

                return {
                    nivel, cor, label, descricao,
                    pctNF: Math.round(pctNF), pctVol: Math.round(pctVol),
                    pctConfNF: Math.round(pctConfNF), pctConfVol: Math.round(pctConfVol),
                    capNF: Math.round(capNF), capVol: Math.round(capVol),
                    horasNecessarias: horasNecessarias.toFixed(1),
                    terminoHHMM: terminoHHMM(),
                    atrasoHoras, atrasoMin,
                    faltaSep: Math.max(sepNecessarios - sepP, 0),
                    faltaConf: Math.max(confNecessarios - confP, 0),
                };
            };

            const diag = calcDiagnostico();

            // Dados por dia para tabela e gráficos
            const dadosPorDia = useMemo(() => {
                return datasUnicas.map(data => {
                    const regs = dadosFiltrados.filter(o => o.data === data);
                    const nf = regs.reduce((a,r) => a+(r.nf||0), 0);
                    const vol = regs.reduce((a,r) => a+(r.vol||0), 0);
                    const sepNec = Math.max(Math.ceil(nf/Math.max(nfPorSeparadorDia,1)), Math.ceil(vol/Math.max(volPorSeparadorDia,1)));
                    const confNec = Math.max(Math.ceil(nf/Math.max(nfPorConferenteDia,1)), Math.ceil(vol/Math.max(volPorConferenteDia,1)));
                    const capNF = sepP * nfPorSeparadorDia;
                    const pctNF = capNF > 0 ? Math.round((nf/capNF)*100) : 0;
                    return { data, label: formatLabel(data), nf, vol, sepNec, confNec, pctNF, capNF };
                });
            }, [datasUnicas, dadosFiltrados, nfPorSeparadorDia, volPorSeparadorDia, nfPorConferenteDia, volPorConferenteDia, sepP]);

            // ── GRÁFICOS ──
            const destroyChart = (ref) => { if(ref.current){ref.current.destroy();ref.current=null;} };

            // Gráfico NF vs Capacidade
            useEffect(() => {
                destroyChart(chartNFInst);
                if(!chartNFRef.current||dadosPorDia.length===0) return;
                const ctx = chartNFRef.current.getContext('2d');
                const tp = isSingleDay?'bar':'line';
                const capLine = dadosPorDia.map(()=>sepP>0?sepP*nfPorSeparadorDia:sepNecessarios*nfPorSeparadorDia);
                chartNFInst.current = new Chart(ctx, {
                    type: tp,
                    data: {
                        labels: dadosPorDia.map(d=>d.label),
                        datasets: [
                            { label:'NF Realizada', data:dadosPorDia.map(d=>d.nf), borderColor:'#6366f1', backgroundColor: isSingleDay?'#6366f1cc':'#6366f122', borderRadius:8, tension:0.4, pointRadius:4, borderWidth:2.5, fill:!isSingleDay },
                            { label:`Cap. NF (${sepP||sepNecessarios} sep.)`, data:capLine, type:'line', borderColor:'#ef4444', backgroundColor:'transparent', borderWidth:2, borderDash:[6,3], tension:0, pointRadius:isSingleDay?6:3, fill:false }
                        ]
                    },
                    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:10}}, datalabels:{display:true,align:'top',anchor:'end',color:'#374151',font:{size:10,weight:'bold'},formatter:v=>v>0?v.toLocaleString('pt-BR'):''} }, scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{beginAtZero:true,grid:{color:'#f8fafc'},ticks:{callback:v=>v.toLocaleString('pt-BR'),font:{size:10}}} } },
                    plugins:[ChartDataLabels]
                });
            }, [dadosPorDia, sepP, nfPorSeparadorDia, isSingleDay]);

            // Gráfico Volumes
            useEffect(() => {
                destroyChart(chartVolInst);
                if(!chartVolRef.current||dadosPorDia.length===0) return;
                const ctx = chartVolRef.current.getContext('2d');
                const tp = isSingleDay?'bar':'line';
                const capLine = dadosPorDia.map(()=>sepP>0?sepP*volPorSeparadorDia:sepNecessarios*volPorSeparadorDia);
                chartVolInst.current = new Chart(ctx, {
                    type: tp,
                    data: {
                        labels: dadosPorDia.map(d=>d.label),
                        datasets: [
                            { label:'Volumes', data:dadosPorDia.map(d=>d.vol), borderColor:'#8b5cf6', backgroundColor:isSingleDay?'#8b5cf6cc':'#8b5cf622', borderRadius:8, tension:0.4, pointRadius:4, borderWidth:2.5, fill:!isSingleDay },
                            { label:`Cap. Vol (${sepP||sepNecessarios} sep.)`, data:capLine, type:'line', borderColor:'#f59e0b', backgroundColor:'transparent', borderWidth:2, borderDash:[6,3], tension:0, pointRadius:isSingleDay?6:3, fill:false }
                        ]
                    },
                    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:10}}, datalabels:{display:true,align:'top',anchor:'end',color:'#374151',font:{size:10,weight:'bold'},formatter:v=>v>0?v.toLocaleString('pt-BR'):''} }, scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{beginAtZero:true,grid:{color:'#f8fafc'},ticks:{callback:v=>v.toLocaleString('pt-BR'),font:{size:10}}} } },
                    plugins:[ChartDataLabels]
                });
            }, [dadosPorDia, sepP, volPorSeparadorDia, isSingleDay]);

            // Gráfico Separadores Necessários por dia
            useEffect(() => {
                destroyChart(chartSepInst);
                if(!chartSepRef.current||dadosPorDia.length===0) return;
                const ctx = chartSepRef.current.getContext('2d');
                const maxSep = Math.max(...dadosPorDia.map(d=>d.sepNec),1);
                chartSepInst.current = new Chart(ctx, {
                    type:'bar',
                    data: {
                        labels: dadosPorDia.map(d=>d.label),
                        datasets: [
                            { label:'Sep. Necessários', data:dadosPorDia.map(d=>d.sepNec), backgroundColor: dadosPorDia.map(d=>d.sepNec>(sepP||99)?'#ef444499':'#10b98199'), borderColor: dadosPorDia.map(d=>d.sepNec>(sepP||99)?'#ef4444':'#10b981'), borderWidth:2, borderRadius:6 },
                            { label:'Conf. Necessários', data:dadosPorDia.map(d=>d.confNec), backgroundColor: dadosPorDia.map(d=>d.confNec>(confP||99)?'#f59e0b99':'#3b82f699'), borderColor: dadosPorDia.map(d=>d.confNec>(confP||99)?'#f59e0b':'#3b82f6'), borderWidth:2, borderRadius:6 },
                            sepP>0?{ label:`Presentes (${sepP} sep. / ${confP} conf.)`, data:dadosPorDia.map(()=>Math.max(sepP,confP)), type:'line', borderColor:'#6366f1', backgroundColor:'transparent', borderWidth:2, borderDash:[5,3], tension:0, pointRadius:0, fill:false }:null,
                        ].filter(Boolean)
                    },
                    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:10}}, datalabels:{display:true,align:'top',anchor:'end',color:'#374151',font:{size:10,weight:'bold'},formatter:v=>v>0?v.toLocaleString('pt-BR'):''} }, scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{beginAtZero:true,grid:{color:'#f8fafc'},ticks:{font:{size:10}}} } },
                    plugins:[ChartDataLabels]
                });
            }, [dadosPorDia, sepP, confP, isSingleDay]);

            // Gráfico ocupação por hora
            useEffect(() => {
                destroyChart(chartHoraInst);
                if(!chartHoraRef.current||totalNF===0) return;
                const ctx = chartHoraRef.current.getContext('2d');
                const parseH = (s)=>{ if(!s||!s.includes(':'))return 0; const [h,m]=s.split(':').map(Number); return h+m/60; };
                const inicio = parseH(horaTurnoInicio);
                const fim = parseH(horaTurnoFim);
                const horas = [];
                for(let h=inicio; h<fim; h+=1) { horas.push(`${Math.floor(h).toString().padStart(2,'0')}:00`); }
                const nfHora = totalNF / TURNO_HORAS;
                const volHora = totalVol / TURNO_HORAS;
                const capNFHora = (sepP||sepNecessarios) * (nfPorSeparadorDia/TURNO_HORAS);
                chartHoraInst.current = new Chart(ctx, {
                    type:'line',
                    data: {
                        labels: horas,
                        datasets: [
                            { label:'NF/hora (demanda)', data:horas.map(()=>Math.round(nfHora)), borderColor:'#6366f1', backgroundColor:'#6366f122', borderWidth:2.5, tension:0.2, pointRadius:3, fill:true },
                            { label:`Cap. NF/hora (${sepP||sepNecessarios} sep.)`, data:horas.map(()=>Math.round(capNFHora)), borderColor:'#ef4444', backgroundColor:'transparent', borderWidth:2, borderDash:[5,3], tension:0, pointRadius:0, fill:false },
                        ]
                    },
                    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:10}}, datalabels:{display:false} }, scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{beginAtZero:true,grid:{color:'#f8fafc'},ticks:{font:{size:10},callback:v=>v.toLocaleString('pt-BR')}} } }
                });
            }, [totalNF, totalVol, sepP, confP, nfPorSeparadorDia, volPorSeparadorDia, TURNO_HORAS, horaTurnoInicio, horaTurnoFim, isSingleDay]);

            const StatusGauge = ({ pct, label, cor }) => {
                const clamped = Math.min(pct, 150);
                const angle = (clamped / 150) * 180;
                const r = 60, cx = 75, cy = 75;
                const toRad = deg => deg * Math.PI / 180;
                const arcPath = (startDeg, endDeg, color) => {
                    const s = toRad(startDeg-180); const e = toRad(endDeg-180);
                    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
                    const large = (endDeg-startDeg)>180?1:0;
                    return <path d={`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`} stroke={color} strokeWidth="12" fill="none" strokeLinecap="round"/>;
                };
                const needleX = cx + (r-8)*Math.cos(toRad(angle-180));
                const needleY = cy + (r-8)*Math.sin(toRad(angle-180));
                return (
                    <div style={{textAlign:'center'}}>
                        <svg viewBox="0 0 150 90" style={{width:'100%',maxWidth:'150px',display:'block',margin:'0 auto'}}>
                            {arcPath(0,60,'#10b981')}{arcPath(60,100,'#f59e0b')}{arcPath(100,150,'#ef4444')}
                            <line x1={cx} y1={cy} x2={needleX} y2={needleY} stroke={cor} strokeWidth="3" strokeLinecap="round"/>
                            <circle cx={cx} cy={cy} r="5" fill={cor}/>
                            <text x={cx} y={cy+15} textAnchor="middle" fontSize="14" fontWeight="800" fill={cor}>{pct}%</text>
                        </svg>
                        <div style={{fontSize:'11px',fontWeight:'600',color:'#6b7280',marginTop:'4px'}}>{label}</div>
                    </div>
                );
            };

            const PctBar = ({ value, max, cor, label }) => {
                const pct = max > 0 ? Math.min((value/max)*100, 120) : 0;
                const barColor = pct >= 100 ? '#ef4444' : pct >= 80 ? '#f59e0b' : '#10b981';
                return (
                    <div style={{marginBottom:'12px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
                            <span style={{fontSize:'12px',fontWeight:'600',color:'#374151'}}>{label}</span>
                            <span style={{fontSize:'12px',fontWeight:'700',color:barColor}}>{Math.round(pct)}%</span>
                        </div>
                        <div style={{background:'#f1f5f9',borderRadius:'99px',height:'8px',overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${Math.min(pct,100)}%`,background:barColor,borderRadius:'99px',transition:'width 0.8s ease'}}></div>
                        </div>
                        <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'3px'}}>{value.toLocaleString('pt-BR')} / {max.toLocaleString('pt-BR')}</div>
                    </div>
                );
            };

            // Cards styling vars
            const cardStyle = (gradient) => ({ background:gradient, borderRadius:'16px', padding:'20px', color:'white', boxShadow:'0 4px 24px rgba(0,0,0,0.12)', transition:'transform 0.2s', cursor:'default' });

            return (
                <div style={{fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
                    {/* Header */}
                    <div style={{marginBottom:'24px'}}>
                        <h2 style={{fontSize:'26px',fontWeight:'800',color:'#0f172a',margin:'0 0 4px 0',letterSpacing:'-0.5px'}}>
                            👥 Capacidade Operacional
                        </h2>
                        <p style={{color:'#64748b',fontSize:'14px',margin:0}}>Dimensionamento de equipe, diagnóstico em tempo real e análise de capacidade</p>
                    </div>

                    {/* Sub-tabs */}
                    <div style={{display:'flex',gap:'4px',marginBottom:'24px',background:'#f1f5f9',padding:'4px',borderRadius:'12px',width:'fit-content'}}>
                        {[['dimensionamento','⚡ Dimensionamento'],['capacidade','📊 Capacidade'],['configuracoes','⚙️ Parâmetros']].map(([k,lb])=>(
                            <button key={k} onClick={()=>setSubAba(k)} style={{padding:'8px 16px',fontWeight:'700',fontSize:'13px',border:'none',cursor:'pointer',borderRadius:'9px',background:subAba===k?'white':'transparent',color:subAba===k?'#4f46e5':'#64748b',boxShadow:subAba===k?'0 2px 8px rgba(0,0,0,0.1)':'none',transition:'all 0.2s'}}>{lb}</button>
                        ))}
                    </div>

                    {/* FILTROS GLOBAIS */}
                    <div style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:'16px',padding:'20px',marginBottom:'24px',boxShadow:'0 4px 24px rgba(79,70,229,0.25)'}}>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'12px'}}>
                            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'10px',padding:'12px'}}>
                                <label style={{display:'block',fontSize:'11px',fontWeight:'700',color:'rgba(255,255,255,0.8)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.5px'}}>📅 Período</label>
                                <select value={filtroTipo} onChange={e=>{setFiltroTipo(e.target.value);if(e.target.value==='dia')setDataFim(dataInicio);}} style={{width:'100%',padding:'8px',borderRadius:'8px',border:'none',fontWeight:'600',fontSize:'13px',background:'white',color:'#1e293b'}}>
                                    <option value="dia">Dia específico</option>
                                    <option value="periodo">Intervalo de datas</option>
                                </select>
                            </div>
                            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'10px',padding:'12px'}}>
                                <label style={{display:'block',fontSize:'11px',fontWeight:'700',color:'rgba(255,255,255,0.8)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.5px'}}>📆 {filtroTipo==='dia'?'Data':'Data início'}</label>
                                <input type="date" value={dataInicio} onChange={e=>{setDataInicio(e.target.value);if(filtroTipo==='dia')setDataFim(e.target.value);}} style={{width:'100%',padding:'8px',borderRadius:'8px',border:'none',fontWeight:'600',fontSize:'13px',boxSizing:'border-box'}}/>
                            </div>
                            {filtroTipo==='periodo'&&(
                                <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'10px',padding:'12px'}}>
                                    <label style={{display:'block',fontSize:'11px',fontWeight:'700',color:'rgba(255,255,255,0.8)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.5px'}}>📆 Data fim</label>
                                    <input type="date" value={dataFim} onChange={e=>setDataFim(e.target.value)} style={{width:'100%',padding:'8px',borderRadius:'8px',border:'none',fontWeight:'600',fontSize:'13px',boxSizing:'border-box'}}/>
                                </div>
                            )}
                            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'10px',padding:'12px',display:'flex',gap:'8px',alignItems:'flex-end'}}>
                                <div style={{flex:1}}>
                                    <label style={{display:'block',fontSize:'11px',fontWeight:'700',color:'rgba(255,255,255,0.8)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.5px'}}>📋 Totais do período</label>
                                    <div style={{color:'white',fontSize:'13px',fontWeight:'700'}}>{totalNF.toLocaleString('pt-BR')} NF &nbsp;|&nbsp; {totalVol.toLocaleString('pt-BR')} Vol</div>
                                    <div style={{color:'rgba(255,255,255,0.7)',fontSize:'11px',marginTop:'2px'}}>{datasUnicas.length} dia(s) de operação</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {dadosFiltrados.length === 0 ? (
                        <div style={{background:'#f8fafc',border:'2px dashed #e2e8f0',borderRadius:'16px',padding:'60px',textAlign:'center'}}>
                            <div style={{fontSize:'48px',marginBottom:'12px'}}>📭</div>
                            <div style={{fontSize:'18px',fontWeight:'700',color:'#64748b'}}>Nenhum dado para este período</div>
                            <div style={{color:'#94a3b8',marginTop:'6px',fontSize:'14px'}}>Cadastre operações ou ajuste os filtros acima</div>
                        </div>
                    ) : (
                        <>
                        {/* ═══════════ ABA: DIMENSIONAMENTO ═══════════ */}
                        {subAba === 'dimensionamento' && (
                            <div>
                                {/* PAINEL EQUIPE NECESSÁRIA */}
                                <div style={{background:'white',borderRadius:'16px',border:'1px solid #e2e8f0',padding:'24px',marginBottom:'20px',boxShadow:'0 2px 12px rgba(0,0,0,0.04)'}}>
                                    <h3 style={{fontSize:'16px',fontWeight:'800',color:'#0f172a',margin:'0 0 6px 0'}}>🎯 Equipe mínima necessária para hoje</h3>
                                    <p style={{fontSize:'13px',color:'#64748b',margin:'0 0 20px 0'}}>Calculado com base na volumetria do dia selecionado e nos parâmetros configurados.</p>
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'16px'}}>
                                        <div style={cardStyle('linear-gradient(135deg,#6366f1,#4338ca)')}>
                                            <div style={{fontSize:'32px',fontWeight:'900',lineHeight:1}}>{sepNecessarios}</div>
                                            <div style={{fontSize:'14px',fontWeight:'700',marginTop:'6px',opacity:0.95}}>Separadores</div>
                                            <div style={{fontSize:'11px',opacity:0.8,marginTop:'4px'}}>{totalNF.toLocaleString('pt-BR')} NF ÷ {nfPorSeparadorDia} NF/sep</div>
                                            <div style={{fontSize:'11px',opacity:0.8}}>{totalVol.toLocaleString('pt-BR')} vol ÷ {volPorSeparadorDia} vol/sep</div>
                                        </div>
                                        <div style={cardStyle('linear-gradient(135deg,#0ea5e9,#0284c7)')}>
                                            <div style={{fontSize:'32px',fontWeight:'900',lineHeight:1}}>{confNecessarios}</div>
                                            <div style={{fontSize:'14px',fontWeight:'700',marginTop:'6px',opacity:0.95}}>Conferentes</div>
                                            <div style={{fontSize:'11px',opacity:0.8,marginTop:'4px'}}>{totalNF.toLocaleString('pt-BR')} NF ÷ {nfPorConferenteDia} NF/conf</div>
                                            <div style={{fontSize:'11px',opacity:0.8}}>{totalVol.toLocaleString('pt-BR')} vol ÷ {volPorConferenteDia} vol/conf</div>
                                        </div>
                                        <div style={cardStyle('linear-gradient(135deg,#8b5cf6,#7c3aed)')}>
                                            <div style={{fontSize:'32px',fontWeight:'900',lineHeight:1}}>{(sepNecessarios+confNecessarios)}</div>
                                            <div style={{fontSize:'14px',fontWeight:'700',marginTop:'6px',opacity:0.95}}>Total mínimo</div>
                                            <div style={{fontSize:'11px',opacity:0.8,marginTop:'4px'}}>Turno: {horaTurnoInicio} → {horaTurnoFim}</div>
                                            <div style={{fontSize:'11px',opacity:0.8}}>{TURNO_HORAS.toFixed(1)}h efetivas</div>
                                        </div>
                                        <div style={{...cardStyle('linear-gradient(135deg,#f59e0b,#d97706)'), border: sepP>0||confP>0?'2px solid rgba(255,255,255,0.5)':'2px dashed rgba(255,255,255,0.5)'}}>
                                            <div style={{fontSize:'13px',fontWeight:'700',opacity:0.9,marginBottom:'6px'}}>Capacidade/hora</div>
                                            <div style={{fontSize:'14px',fontWeight:'800'}}>📄 {nfCapHora} NF/h · sep.</div>
                                            <div style={{fontSize:'14px',fontWeight:'800',marginTop:'4px'}}>📦 {volCapHora} vol/h · sep.</div>
                                            <div style={{fontSize:'11px',opacity:0.8,marginTop:'6px'}}>Por separador no turno</div>
                                        </div>
                                    </div>
                                </div>

                                {/* EQUIPE PRESENTE — DIAGNÓSTICO */}
                                <div style={{background:'white',borderRadius:'16px',border:'1px solid #e2e8f0',padding:'24px',marginBottom:'20px',boxShadow:'0 2px 12px rgba(0,0,0,0.04)'}}>
                                    <h3 style={{fontSize:'16px',fontWeight:'800',color:'#0f172a',margin:'0 0 4px 0'}}>⚡ Diagnóstico da Operação</h3>
                                    <p style={{fontSize:'13px',color:'#64748b',margin:'0 0 20px 0'}}>Informe a equipe presente para ver o status em tempo real e a previsão de término.</p>
                                    
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px',marginBottom:'24px'}}>
                                        {[
                                            {label:'👷 Separadores presentes',val:separadoresPresentes,set:setSeparadoresPresentes,color:'#6366f1',nec:sepNecessarios},
                                            {label:'🔍 Conferentes presentes',val:conferentesPresentes,set:setConferentesPresentes,color:'#0ea5e9',nec:confNecessarios},
                                            {label:'🤝 Auxiliares presentes',val:auxiliaresPresentes,set:setAuxiliaresPresentes,color:'#8b5cf6',nec:0},
                                        ].map(({label,val,set,color,nec})=>{
                                            const num = parseInt(val)||0;
                                            const diff = num-nec;
                                            return (
                                                <div key={label} style={{background:'#f8fafc',borderRadius:'12px',padding:'16px',border:`2px solid ${num>0?(diff>=0?'#10b981':'#ef4444'):'#e2e8f0'}`}}>
                                                    <label style={{display:'block',fontSize:'12px',fontWeight:'700',color:'#374151',marginBottom:'8px'}}>{label}</label>
                                                    <input type="number" min="0" value={val} onChange={e=>set(e.target.value)} placeholder="0" style={{width:'100%',padding:'10px',border:`2px solid ${color}`,borderRadius:'8px',fontSize:'20px',fontWeight:'900',color:color,textAlign:'center',boxSizing:'border-box',background:'white'}}/>
                                                    {nec>0&&<div style={{marginTop:'6px',fontSize:'11px',fontWeight:'600',color:num>=nec?'#10b981':'#ef4444',textAlign:'center'}}>{num>=nec?`✅ OK (mín: ${nec})`:`⚠️ Mín. necessário: ${nec}`}</div>}
                                                    {nec===0&&<div style={{marginTop:'6px',fontSize:'11px',color:'#94a3b8',textAlign:'center'}}>Capacidade +70%</div>}
                                                </div>
                                            );
                                        })}
                                        <div style={{background:'#f8fafc',borderRadius:'12px',padding:'16px',border:'2px solid #e2e8f0',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center'}}>
                                            <div style={{fontSize:'13px',fontWeight:'700',color:'#64748b',marginBottom:'8px'}}>👥 Total presente</div>
                                            <div style={{fontSize:'36px',fontWeight:'900',color:'#0f172a'}}>{totalPresentes}</div>
                                            <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}}>colaboradores</div>
                                        </div>
                                    </div>

                                    {/* CONFIRMAR PRESENÇA */}
                                    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}}>
                                        <button onClick={() => salvarPresenca(false)} style={{background:presencaSalva?'#10b981':'linear-gradient(135deg,#6366f1,#0ea5e9)',color:'white',border:'none',borderRadius:'10px',padding:'12px 28px',fontSize:'14px',fontWeight:'800',cursor:'pointer',display:'flex',alignItems:'center',gap:'8px',boxShadow:presencaSalva?'0 2px 8px #10b98140':'0 4px 12px #6366f140',transition:'all 0.2s'}}>
                                            {presencaSalva ? '✅ Presença Confirmada' : '💾 Confirmar Presença'}
                                        </button>
                                        {presencaMsg && <span style={{fontSize:'13px',fontWeight:'700',color:'#10b981',background:'#f0fdf4',padding:'8px 14px',borderRadius:'8px',border:'1px solid #bbf7d0'}}>{presencaMsg}</span>}
                                        {autoSaveStatus && <span style={{fontSize:'13px',fontWeight:'700',color:'#6366f1',background:'#eef2ff',padding:'8px 14px',borderRadius:'8px',border:'1px solid #c7d2fe'}}>{autoSaveStatus}</span>}
                                        {!presencaSalva && (separadoresPresentes||conferentesPresentes||auxiliaresPresentes) && <span style={{fontSize:'12px',color:'#f59e0b',fontWeight:'700'}}>⚠️ Alterações não salvas</span>}
                                    </div>

                                    {/* STATUS BANNER */}
                                    {diag.nivel !== 'aguardando' && diag.nivel !== 'sem_dados' ? (
                                        <div>
                                            <div style={{background:diag.cor+'18',border:`2px solid ${diag.cor}40`,borderRadius:'14px',padding:'20px',marginBottom:'20px'}} className={diag.nivel==='critico'?'critico-banner':diag.nivel==='atencao'?'atencao-banner':diag.nivel==='controle'?'controle-banner':diag.nivel==='gargalo'?'gargalo-banner':''}>
                                                <div style={{display:'flex',alignItems:'flex-start',gap:'16px'}}>
                                                    <div style={{fontSize:'40px',lineHeight:1}} className={diag.nivel==='critico'?'critico-icon':diag.nivel==='atencao'?'atencao-icon':diag.nivel==='controle'?'controle-icon':diag.nivel==='gargalo'?'gargalo-icon':''}>
                                                        {diag.nivel==='controle'?'✅':diag.nivel==='atencao'?'⚡':diag.nivel==='gargalo'?'⚠️':'🚨'}
                                                    </div>
                                                    <div style={{flex:1}}>

                                                    </tr>
                                                </tfoot>
                                            </table>

                                </div>

            // ── SIPOC ──
            const [sipoc, setSipoc] = React.useState({

            // ── VSM ──
            const [vsmEtapas, setVsmEtapas] = React.useState([
                { id:1, nome:'Recebimento', tipo:'VA', tc:15, espera:5 },
                { id:2, nome:'Separação', tipo:'VA', tc:25, espera:10 },
                { id:3, nome:'Conferência', tipo:'NVA', tc:12, espera:3 },

            const [novaEtapa, setNovaEtapa] = React.useState({nome:'',tipo:'VA',tc:0,espera:0});

            // ── ISHIKAWA ──
            const [ishiCausas, setIshiCausas] = React.useState({

            });
            const [ishiEfeito, setIshiEfeito] = React.useState('Operações fora do prazo');
            const [ishiEditEfeito, setIshiEditEfeito] = React.useState(false);
            const ishiCats = [
                {key:'maquina',label:'MÁQUINA',cor:'#3b82f6'},
                {key:'metodo',label:'MÉTODO',cor:'#8b5cf6'},
                {key:'maodeobra',label:'MÃO DE OBRA',cor:'#ec4899'},
                {key:'material',label:'MATERIAL',cor:'#f59e0b'},
                {key:'meioambiente',label:'MEIO AMBIENTE',cor:'#10b981'},
                {key:'medicao',label:'MEDIÇÃO',cor:'#ef4444'},
            ];
            const [ishiNovas, setIshiNovas] = React.useState({maquina:'',metodo:'',maodeobra:'',material:'',meioambiente:'',medicao:''});

            const aplicarPeriodo = (tipo) => {
                setPeriodoTipo(tipo);
                const d = new Date(hoje);
                if (tipo === 'hoje') { setDataInicio(hoje); setDataFim(hoje); }
                else if (tipo === 'semana') { d.setDate(d.getDate() - 6); setDataInicio(d.toISOString().split('T')[0]); setDataFim(hoje); }
                else if (tipo === 'mes') { d.setDate(1); setDataInicio(d.toISOString().split('T')[0]); setDataFim(hoje); }
                else if (tipo === 'trimestre') { d.setDate(1); d.setMonth(d.getMonth() - 2); setDataInicio(d.toISOString().split('T')[0]); setDataFim(hoje); }
            };

            const opcoesOp = React.useMemo(() => {
                const s = new Set(operacoes.map(o => o.operacao));
                return ['TODAS', ...Array.from(s)];
            }, [operacoes]);

            const dadosFiltrados = React.useMemo(() => {
                return operacoes.filter(op => {
                    const dentroData = op.data >= dataInicio && op.data <= dataFim;
                    const dentroOp = opFiltro === 'TODAS' || op.operacao === opFiltro;
                    return dentroData && dentroOp;
                });
            }, [operacoes, dataInicio, dataFim, opFiltro]);

            const kpis = React.useMemo(() => {
                const total = dadosFiltrados.length;
                const verde = dadosFiltrados.filter(o => o.status === 'verde').length;
                const vermelho = dadosFiltrados.filter(o => o.status === 'vermelho').length;
                const amarelo = dadosFiltrados.filter(o => o.status === 'amarelo').length;
                const taxaSucesso = total > 0 ? ((verde / total) * 100) : 0;
                const taxaAtraso = total > 0 ? ((vermelho / total) * 100) : 0;
                const nfTotal = dadosFiltrados.reduce((a, o) => a + (o.nf || 0), 0);
                const volTotal = dadosFiltrados.reduce((a, o) => a + (o.vol || 0), 0);
                const cubTotal = dadosFiltrados.reduce((a, o) => a + (o.cubagem || 0), 0);
                const nfMedio = total > 0 ? (nfTotal / total) : 0;
                const volMedio = total > 0 ? (volTotal / total) : 0;
                let duracoes = [];
                dadosFiltrados.forEach(o => {
                    if (o.inicio && o.termino) {
                        const [hi, mi] = o.inicio.split(':').map(Number);
                        const [ht, mt] = o.termino.split(':').map(Number);
                        const dur = (ht * 60 + mt) - (hi * 60 + mi);
                        if (dur > 0) duracoes.push(dur);
                    }
                });
                const duracaoMedia = duracoes.length > 0 ? (duracoes.reduce((a,b)=>a+b,0)/duracoes.length) : 0;
                const duracaoMediaH = Math.floor(duracaoMedia / 60);
                const duracaoMediaM = Math.round(duracaoMedia % 60);
                const diasUnicos = new Set(dadosFiltrados.map(o => o.data)).size;
                const mediaPorDia = diasUnicos > 0 ? (total / diasUnicos) : 0;
                return { total, verde, vermelho, amarelo, taxaSucesso, taxaAtraso, nfTotal, volTotal, cubTotal, nfMedio, volMedio, duracaoMediaH, duracaoMediaM, diasUnicos, mediaPorDia, duracoes };
            }, [dadosFiltrados]);

            const rankingOps = React.useMemo(() => {
                const porOp = {};
                dadosFiltrados.forEach(o => {
                    if (!porOp[o.operacao]) porOp[o.operacao] = { nome: o.operacao, total: 0, verde: 0, vermelho: 0, amarelo: 0, nf: 0, vol: 0, cub: 0, registros: [] };
                    porOp[o.operacao].total++;
                    porOp[o.operacao][o.status]++;
                    porOp[o.operacao].nf += (o.nf || 0);
                    porOp[o.operacao].vol += (o.vol || 0);
                    porOp[o.operacao].cub += (o.cubagem || 0);
                    porOp[o.operacao].registros.push(o);
                });
                return Object.values(porOp).map(op => ({ ...op, taxa: op.total > 0 ? ((op.verde / op.total) * 100) : 0 })).sort((a, b) => b.taxa - a.taxa);
            }, [dadosFiltrados]);

            const evolucaoDiaria = React.useMemo(() => {
                const porData = {};
                dadosFiltrados.forEach(o => {
                    if (!porData[o.data]) porData[o.data] = { verde: 0, vermelho: 0, amarelo: 0, total: 0, nf: 0, vol: 0, cubagem: 0, registros: [] };
                    porData[o.data][o.status]++;
                    porData[o.data].total++;
                    porData[o.data].nf += (o.nf || 0);
                    porData[o.data].vol += (o.vol || 0);
                    porData[o.data].cubagem += (o.cubagem || 0);
                    porData[o.data].registros.push(o);
                });
                const datas = Object.keys(porData).sort();
                return {
                    labels: datas.map(d => { const [y,m,dia] = d.split('-'); return `${dia}/${m}`; }),
                    taxas: datas.map(d => porData[d].total > 0 ? +((porData[d].verde / porData[d].total) * 100).toFixed(1) : 0),
                    nfs: datas.map(d => porData[d].nf),
                    vols: datas.map(d => porData[d].vol),
                    cubagens: datas.map(d => porData[d].cubagem),
                    verdes: datas.map(d => porData[d].verde),
                    vermelhos: datas.map(d => porData[d].vermelho),
                    amarelos: datas.map(d => porData[d].amarelo),
                    porData
                };
            }, [dadosFiltrados]);

            const distribHora = React.useMemo(() => {
                const horarios = {};
                dadosFiltrados.forEach(o => { if (o.termino) { const h = o.termino.split(':')[0] + 'h'; horarios[h] = (horarios[h] || 0) + 1; } });
                const keys = Object.keys(horarios).sort();
                return { labels: keys, values: keys.map(k => horarios[k]) };
            }, [dadosFiltrados]);

            const metaVsReal = React.useMemo(() => {
                const porOp = {};
                dadosFiltrados.forEach(o => {
                    if (!porOp[o.operacao]) porOp[o.operacao] = { meta: o.meta || '—', verde: 0, total: 0 };
                    porOp[o.operacao].verde += o.status === 'verde' ? 1 : 0;
                    porOp[o.operacao].total++;
                });
                return Object.entries(porOp).map(([nome, v]) => ({ nome, meta: v.meta, taxa: v.total > 0 ? ((v.verde / v.total) * 100).toFixed(1) : '0', total: v.total, verde: v.verde })).sort((a,b) => parseFloat(b.taxa) - parseFloat(a.taxa));
            }, [dadosFiltrados]);

            const cepData = React.useMemo(() => {
                const taxas = evolucaoDiaria.taxas;
                if (taxas.length < 2) return null;
                const media = taxas.reduce((a,b)=>a+b,0)/taxas.length;
                const desv = Math.sqrt(taxas.reduce((a,b)=>a+(b-media)**2,0)/taxas.length);
                const lcs = Math.min(100, media + 3*desv);
                const lci = Math.max(0, media - 3*desv);
                return { labels: evolucaoDiaria.labels, values: taxas, media: media.toFixed(1), lcs: lcs.toFixed(1), lci: lci.toFixed(1), desv: desv.toFixed(2) };
            }, [evolucaoDiaria]);

            // ── Gráficos ──
            React.useEffect(() => {
                if (abaFerramenta !== 'kpis') return;

                        type: 'line',
                        data: { labels: evolucaoDiaria.labels, datasets: [{ label: 'Taxa de Sucesso (%)', data: evolucaoDiaria.taxas, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.12)', tension: 0.4, fill: true, borderWidth: 2.5, pointBackgroundColor: evolucaoDiaria.taxas.map(t => t >= 80 ? '#10b981' : t >= 50 ? '#f59e0b' : '#ef4444'), pointRadius: 4 }] },
