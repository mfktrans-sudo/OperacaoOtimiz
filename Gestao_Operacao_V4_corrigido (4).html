    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .status-verde { background-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .status-vermelho { background-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .status-amarelo { background-color: #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        
        .tab-active { background: white; color: #667eea; font-weight: bold; }
        .tab-inactive { background: rgba(255,255,255,0.2); color: white; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes swing {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .icon-bounce {
            animation: bounce 2s ease-in-out infinite;
        }

        .icon-rotate {
            animation: rotate 3s linear infinite;
        }

        .icon-swing {
            animation: swing 2s ease-in-out infinite;
        }

        .icon-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        .operation-card {
            transition: all 0.3s ease;
        }

        .operation-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .btn-animated {
            transition: all 0.2s ease;
        }

        .btn-animated:hover {
            transform: scale(1.05);
        }

        .btn-animated:active {
            transform: scale(0.95);
        }

        .editable-row:hover {
            background-color: #f3f4f6;
        }

        .input-edit {
            border: 2px solid #667eea;
            background-color: #f0f4ff;
        }

        .chart-container {
            position: relative;
            height: 300px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .filter-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin: 4px;
        }

        .filter-tag button {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }

        /* ═══════════ TORRE DE CONTROLE — ESTILOS ═══════════ */
        .torre-wrapper { font-family: 'Inter', -apple-system, sans-serif; }
        .torre-header-bar {
            background: linear-gradient(135deg, #1a0a3e 0%, #2d1b69 50%, #1a0a3e 100%);
            border-radius: 16px; padding: 20px 28px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; box-shadow: 0 8px 32px rgba(102,65,234,0.35);
        }
        .torre-header-title { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
        .torre-header-subtitle { font-size: 12px; color: rgba(200,180,255,0.8); margin-top: 2px; }
        .torre-badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #e0d5ff; font-weight: 600; }
        .torre-section-title { font-size: 13px; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 12px; display: flex; align-items: center; gap: 6px; }
        .torre-section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, #7c3aed33, transparent); }
        .torre-kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .torre-kpi-card { background: #fff; border-radius: 14px; padding: 16px 18px; border: 1.5px solid #ede9fe; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .torre-kpi-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(102,65,234,0.15); }
        .torre-kpi-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
        .torre-kpi-card.purple::before { background: linear-gradient(90deg,#7c3aed,#a78bfa); }
        .torre-kpi-card.green::before  { background: linear-gradient(90deg,#10b981,#34d399); }
        .torre-kpi-card.red::before    { background: linear-gradient(90deg,#ef4444,#f87171); }
        .torre-kpi-card.amber::before  { background: linear-gradient(90deg,#f59e0b,#fbbf24); }
        .torre-kpi-card.blue::before   { background: linear-gradient(90deg,#3b82f6,#60a5fa); }
        .torre-kpi-label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .torre-kpi-value { font-size: 28px; font-weight: 800; color: #1f2937; line-height: 1; }
        .torre-kpi-sub { font-size: 11px; color: #6b7280; margin-top: 4px; }
        .torre-kpi-icon { position: absolute; top: 14px; right: 14px; font-size: 22px; opacity: 0.15; }
        .torre-chart-panel { background: #fff; border-radius: 14px; padding: 20px; border: 1.5px solid #ede9fe; margin-bottom: 20px; }
        .torre-chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .torre-chart-title { font-size: 15px; font-weight: 700; color: #1f2937; }
        .torre-filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        .torre-filtro-label { font-size: 12px; font-weight: 600; color: #6b7280; }
        .torre-btn-periodo { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid #ddd6fe; background: #fff; color: #7c3aed; cursor: pointer; transition: all 0.15s; }
        .torre-btn-periodo:hover { background: #ede9fe; }
        .torre-btn-periodo.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
        .torre-select { padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; border: 1.5px solid #ddd6fe; color: #4c1d95; background: #faf5ff; cursor: pointer; outline: none; }
        .torre-input-date { padding: 6px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; border: 1.5px solid #ddd6fe; color: #4c1d95; background: #faf5ff; outline: none; }
        .torre-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .torre-table th { background: linear-gradient(135deg,#4c1d95,#6d28d9); color: #fff; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .torre-table th:first-child { border-radius: 8px 0 0 8px; }
        .torre-table th:last-child  { border-radius: 0 8px 8px 0; }
        .torre-table td { padding: 10px 14px; border-bottom: 1px solid #f3f0ff; color: #374151; vertical-align: middle; }
        .torre-table tr:hover td { background: #faf5ff; }
        .torre-table tr:last-child td { border-bottom: none; }
        .torre-pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .torre-pill.verde    { background: #d1fae5; color: #065f46; }
        .torre-pill.amarelo  { background: #fef3c7; color: #92400e; }
        .torre-pill.vermelho { background: #fee2e2; color: #991b1b; }
        .torre-progress-bar { height: 8px; border-radius: 4px; background: #e5e7eb; overflow: hidden; min-width: 80px; }
        .torre-progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .torre-main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .torre-resumo-periodo { background: linear-gradient(135deg,#2d1b69 0%,#4c1d95 100%); border-radius: 14px; padding: 18px 20px; color: #fff; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .torre-resumo-item { text-align: center; }
        .torre-resumo-val { font-size: 22px; font-weight: 800; }
        .torre-resumo-lbl { font-size: 10px; color: rgba(200,180,255,0.8); font-weight: 600; text-transform: uppercase; }
        .torre-empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .torre-empty-icon { font-size: 48px; margin-bottom: 12px; }
        .torre-trend-up   { color: #10b981; font-size: 12px; font-weight: 700; }
        .torre-trend-down { color: #ef4444; font-size: 12px; font-weight: 700; }
        .torre-trend-eq   { color: #f59e0b; font-size: 12px; font-weight: 700; }
        .torre-canvas-wrap { position: relative; height: 220px; }
        .torre-minicard { background: #faf5ff; border-radius: 10px; padding: 12px 14px; border: 1px solid #ede9fe; }
        .torre-subgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; margin-bottom: 16px; }
        @media (max-width: 900px) { .torre-main-grid { grid-template-columns: 1fr; } .torre-kpi-grid { grid-template-columns: repeat(2,1fr); } }
        /* ═══════════ FIM TORRE DE CONTROLE ═══════════ */

        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            .chart-container {
                height: 250px;
            }
        }

        .multi-select {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 8px;
            background: white;
        }

        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-option:hover {
            background: #f3f4f6;
        }

        /* Botão Sair fixo - posição corrigida para não sobrepor controles de janela */
        .btn-sair-fixo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9990;
            background: white;
            color: #7c3aed;
            font-weight: 800;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 13px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-sair-fixo:hover {
            background: #fef2f2;
            color: #dc2626;
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(220,38,38,0.18);
        }

        /* Indicador de usuários online */
        .online-users-badge {
            position: fixed;
            bottom: 20px;
            right: 120px;
            z-index: 9990;
            background: white;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            gap: 6px;
            color: #374151;
            border: 1.5px solid #e5e7eb;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 0 2px rgba(16,185,129,0.3);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        .window-controls {
            position: fixed;
            top: 12px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 9999;
            align-items: center;
        }

        .window-btn {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            transition: all 0.2s ease;
            color: transparent;
        }

        .window-btn:hover {
            transform: scale(1.2);
            color: rgba(0,0,0,0.6);
        }

        .window-btn-close {
            background: #ff5f57;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
        }

        .window-btn-minimize {
            background: #febc2e;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
        }

        .window-btn-maximize {
            background: #28c840;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
        }

        body.maximized {
            padding: 0 !important;
        }

        body.maximized .app-wrapper {
            max-width: 100% !important;
            padding: 0 !important;
        }

        body.maximized .app-outer {
            padding: 0 !important;
        }

        body.minimized {
            overflow: hidden;
        }

        .minimized-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 -2px 20px rgba(0,0,0,0.2);
            z-index: 9998;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            cursor: pointer;
        }

        .minimized-bar.visible {
            display: flex;
        }

        .app-content-hidden {
            display: none !important;
        }

        /* ===== CAPACIDADE: animações e componentes visuais ===== */
        @keyframes fillBar {
            from { width: 0%; }
            to   { width: var(--bar-width); }
        }
        @keyframes countUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0%   { transform: scale(0.7); opacity: 0; }
            70%  { transform: scale(1.08); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseRing {
            0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.45); }
            70%  { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        @keyframes pulseGreen {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.45); }
            70%  { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        @keyframes giroflex {
            0%   { transform: rotate(0deg) scale(1);   filter: drop-shadow(0 0 0px #dc2626); }
            15%  { transform: rotate(-20deg) scale(1.15); filter: drop-shadow(0 0 8px #dc2626); }
            30%  { transform: rotate(20deg) scale(1.2);  filter: drop-shadow(0 0 14px #ff0000); }
            45%  { transform: rotate(-15deg) scale(1.15); filter: drop-shadow(0 0 8px #dc2626); }
            60%  { transform: rotate(15deg) scale(1.1);  filter: drop-shadow(0 0 6px #dc2626); }
            75%  { transform: rotate(-8deg) scale(1.05); filter: drop-shadow(0 0 4px #dc2626); }
            100% { transform: rotate(0deg) scale(1);   filter: drop-shadow(0 0 0px #dc2626); }
        }
        @keyframes giroflexAmber {
            0%   { transform: rotate(0deg) scale(1);   filter: drop-shadow(0 0 0px #d97706); }
            15%  { transform: rotate(-20deg) scale(1.15); filter: drop-shadow(0 0 8px #d97706); }
            30%  { transform: rotate(20deg) scale(1.2);  filter: drop-shadow(0 0 14px #f59e0b); }
            45%  { transform: rotate(-15deg) scale(1.15); filter: drop-shadow(0 0 8px #d97706); }
            60%  { transform: rotate(15deg) scale(1.1);  filter: drop-shadow(0 0 6px #d97706); }
            75%  { transform: rotate(-8deg) scale(1.05); filter: drop-shadow(0 0 4px #d97706); }
            100% { transform: rotate(0deg) scale(1);   filter: drop-shadow(0 0 0px #d97706); }
        }
        @keyframes giroflexGreen {
            0%   { transform: rotate(0deg) scale(1);   filter: drop-shadow(0 0 0px #059669); }
            15%  { transform: rotate(-20deg) scale(1.15); filter: drop-shadow(0 0 8px #059669); }
            30%  { transform: rotate(20deg) scale(1.2);  filter: drop-shadow(0 0 14px #10b981); }
            45%  { transform: rotate(-15deg) scale(1.15); filter: drop-shadow(0 0 8px #059669); }

        @keyframes blinkBorder {
            0%,100% { border-color: #dc262660; box-shadow: none; }
            50%     { border-color: #dc2626; box-shadow: 0 0 18px rgba(220,38,38,0.45), 0 0 40px rgba(220,38,38,0.18); }
        }
        @keyframes blinkBorderAmber {
