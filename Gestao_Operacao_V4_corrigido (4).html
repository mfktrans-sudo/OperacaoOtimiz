        }
        // ========== FIM TORRE DE CONTROLE ==========

        // ========== DASHBOARD COM FILTROS AVANÇADOS ==========

        // ═══════════════════════════════════════════════════════
        //  OTIMIZAÇÃO — banco isolado OtimizacaoEliteDB
        // ═══════════════════════════════════════════════════════
        const otmDB = (() => {
            let _db = null;
            const open = () => new Promise((res, rej) => {
                if (_db) { res(_db); return; }
                const req = indexedDB.open('OtimizacaoEliteDB', 1);
                req.onerror = () => rej(req.error);
                req.onsuccess = () => { _db = req.result; res(_db); };
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    ['listaCarga','otimizacao','lojas'].forEach(name => {
                        if (!db.objectStoreNames.contains(name)) {
                            const s = db.createObjectStore(name, { keyPath:'id', autoIncrement:true });
                            if (name !== 'lojas') s.createIndex('data','data',{unique:false});
                        }
                    });
                };
            });
            const tx = async (store, mode, fn) => {
                const db = await open();
                return new Promise((res, rej) => {
                    const t = db.transaction([store], mode);
                    const r = fn(t.objectStore(store));
                    r.onsuccess = () => res(r.result);
                    r.onerror   = () => rej(r.error);
                });
            };
            return {
                getAll: s => tx(s,'readonly', st => st.getAll()),
                add:   (s,v) => tx(s,'readwrite', st => st.add(v)),
                put:   (s,v) => tx(s,'readwrite', st => st.put(v)),
                del:   (s,id) => tx(s,'readwrite', st => st.delete(id)),
            };
        })();

        function Otimizacao() {
            const [ready,    setReady]  = useState(false);
            const [lc,       setLC]     = useState([]);
            const [otm,      setOTM]    = useState([]);
            const [lojas,    setLojas]  = useState([]);
            const [subAba,   setSub]    = useState('lista');
            const getBrasiliaDate = () => {
                // Sempre retorna a data correta no fuso de Brasília (UTC-3)
                const now = new Date();
                const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
                const y = brt.getFullYear();
                const m = String(brt.getMonth() + 1).padStart(2, '0');
                const d = String(brt.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };
            const [data,     setData]   = useState(getBrasiliaDate());
            const [fLoja,    setFLoja]  = useState('TODAS');
            const [fOnda,    setFOnda]  = useState('TODAS');
            const [fDoca,    setFDoca]  = useState('TODAS');
            const [msg,      setMsg]    = useState({t:'',k:''});
            const [lcEdit,   setLcEd]  = useState(null);
            const [otmEdit,  setOtmEd] = useState(null);
            const [ejLoja,   setEjLoja]= useState(null);
            const [ejVal,    setEjVal] = useState('');
            const [njVal,    setNjVal] = useState('');
            const [lcLojaQ,  setLcLojaQ] = useState('');
            const [lcLojaOpen, setLcLojaOpen] = useState(false);
            const [uploadStatus, setUploadStatus] = useState('');
            const [uploadDrag,   setUploadDrag]   = useState(false);
            const uploadRef = useRef(null);
            // ── PASTA VINCULADA (File System Access API) ──
            const [pastaHandle,   setPastaHandle]   = useState(null);
            const [pastaStatus,   setPastaStatus]   = useState('');
            const [pastaArquivos, setPastaArquivos] = useState([]);
            const [pastaSelArq,   setPastaSelArq]   = useState('');
            const [pastaNome,     setPastaNome]     = useState('');
            const [pastaSupport,  setPastaSupport]  = useState(typeof window!=='undefined' && 'showDirectoryPicker' in window);
            const [otmLojaQ, setOtmLojaQ] = useState({loja1:'',loja2:'',loja3:''});
            const [otmLojaOpen, setOtmLojaOpen] = useState({loja1:false,loja2:false,loja3:false});

            const lcBlank  = { data, seq:'', loja:'', preremanejo:'', lacre:'', volumes:'', doca:'', onda:'1ª ONDA', cub:'' };
            const otmBlank = { data, carro:'', loja1:'', seq1:'', loja2:'', seq2:'', loja3:'', seq3:'' };
            const [lcF,  setLcF]  = useState(lcBlank);
            const [otmF, setOtmF] = useState(otmBlank);

            const flash = (t,k='ok') => { setMsg({t,k}); setTimeout(()=>setMsg({t:'',k:''}),3000); };

            const load = async () => {
                try {
                    const [a,b,c] = await Promise.all([otmDB.getAll('listaCarga'),otmDB.getAll('otimizacao'),otmDB.getAll('lojas')]);
                    setLC(a); setOTM(b); setLojas([...c].sort((x,y)=>x.nome.localeCompare(y.nome))); setReady(true);
                } catch(e) { console.error(e); setReady(true); }
            };
            useEffect(()=>{ load(); },[]);

            const lcFil = useMemo(()=>lc.filter(c=>c.data===data&&(fLoja==='TODAS'||c.loja===fLoja)&&(fOnda==='TODAS'||c.onda===fOnda)&&(fDoca==='TODAS'||c.doca===fDoca)).sort((a,b)=>parseInt(a.seq||0)-parseInt(b.seq||0)),[lc,data,fLoja,fOnda,fDoca]);
            const otmFil= useMemo(()=>otm.filter(o=>o.data===data&&(fLoja==='TODAS'||o.loja1===fLoja||o.loja2===fLoja||o.loja3===fLoja)).sort((a,b)=>parseInt(a.carro||0)-parseInt(b.carro||0)),[otm,data,fLoja]);
            const datas = useMemo(()=>[...new Set([...lc.map(c=>c.data),...otm.map(o=>o.data)])].sort(),[lc,otm]);
            const ljDia = useMemo(()=>['TODAS',...new Set(lc.filter(c=>c.data===data).map(c=>c.loja))],[lc,data]);
            const onDia = useMemo(()=>['TODAS',...new Set(lc.filter(c=>c.data===data).map(c=>c.onda).filter(Boolean))],[lc,data]);
            const dcDia = useMemo(()=>['TODAS',...new Set(lc.filter(c=>c.data===data).map(c=>c.doca).filter(Boolean))].sort((a,b)=>a==='TODAS'?-1:parseInt(a)-parseInt(b)),[lc,data]);
            const nomes = useMemo(()=>lojas.map(l=>l.nome),[lojas]);
            const tot   = useMemo(()=>({n:lcFil.length,v:lcFil.reduce((a,c)=>a+(parseInt(c.volumes)||0),0),c:lcFil.reduce((a,c)=>a+(parseFloat(c.cub)||0),0).toFixed(2)}),[lcFil]);

            const salvarLC = async () => {
                if(!lcF.data||!lcF.loja||!lcF.seq){flash('⚠️ Data, SEQ e Loja são obrigatórios!','err');return;}
                lcEdit ? await otmDB.put('listaCarga',{...lcF,id:lcEdit.id}) : await otmDB.add('listaCarga',{...lcF});
                setLcEd(null); setLcF({...lcBlank,data:lcF.data}); setLcLojaQ(''); setLcLojaOpen(false); flash(lcEdit?'✅ Atualizado!':'✅ Adicionado!'); load();
            };
            const edLC  = item => { setLcEd(item); setLcF({...item}); setLcLojaQ(item.loja||''); window.scrollTo({top:0,behavior:'smooth'}); };
            const delLC = async id => { if(!confirm('Excluir?'))return; await otmDB.del('listaCarga',id); flash('🗑️ Excluído.','warn'); load(); };

            const salvarOTM = async () => {
                if(!otmF.data||!otmF.carro||!otmF.loja1){flash('⚠️ Data, Carro e 1ª Entrega são obrigatórios!','err');return;}
                otmEdit ? await otmDB.put('otimizacao',{...otmF,id:otmEdit.id}) : await otmDB.add('otimizacao',{...otmF});
                setOtmEd(null); setOtmF({...otmBlank,data:otmF.data}); setOtmLojaQ({loja1:'',loja2:'',loja3:''}); setOtmLojaOpen({loja1:false,loja2:false,loja3:false}); flash(otmEdit?'✅ Atualizado!':'✅ Adicionado!'); load();
            };
            const edOTM  = item => { setOtmEd(item); setOtmF({...item}); setOtmLojaQ({loja1:item.loja1||'',loja2:item.loja2||'',loja3:item.loja3||''}); window.scrollTo({top:0,behavior:'smooth'}); };
            const delOTM = async id => { if(!confirm('Excluir?'))return; await otmDB.del('otimizacao',id); flash('🗑️ Excluído.','warn'); load(); };

            const addLoja = async () => {
                if(!njVal.trim()){flash('⚠️ Informe ao menos um nome!','err');return;}
                const novos = njVal.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
                const dup=[]; const ok=[];
                for(const n of novos){
                    if(lojas.find(l=>l.nome===n)){dup.push(n);continue;}
                    await otmDB.add('lojas',{nome:n}); ok.push(n);
                }
                setNjVal('');
                if(ok.length>0&&dup.length===0) flash('✅ '+ok.length+' loja(s) adicionada(s)!');
                else if(ok.length>0) flash('✅ '+ok.length+' adicionada(s). ⚠️ Já existiam: '+dup.join(', '),'warn');
                else flash('⚠️ Todas já existem: '+dup.join(', '),'err');
                load();
            };
            const saveEjLoja = async () => {
                const n=ejVal.trim().toUpperCase(); if(!n)return;
                await otmDB.put('lojas',{id:ejLoja.id,nome:n}); setEjLoja(null); setEjVal(''); flash('✅ Loja atualizada!'); load();
            };
            const delLoja = async id => { if(!confirm('Excluir loja?'))return; await otmDB.del('lojas',id); flash('🗑️ Excluída.','warn'); load(); };

            // ── IMPORTAÇÃO EXCEL ──────────────────────────────────────────────
            const MAPA_COLUNAS = {
                data:        ['data','date','dt'],
                seq:         ['seq','seq.','sequencia','sequencia','numero','num'],
                loja:        ['loja','store','filial'],
                preremanejo: ['pre-romaneio','pre romaneio','preremanejo','pre_romaneio','romaneio','pre-remanejio','pré-romaneio'],
                lacre:       ['lacre','lacre - bau','lacre-bau','lacre bau','lacre - bau'],
                volumes:     ['volumes','volume','vol','qtd','quantidade'],
                doca:        ['doca','dock'],
                onda:        ['onda','wave'],
                cub:         ['cub','cub (m3)','cub m3','cubagem','m3'],
            };

            const detectarCampo = (header) => {
                const h = (header||'').toString().trim().toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[()³º]/g,'').replace(/\s+/g,' ').trim();
                for(const [campo, aliases] of Object.entries(MAPA_COLUNAS)){
                    for(const alias of aliases){
                        const a = alias.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[()³º]/g,'').replace(/\s+/g,' ').trim();
                        if(h===a || h.startsWith(a) || a.startsWith(h)) return campo;
                    }
                }
                return null;
            };

            const normalizarOnda = (v) => {
                if(!v) return '1ª ONDA';
                const s = v.toString().trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
                if(s.includes('EXTRA')) return 'ONDA EXTRA';
                if(s.includes('3')) return '3ª ONDA';
                if(s.includes('2')) return '2ª ONDA';
                return '1ª ONDA';
            };

            const normalizarData = (v) => {
                if(!v) return getBrasiliaDate();
                if(typeof v === 'number'){
                    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
                    const y = d.getUTCFullYear();
                    const m = String(d.getUTCMonth()+1).padStart(2,'0');
                    const day = String(d.getUTCDate()).padStart(2,'0');
                    return `${y}-${m}-${day}`;
                }
                const s = v.toString().trim();
                const pt = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
                if(pt) return `${pt[3]}-${pt[2].padStart(2,'0')}-${pt[1].padStart(2,'0')}`;
                const iso = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
                if(iso) return `${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
                return getBrasiliaDate();
            };

            const processarArquivo = async (file) => {
                if(!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if(!['xlsx','xls','csv'].includes(ext)){
                    setUploadStatus('err|❌ Formato inválido. Use .xlsx, .xls ou .csv'); return;
                }
                setUploadStatus('load|⏳ Lendo arquivo...');
                try {
                    const buffer = await file.arrayBuffer();
                    const wb = XLSX.read(buffer, {type:'array', cellDates:false});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
                    if(rows.length < 2){ setUploadStatus('err|⚠️ Planilha vazia ou sem cabeçalho.'); return; }

                    let headerIdx = 0;
                    for(let i=0;i<Math.min(rows.length,5);i++){
                        if(rows[i].some(c=>c!==''&&c!==null&&c!==undefined)){ headerIdx=i; break; }
                    }
                    const headers = rows[headerIdx];
                    const mapa = {};
                    headers.forEach((h,i)=>{ const c=detectarCampo(h); if(c) mapa[i]=c; });

                    if(!Object.values(mapa).includes('loja')){
                        setUploadStatus('err|⚠️ Coluna LOJA não encontrada. Verifique os cabeçalhos.'); return;
                    }

                    const getIdx = campo => parseInt(Object.keys(mapa).find(i=>mapa[i]===campo)) ?? -1;
                    const dataDefault = getBrasiliaDate();
                    let importados = 0; let erros = 0;

                    for(let r = headerIdx+1; r < rows.length; r++){
                        const row = rows[r];
                        if(row.every(c=>c===''||c===null||c===undefined)) continue;
                        const lojaIdx = getIdx('loja');
                        const loja = lojaIdx>=0 ? (row[lojaIdx]||''). toString().trim().toUpperCase() : '';
                        if(!loja){ erros++; continue; }
                        const reg = {
                            data:        normalizarData(getIdx('data')>=0 ? row[getIdx('data')] : '') || dataDefault,
                            seq:         getIdx('seq')>=0 ? (row[getIdx('seq')]||''). toString().trim() : '',
                            loja,
                            preremanejo: getIdx('preremanejo')>=0 ? (row[getIdx('preremanejo')]||''). toString().trim() : '',
                            lacre:       getIdx('lacre')>=0 ? (row[getIdx('lacre')]||''). toString().trim() : '',
                            volumes:     getIdx('volumes')>=0 ? (row[getIdx('volumes')]||''). toString().trim() : '',
                            doca:        getIdx('doca')>=0 ? (row[getIdx('doca')]||''). toString().trim() : '',
                            onda:        normalizarOnda(getIdx('onda')>=0 ? row[getIdx('onda')] : ''),
                            cub:         getIdx('cub')>=0 ? (row[getIdx('cub')]||''). toString().trim() : '',
                        };
                        try{ await otmDB.add('listaCarga', reg); importados++; } catch(e){ erros++; }
                    }
                    await load();
                    const ok = importados>0;
                    const msg2 = ok
                        ? `✅ ${importados} registro(s) importado(s)!${erros>0?' ⚠️ '+erros+' linha(s) sem loja ignorada(s).':''}`
                        : `⚠️ Nenhum registro importado. ${erros} linha(s) sem loja.`;
                    setUploadStatus((ok?'ok|':'warn|')+msg2);
                    setTimeout(()=>setUploadStatus(''), 7000);
                } catch(e){
                    console.error(e);
                    setUploadStatus('err|❌ Erro ao ler o arquivo: '+e.message);
                }
            };

            const onUploadChange = e => { processarArquivo(e.target.files[0]); e.target.value=''; };
            const onDrop = e => { e.preventDefault(); setUploadDrag(false); processarArquivo(e.dataTransfer.files[0]); };

            // ── PASTA VINCULADA ───────────────────────────────────────────────
            const vincularPasta = async () => {
                if(!('showDirectoryPicker' in window)){
                    setPastaStatus('err|❌ Seu navegador não suporta esta função. Use Chrome ou Edge.');
                    return;
                }
                try {
                    const handle = await window.showDirectoryPicker({ mode: 'read' });
                    setPastaHandle(handle);
                    setPastaNome(handle.name);
                    setPastaStatus('ok|✅ Pasta vinculada: ' + handle.name);
                    await listarArquivosPasta(handle);
                } catch(e) {
                    if(e.name !== 'AbortError'){
                        setPastaStatus('err|❌ Erro ao acessar pasta: ' + e.message);
                    }
                }
            };

            const listarArquivosPasta = async (handle) => {
                if(!handle) return;
                try {
                    const arquivos = [];
                    for await (const [nome, entry] of handle.entries()) {
                        if(entry.kind === 'file') {
                            const ext = nome.split('.').pop().toLowerCase();
                            if(['xlsx','xls','csv'].includes(ext)) {
                                arquivos.push(nome);
                            }
                        }
                    }
                    arquivos.sort((a,b) => a.localeCompare(b));
                    setPastaArquivos(arquivos);
                    if(arquivos.length > 0) {
                        setPastaSelArq(arquivos[arquivos.length - 1]); // seleciona o último por padrão
                    } else {
                        setPastaSelArq('');
                    }
                    return arquivos;
                } catch(e) {
                    setPastaStatus('err|❌ Erro ao listar arquivos: ' + e.message);
                    return [];
                }
            };

            const atualizarListaPasta = async () => {
                if(!pastaHandle){ setPastaStatus('err|⚠️ Nenhuma pasta vinculada.'); return; }
                setPastaStatus('load|⏳ Atualizando lista...');
                const arqs = await listarArquivosPasta(pastaHandle);
                if(arqs && arqs.length > 0){
                    setPastaStatus('ok|✅ ' + arqs.length + ' arquivo(s) encontrado(s) em "' + pastaNome + '".');
                } else {
                    setPastaStatus('warn|⚠️ Nenhum arquivo Excel/CSV encontrado na pasta.');
                }
                setTimeout(() => setPastaStatus(''), 4000);
            };

            const importarDaPasta = async () => {
                if(!pastaHandle){ setPastaStatus('err|⚠️ Nenhuma pasta vinculada.'); return; }
                if(!pastaSelArq){ setPastaStatus('err|⚠️ Selecione um arquivo para importar.'); return; }
                try {
                    setPastaStatus('load|⏳ Lendo "' + pastaSelArq + '"...');
                    const fileHandle = await pastaHandle.getFileHandle(pastaSelArq);
                    const file = await fileHandle.getFile();
                    await processarArquivo(file);
                } catch(e) {
                    setPastaStatus('err|❌ Erro ao ler arquivo: ' + e.message);
                }
            };
            // ──────────────────────────────────────────────────────────────────

            const inp = {width:'100%',padding:'9px 12px',border:'2px solid #e5e7eb',borderRadius:'8px',fontSize:'13px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'};
            const lbl = {display:'block',fontSize:'11px',fontWeight:'700',color:'#374151',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'5px'};
            const bp  = {background:'linear-gradient(135deg,#4f46e5,#7c3aed)',color:'white',border:'none',borderRadius:'8px',padding:'10px 20px',fontWeight:'700',fontSize:'13px',cursor:'pointer'};
            const bx  = {background:'#ef4444',color:'white',border:'none',borderRadius:'6px',padding:'5px 10px',fontWeight:'600',fontSize:'12px',cursor:'pointer'};
            const be  = {background:'#f59e0b',color:'white',border:'none',borderRadius:'6px',padding:'5px 10px',fontWeight:'600',fontSize:'12px',cursor:'pointer'};
            const bc  = {background:'#6b7280',color:'white',border:'none',borderRadius:'8px',padding:'10px 20px',fontWeight:'700',fontSize:'13px',cursor:'pointer'};
            const oc  = o => o==='1ª ONDA'?{bg:'#dbeafe',cl:'#1e40af',bd:'#93c5fd'}:o==='2ª ONDA'?{bg:'#d1fae5',cl:'#065f46',bd:'#6ee7b7'}:o==='3ª ONDA'?{bg:'#fef3c7',cl:'#92400e',bd:'#fcd34d'}:{bg:'#f3f4f6',cl:'#374151',bd:'#d1d5db'};

            if(!ready) return <div style={{textAlign:'center',padding:'60px',color:'#9ca3af'}}><div style={{fontSize:'28px'}}>⏳</div>Carregando...</div>;

                    {msg.t && <div style={{padding:'12px 18px',borderRadius:'10px',marginBottom:'16px',fontWeight:'600',fontSize:'14px',background:msg.k==='err'?'#fee2e2':msg.k==='warn'?'#fef3c7':'#d1fae5',color:msg.k==='err'?'#991b1b':msg.k==='warn'?'#92400e':'#065f46'}}>{msg.t}</div>}

                                            style={{...inp,borderColor:lcF.loja?'#10b981':'#e5e7eb',background:lcF.loja?'#f0fdf4':'white'}}
                                        />
                                        {lcF.loja && <div style={{fontSize:'11px',color:'#065f46',fontWeight:'600',marginTop:'3px'}}>✅ {lcF.loja}</div>}
                                        {lcLojaOpen && (
                                            <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'2px solid #667eea',borderRadius:'8px',boxShadow:'0 8px 24px rgba(0,0,0,0.15)',zIndex:999,maxHeight:'200px',overflowY:'auto',marginTop:'2px'}}>
                                                {nomes.filter(l=>!lcLojaQ||l.toLowerCase().includes(lcLojaQ.toLowerCase())).length===0

                                                            onMouseEnter={e=>e.currentTarget.style.background='#f0f9ff'}
                                                            onMouseLeave={e=>e.currentTarget.style.background=lcF.loja===l?'#ede9fe':'white'}>
                                                            {l}
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        )}
                                    </div>
                                    <div><label style={lbl}>PRÉ-ROMANEIO</label><input type="text" placeholder="Ex: 917495/917586" value={lcF.preremanejo} onChange={e=>setLcF({...lcF,preremanejo:e.target.value})} style={inp}/></div>
                                    <div><label style={lbl}>LACRE - BAÚ</label><input type="text" placeholder="Ex: 57855" value={lcF.lacre} onChange={e=>setLcF({...lcF,lacre:e.target.value})} style={inp}/></div>
                                    <div><label style={lbl}>VOLUMES</label><input type="number" placeholder="Ex: 151" value={lcF.volumes} onChange={e=>setLcF({...lcF,volumes:e.target.value})} style={inp}/></div>
                                    <div><label style={lbl}>🚪 DOCA</label><input type="text" placeholder="Ex: 143" value={lcF.doca} onChange={e=>setLcF({...lcF,doca:e.target.value})} style={inp}/></div>
                                    <div><label style={lbl}>🌊 ONDA</label>
                                        <select value={lcF.onda} onChange={e=>setLcF({...lcF,onda:e.target.value})} style={inp}>
                                            <option>1ª ONDA</option><option>2ª ONDA</option><option>3ª ONDA</option><option>ONDA EXTRA</option>
                                        </select>
                                    </div>
                                    <div><label style={lbl}>CUB (m³)</label><input type="number" step="0.01" placeholder="Ex: 5.90" value={lcF.cub} onChange={e=>setLcF({...lcF,cub:e.target.value})} style={inp}/></div>
                                </div>
                                <div style={{display:'flex',gap:'10px'}}>
                                    <button onClick={salvarLC} style={bp}>{lcEdit?'💾 Salvar Alterações':'➕ Adicionar'}</button>
                                    {lcEdit&&<button onClick={()=>{setLcEd(null);setLcF({...lcBlank,data:lcF.data});setLcLojaQ('');setLcLojaOpen(false);}} style={bc}>✕ Cancelar</button>}
                                </div>
                            </div>
                            {/* ── IMPORTAR EXCEL ── */}
                            {(() => {
                                // helper de status compartilhado: usa pastaStatus se tiver, senão uploadStatus
                                const activeStatus = pastaStatus || uploadStatus;
                                const parts  = activeStatus.split('|');
                                const kind   = parts.length>1 ? parts[0] : '';
                                const text   = parts.length>1 ? parts.slice(1).join('|') : parts[0];
                                const sBg    = kind==='err'?'#fee2e2':kind==='warn'?'#fef3c7':kind==='ok'?'#d1fae5':'#e0e7ff';
                                const sCl    = kind==='err'?'#991b1b':kind==='warn'?'#92400e':kind==='ok'?'#065f46':'#3730a3';
                                const isLoad = text.includes('Lendo') || text.includes('Atualizando');

                                return (
                                    <div style={{marginBottom:'20px',border:'2px solid #c7d2fe',borderRadius:'14px',overflow:'hidden'}}>

                                        {/* Cabeçalho */}
                                        <div style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',padding:'12px 18px',display:'flex',alignItems:'center',gap:'10px'}}>
                                            <span style={{fontSize:'20px'}}>📂</span>
                                            <div style={{color:'white',fontWeight:'800',fontSize:'15px'}}>Importar Lista de Carga — Excel / CSV</div>
                                        </div>

                                        <div style={{padding:'18px',background:'white',display:'flex',flexDirection:'column',gap:'16px'}}>

                                            {/* ── SEÇÃO 1: PASTA VINCULADA ── */}
                                            <div style={{border:'2px solid #a5b4fc',borderRadius:'12px',overflow:'hidden'}}>
                                                <div style={{background:'#ede9fe',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',flexWrap:'wrap'}}>
                                                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                                        <span style={{fontSize:'18px'}}>📁</span>
                                                        <span style={{fontWeight:'800',color:'#4f46e5',fontSize:'13px'}}>Pasta Vinculada</span>
                                                        {pastaHandle && (
                                                            <span style={{background:'#4f46e5',color:'white',fontSize:'10px',fontWeight:'700',padding:'2px 8px',borderRadius:'20px'}}>{pastaNome}</span>

                                                            onClick={vincularPasta}

                                                        >
                                                            {pastaHandle ? '🔄 Trocar Pasta' : '📁 Vincular Pasta'}
                                                        </button>
                                                        {pastaHandle && (
                                                            <button
                                                                onClick={atualizarListaPasta}
                                                                style={{background:'#0891b2',color:'white',border:'none',borderRadius:'7px',padding:'7px 14px',fontWeight:'700',fontSize:'12px',cursor:'pointer'}}
                                                            >
                                                                🔍 Atualizar Lista
                                                            </button>
                                                        )}
                                                        {pastaHandle && (
                                                            <button
                                                                onClick={()=>{if(confirm('Desvincular a pasta "'+pastaNome+'"?')){setPastaHandle(null);setPastaNome('');setPastaArquivos([]);setPastaSelArq('');setPastaStatus('');}}}
                                                                style={{background:'#ef4444',color:'white',border:'none',borderRadius:'7px',padding:'7px 14px',fontWeight:'700',fontSize:'12px',cursor:'pointer'}}
                                                            >
                                                                🗑️ Desvincular
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>

                                                <div style={{padding:'14px 16px',background:'white'}}>
                                                    {!pastaHandle ? (
                                                        <div style={{textAlign:'center',padding:'16px 0',color:'#9ca3af'}}>
                                                            <div style={{fontSize:'32px',marginBottom:'8px'}}>📁</div>
                                                            <div style={{fontSize:'13px',fontWeight:'600',marginBottom:'4px',color:'#6b7280'}}>Nenhuma pasta vinculada</div>

                                                                O navegador pedirá permissão uma única vez — depois é só clicar em <strong>"🔍 Atualizar Lista"</strong> e <strong>"⬇️ Importar"</strong>.
                                                            </div>

                                                                    ⚠️ Seu navegador não suporta esta função. Use Chrome ou Edge para habilitar.

        function Dashboard({ operacoes, dataSelecionada, setDataSelecionada, listaOperacoes }) {

                status: useRef(null),
                volumetria: useRef(null),
                evolucao: useRef(null),
                tendencia: useRef(null),
                cubagem: useRef(null)
            };

            const [chartInstances, setChartInstances] = useState({});
            const [modalCubagem, setModalCubagem] = useState(false);
            const [ocorrenciasCubagem, setOcorrenciasCubagem] = useState(() => {
                try {
                    const _now = new Date(); const _brt = new Date(_now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
                    const hoje = `${_brt.getFullYear()}-${String(_brt.getMonth()+1).padStart(2,'0')}-${String(_brt.getDate()).padStart(2,'0')}`;
                    const s = localStorage.getItem('ocorrenciasCubagem_' + hoje);
                    return s ? JSON.parse(s) : {};
                } catch(e) { return {}; }
            });
            // Recarregar ocorrências sempre que a data selecionada mudar
            useEffect(() => {
                try {
                    const s = localStorage.getItem('ocorrenciasCubagem_' + dataSelecionada);
                    setOcorrenciasCubagem(s ? JSON.parse(s) : {});
                } catch(e) { setOcorrenciasCubagem({}); }
            }, [dataSelecionada]);
            const salvarOcorrencia = (nomeOp, campo, valor) => {
                setOcorrenciasCubagem(prev => {
                    const atualizado = { ...prev, [nomeOp]: { ...(prev[nomeOp] || {}), [campo]: valor } };
                    try { localStorage.setItem('ocorrenciasCubagem_' + dataSelecionada, JSON.stringify(atualizado)); } catch(e) {}
                    return atualizado;
                });
            };
            const [imgZoom, setImgZoom] = useState(null); // { src, nome }
            const [alertaCapExpanded, setAlertaCapExpanded] = useState(false);
            const [alertaCubExpanded, setAlertaCubExpanded] = useState(false);
            const cubChartRef = useRef(null);
            const cubChartInstanceRef = useRef(null);
            
            // ✅ ESTADOS PARA ANTECIPAÇÕES
            const [mostrarAntecipacoes, setMostrarAntecipacoes] = useState(null);
            const [antecipacoes, setAntecipacoes] = useState(() => {
                try {
                    const saved = localStorage.getItem('antecipacoes_' + dataSelecionada);
                    return saved ? JSON.parse(saved) : { nf: 0, vol: 0, cubagem: 0, nfReal: 0, volReal: 0, cubagemReal: 0 };
                } catch(e) {
                    return { nf: 0, vol: 0, cubagem: 0, nfReal: 0, volReal: 0, cubagemReal: 0 };
                }
            });
            
            // Recarregar antecipações quando mudar data
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('antecipacoes_' + dataSelecionada);
                    setAntecipacoes(saved ? JSON.parse(saved) : { nf: 0, vol: 0, cubagem: 0, nfReal: 0, volReal: 0, cubagemReal: 0 });
                } catch(e) {
                    setAntecipacoes({ nf: 0, vol: 0, cubagem: 0, nfReal: 0, volReal: 0, cubagemReal: 0 });
                }
            }, [dataSelecionada]);
            
            // Salvar antecipações
            const salvarAntecipacoes = (novasAntecipacoes) => {
                setAntecipacoes(novasAntecipacoes);
                try {
                    localStorage.setItem('antecipacoes_' + dataSelecionada, JSON.stringify(novasAntecipacoes));
                } catch(e) {
                    console.error('Erro ao salvar antecipações:', e);
                }
            };
            
            // Estados dos filtros
            const [tipoFiltroData, setTipoFiltroData] = useState('dia'); // dia, periodo
            const [dataInicio, setDataInicio] = useState(dataSelecionada);
            const [dataFim, setDataFim] = useState(dataSelecionada);
            const [operacoesSelecionadas, setOperacoesSelecionadas] = useState(['TODAS']);
            const [statusSelecionados, setStatusSelecionados] = useState(['verde', 'vermelho', 'amarelo']);

            // Atualizar data início e fim quando mudar data selecionada
            useEffect(() => {
                setDataInicio(dataSelecionada);
                setDataFim(dataSelecionada);
            }, [dataSelecionada]);

            // Obter lista única de operações
            const operacoesDisponiveis = useMemo(() => {
                const ops = new Set(operacoes.map(op => op.operacao));
                return ['TODAS', ...Array.from(ops)];
            }, [operacoes]);

            // Aplicar filtros
            const operacoesFiltradas = useMemo(() => {
                return operacoes.filter(op => {
                    // Filtro de data
                    let dataOk = false;
                    if (tipoFiltroData === 'dia') {
                        dataOk = op.data === dataSelecionada;
                    } else {
                        dataOk = op.data >= dataInicio && op.data <= dataFim;
                    }
                    
                    // Filtro de operação
                    const operacaoOk = operacoesSelecionadas.includes('TODAS') || 
                                      operacoesSelecionadas.includes(op.operacao);
                    
                    // Filtro de status
                    const statusOk = statusSelecionados.includes(op.status);
                    
                    return dataOk && operacaoOk && statusOk;
                });
            }, [operacoes, tipoFiltroData, dataSelecionada, dataInicio, dataFim, operacoesSelecionadas, statusSelecionados]);

            // Toggle operação selecionada

                        dadosPorData[op.data].cubagem += op.cubagem || 0;

                        if (op.status === 'verde') dadosPorData[op.data].verde += 1;
                        if (op.status === 'vermelho') dadosPorData[op.data].vermelho += 1;

                            {mostrarAntecipacoes === 'nf' && (

                            {mostrarAntecipacoes === 'vol' && (

                    {(() => {
                        // Lê equipe presente do localStorage (mesma chave usada na aba Capacidade)
                        const EQ_KEY = 'cap_equipe_v2';
                        const lerEquipe = () => { try { return JSON.parse(localStorage.getItem(EQ_KEY)||'{}'); } catch(e){ return {}; } };
                        const hoje = dataSelecionada;
                        const eq = lerEquipe()[hoje] || {};
                        const sepP = parseInt(eq.sep) || 0;
                        const confP = parseInt(eq.conf) || 0;
                        const auxP  = parseInt(eq.aux)  || 0;
                        if (sepP === 0 && confP === 0) return null; // sem equipe informada, não exibe

                        // Parâmetros padrão (mesmos defaults da aba Capacidade)
                        const NF_SEP  = 80;  const VOL_SEP  = 600;
                        const NF_CONF = 120; const VOL_CONF = 900;
                        const NF_AUX  = 56;  const VOL_AUX  = 420;

                        // Capacidade total com equipe presente
                        const capNF  = (sepP * NF_SEP)  + (auxP * NF_AUX);
                        const capVol = (sepP * VOL_SEP)  + (auxP * VOL_AUX);
                        const capConfNF  = confP * NF_CONF;
                        const capConfVol = confP * VOL_CONF;

                        // Agrupa operacoesFiltradas por operação
                        const porOp = {};
                        operacoesFiltradas.forEach(op => {
                            if (!porOp[op.operacao]) porOp[op.operacao] = { nf: 0, vol: 0, nome: op.operacao };
                            porOp[op.operacao].nf  += (op.nf  || 0);
                            porOp[op.operacao].vol += (op.vol || 0);
                        });

                        // Totais do dia
                        const totalNFDia  = operacoesFiltradas.reduce((a,o) => a+(o.nf||0), 0);
                        const totalVolDia = operacoesFiltradas.reduce((a,o) => a+(o.vol||0), 0);

                        const pctNF  = capNF  > 0 ? (totalNFDia  / capNF)  * 100 : 0;
                        const pctVol = capVol > 0 ? (totalVolDia / capVol) * 100 : 0;
                        const pctConfNF  = capConfNF  > 0 ? (totalNFDia  / capConfNF)  * 100 : 0;
                        const pctConfVol = capConfVol > 0 ? (totalVolDia / capConfVol) * 100 : 0;

                        const acimaCapacidade = pctNF > 100 || pctVol > 100 || pctConfNF > 100 || pctConfVol > 100;
                        if (!acimaCapacidade) return null;

                        // Dados por operação para a tabela expandida
                        const linhas = Object.values(porOp);
                        const pctMax = Math.max(pctNF, pctVol, pctConfNF, pctConfVol);

                        // Calcula sep necessários
                        const NF_SEP_TURNO  = NF_SEP;
                        const VOL_SEP_TURNO = VOL_SEP;
                        const sepNecPorNF  = Math.ceil(totalNFDia  / Math.max(NF_SEP_TURNO,  1));
                        const sepNecPorVol = Math.ceil(totalVolDia / Math.max(VOL_SEP_TURNO, 1));
                        const sepNecessarios = Math.max(sepNecPorNF, sepNecPorVol);
                        const confNecPorNF  = Math.ceil(totalNFDia  / Math.max(NF_CONF, 1));
                        const confNecPorVol = Math.ceil(totalVolDia / Math.max(VOL_CONF, 1));
                        const confNecessarios = Math.max(confNecPorNF, confNecPorVol);

                        return (
                            <div style={{marginBottom:'16px',marginTop:'8px'}}>
                                {/* Banner colapsável */}
                                <button
                                    onClick={() => setAlertaCapExpanded(v => !v)}
                                    style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:'linear-gradient(135deg,#ef444420,#f59e0b15)',border:'2px solid #ef4444',borderRadius: alertaCapExpanded ? '12px 12px 0 0' : '12px',padding:'14px 18px',cursor:'pointer',textAlign:'left',transition:'border-radius 0.2s'}}
