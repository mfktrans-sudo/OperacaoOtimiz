<body>
    <!-- Botões de controle de janela estilo macOS -->
    <div class="window-controls" id="windowControls">
        <button class="window-btn window-btn-close" id="btnClose" title="Fechar" onclick="fecharJanela()">✕</button>
        <button class="window-btn window-btn-minimize" id="btnMinimize" title="Minimizar" onclick="minimizarJanela()">−</button>
        <button class="window-btn window-btn-maximize" id="btnMaximize" title="Maximizar" onclick="maximizarJanela()">⤢</button>
    </div>

    <!-- Barra de restauração quando minimizado -->
    <div class="minimized-bar" id="minimizedBar" onclick="restaurarJanela()">
        <span style="font-size:20px;">📊</span>
        <span style="font-weight:600; color:#667eea;">Sistema de Gestão de Operações</span>
        <span style="margin-left:auto; font-size:12px; color:#999;">Clique para restaurar</span>
    </div>

    <div id="root"></div>

    <script>
        let isMaximized = false;
        let isMinimized = false;

        function fecharJanela() {
            if (confirm('Deseja fechar o sistema? Dados não salvos podem ser perdidos.')) {
                window.close();
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);"><div style="background:white;padding:40px;border-radius:16px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);"><span style="font-size:48px;">📊</span><h2 style="color:#667eea;margin:16px 0;">Sistema encerrado</h2><p style="color:#666;">Feche esta aba para sair completamente.</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">&#8635; Reabrir Sistema</button></div></div>';
            }
        }

        function minimizarJanela() {
            isMinimized = true;
            document.getElementById('root').classList.add('app-content-hidden');
            document.getElementById('windowControls').style.display = 'none';
            document.getElementById('minimizedBar').classList.add('visible');
            document.body.style.background = '#1a1a2e';
        }

        function restaurarJanela() {
            isMinimized = false;
            document.getElementById('root').classList.remove('app-content-hidden');
            document.getElementById('windowControls').style.display = 'flex';
            document.getElementById('minimizedBar').classList.remove('visible');
            document.body.style.background = '';
        }

        function maximizarJanela() {
            const btn = document.getElementById('btnMaximize');

            if (!isMaximized) {
                isMaximized = true;
                btn.title = 'Restaurar';
                btn.textContent = '\u29C1';
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
                applyMaximizeStyles(true);
            } else {
                isMaximized = false;
                btn.title = 'Maximizar';
                btn.textContent = '\u29C2';
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                }
                applyMaximizeStyles(false);
            }
        }

        function applyMaximizeStyles(maximize) {
            const appDiv = document.querySelector('#root > div');
            if (!appDiv) return;
            if (maximize) {
                appDiv.style.padding = '8px';
                appDiv.style.minHeight = '100vh';
                const innerDiv = appDiv.querySelector('.max-w-7xl');
                if (innerDiv) {
                    innerDiv.style.maxWidth = '100%';
                    innerDiv.style.margin = '0';
                }
                document.body.style.padding = '0';
            } else {
                appDiv.style.padding = '';
                appDiv.style.minHeight = '';
                const innerDiv = appDiv.querySelector('.max-w-7xl');
                if (innerDiv) {
                    innerDiv.style.maxWidth = '';
                    innerDiv.style.margin = '';
                }
                document.body.style.padding = '';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F11') {
                e.preventDefault();
                maximizarJanela();
            }
        });

        const observer = new MutationObserver(function() {
            if (isMaximized) applyMaximizeStyles(true);
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: false });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ========== BANCO DE DADOS - FIRESTORE ==========
        class FirestoreDB {
            constructor(firestoreInstance) {
                this.db = firestoreInstance;
                this.fns = window.__firebaseFns;
            }

            async addOperacao(operacao) {
                const { collection, addDoc } = this.fns;
                const docRef = await addDoc(collection(this.db, 'operacoes'), operacao);
                return { ...operacao, id: docRef.id };
            }

            async getAllOperacoes() {
                const { collection, getDocs } = this.fns;
                const snapshot = await getDocs(collection(this.db, 'operacoes'));
                return snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
            }

            async updateOperacao(operacao) {
                const { doc, updateDoc } = this.fns;
                const { id, ...data } = operacao;
                await updateDoc(doc(this.db, 'operacoes', String(id)), data);
            }

            async deleteOperacao(id) {
                const { doc, deleteDoc } = this.fns;
                await deleteDoc(doc(this.db, 'operacoes', String(id)));
            }

            async clearAll() {
                const { collection, getDocs, doc, deleteDoc } = this.fns;
                const snapshot = await getDocs(collection(this.db, 'operacoes'));
                const deletes = snapshot.docs.map(d => deleteDoc(doc(this.db, 'operacoes', d.id)));
                await Promise.all(deletes);
            }

            async getConfig(id) {
                const { doc, getDoc } = this.fns;
                const snap = await getDoc(doc(this.db, 'configuracoes', id));
                return snap.exists() ? snap.data() : null;
            }

            async setConfig(id, data) {
                const { doc, setDoc } = this.fns;
                await setDoc(doc(this.db, 'configuracoes', id), data, { merge: true });
            }
        }

        // ========== FUNÇÕES AUXILIARES ==========
        const formatarData = (data) => {
            const d = new Date(data + 'T00:00:00');
            return d.toLocaleDateString('pt-BR');
        };

        const calcularStatus = (meta, termino) => {
            if (!meta || !termino) return 'amarelo';
            const metaNum = parseInt(meta.replace(':', ''));
            const terminoNum = parseInt(termino.replace(':', ''));
            if (terminoNum <= metaNum) return 'verde';
            if (terminoNum > metaNum) return 'vermelho';
            return 'amarelo';
        };

        // ========== APP PRINCIPAL ==========
        function App() {
            const [db, setDb] = useState(null);
            const dbRef = useRef(null);
            const [operacoes, setOperacoes] = useState([]);
            const [abaSelecionada, setAbaSelecionada] = useState('torre');
            const [dataSelecionada, setDataSelecionada] = useState(() => {
                const now = new Date();
                const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
                const y = brt.getFullYear();
                const m = String(brt.getMonth() + 1).padStart(2, '0');
                const d = String(brt.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            });
            const [pendingChanges, setPendingChanges] = useState(false);
            const [listaOperacoes, setListaOperacoes] = useState([
                { nome: 'REC ITAPEVI', meta: '12:00' },
                { nome: 'REC BARUERI', meta: '12:00' },
                { nome: 'EXP ITAPEVI', meta: '17:00' },
                { nome: 'EXP BARUERI', meta: '17:00' },
                { nome: 'TRANSF ITAPEVI', meta: '16:00' },
                { nome: 'TRANSF BARUERI', meta: '16:00' }
            ]);

            // ========== FIREBASE AUTH + FIRESTORE INIT ==========
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginSenha, setLoginSenha] = useState('');
            const [loginErro, setLoginErro] = useState('');
            const [loginCarregando, setLoginCarregando] = useState(false);

            useEffect(() => {
                let unsubscribeAuth = null;
                const initFirebase = () => {
                    if (!window.__firebaseReady || !window.__firebaseFns) return;
                    const { onAuthStateChanged } = window.__firebaseFns;
                    unsubscribeAuth = onAuthStateChanged(window.__firebaseAuth, async (firebaseUser) => {
                        setUser(firebaseUser);
                        setAuthLoading(false);
                        if (firebaseUser) {
                            const firestoreDb = new FirestoreDB(window.__firebaseDb);
                            dbRef.current = firestoreDb;
                            setDb(firestoreDb);
                            try {
                                const config = await firestoreDb.getConfig('listaOperacoes');
                                if (config && config.lista) setListaOperacoes(config.lista);
                            } catch(e) { console.error('Erro ao carregar dados:', e); }
                        }
                    });
                };
                if (window.__firebaseReady) {
                    initFirebase();
                } else {
                    window.addEventListener('firebase-ready', initFirebase, { once: true });
                    let attempts = 0;
                    const poll = setInterval(() => {
                        attempts++;
                        if (window.__firebaseReady) { clearInterval(poll); initFirebase(); }
                        else if (attempts >= 50) { clearInterval(poll); setAuthLoading(false); }
                    }, 200);
                }
                return () => { if (unsubscribeAuth) unsubscribeAuth(); };
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginErro('');
                setLoginCarregando(true);
                try {
                    const { signInWithEmailAndPassword } = window.__firebaseFns;
                    await signInWithEmailAndPassword(window.__firebaseAuth, loginEmail, loginSenha);
                } catch(err) {
                    const msgs = {
                        'auth/invalid-credential': 'Email ou senha incorretos.',
                        'auth/user-not-found': 'Usuário não encontrado.',
                        'auth/wrong-password': 'Senha incorreta.',
                        'auth/invalid-email': 'Email inválido.',
                        'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.',
                    };
                    setLoginErro(msgs[err.code] || 'Erro ao entrar: ' + err.message);
                } finally {
                    setLoginCarregando(false);
                }
            };

            const handleLogout = async () => {
                const { signOut } = window.__firebaseFns;
                await signOut(window.__firebaseAuth);
                setUser(null);
                setDb(null);
                dbRef.current = null;
                setOperacoes([]);
            };

            const trocarAba = (novaAba) => {
                if (pendingChanges && novaAba !== abaSelecionada) {
                    const confirmar = window.confirm('⚠️ Você tem alterações não salvas em "Gerenciar Operações"!\n\nClique em OK para sair sem salvar, ou Cancelar para voltar e salvar.');
                    if (!confirmar) return;
                    setPendingChanges(false);
                }
                setAbaSelecionada(novaAba);
            };

            const carregarOperacoes = async (database) => {
                // onSnapshot já atualiza operacoes em tempo real.
                // Esta função é mantida para compatibilidade com componentes que a chamam.
                if (database) {
                    try {
                        const ops = await database.getAllOperacoes();
                        setOperacoes(ops);
                    } catch(e) { console.warn('carregarOperacoes fallback:', e); }
                }
            };

            const handleNovaOperacao = async (operacao) => {
                const currentDb = dbRef.current || db;
                if (!currentDb) { alert('❌ Banco de dados não inicializado. Aguarde e tente novamente.'); return; }
                await currentDb.addOperacao(operacao);
                // onSnapshot atualiza automaticamente em todos os dispositivos
            };

            const handleEditarOperacao = async (operacao) => {
                const currentDb = dbRef.current || db;
                if (!currentDb) return;
                await currentDb.updateOperacao(operacao);
                // onSnapshot atualiza automaticamente
            };

            const handleDeletarOperacao = async (id) => {
                const currentDb = dbRef.current || db;
                if (!currentDb) return;
                await currentDb.deleteOperacao(id);
                // onSnapshot atualiza automaticamente
            };

            const handleSalvarListaOperacoes = async (novaLista) => {
                const currentDb = dbRef.current || db;
                if (!currentDb) return;
                await currentDb.setConfig('listaOperacoes', { lista: novaLista });
                setListaOperacoes(novaLista);
            };

            // ========== REAL-TIME LISTENER PARA OPERAÇÕES ==========
            useEffect(() => {
                if (!user) return;
                const { collection, onSnapshot } = window.__firebaseFns;
                const db = window.__firebaseDb;
                const unsubscribe = onSnapshot(
                    collection(db, 'operacoes'),
                    (snapshot) => {
                        const ops = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                        setOperacoes(ops);
                    },
                    (err) => { console.error('Erro no listener em tempo real:', err); }
                );
                return () => unsubscribe();
            }, [user]);

            // ========== MONITORAMENTO DE USUÁRIOS ONLINE ==========
            const [usuariosOnline, setUsuariosOnline] = useState(1);
            useEffect(() => {
                if (!user) return;
                const { doc, setDoc, onSnapshot, collection } = window.__firebaseFns;
                const db = window.__firebaseDb;
                const presenceRef = doc(db, 'presenca', user.uid);
                const sessionId = Math.random().toString(36).slice(2);
                const registrarPresenca = async () => {
                    try {
                        await setDoc(presenceRef, {
                            uid: user.uid,
                            email: user.email,
                            online: true,
                            sessionId,
                            ultimaAtividade: new Date().toISOString()
                        }, { merge: false });
                    } catch(e) {}
                };
                registrarPresenca();
                const interval = setInterval(registrarPresenca, 45000);
                const unsubPresence = onSnapshot(
                    collection(db, 'presenca'),
                    (snapshot) => {
                        const agora = Date.now();
                        const ativos = snapshot.docs.filter(d => {
                            const data = d.data();
                            if (!data.online || !data.ultimaAtividade) return false;
                            const ultima = new Date(data.ultimaAtividade).getTime();
                            return (agora - ultima) < 120000;
                        });
                        setUsuariosOnline(ativos.length);
                    }
                );
                const marcarOffline = async () => {
                    try {
                        await setDoc(presenceRef, { online: false }, { merge: true });
                    } catch(e) {}
                };
                window.addEventListener('beforeunload', marcarOffline);
                return () => {
                    clearInterval(interval);
                    unsubPresence();
                    window.removeEventListener('beforeunload', marcarOffline);
                    marcarOffline();
                };
            }, [user]);

            // ========== TELA DE CARREGAMENTO ==========
            if (authLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="bg-white rounded-2xl shadow-2xl p-12 text-center">
                            <div className="text-6xl mb-4 icon-rotate inline-block">⚙️</div>
                            <p className="text-xl font-bold text-gray-600">Conectando ao Firebase...</p>
                        </div>
                    </div>
                );
            }

            // ========== TELA DE LOGIN ==========
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">📊</div>
                                <h1 className="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                                    Sistema de Gestão de Operações
                                </h1>
                                <p className="text-gray-500 mt-2">Faça login para continuar</p>
                            </div>
                            <form onSubmit={handleLogin}>
                                <div className="mb-4">
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                                    <input
                                        type="email"
                                        value={loginEmail}
                                        onChange={e => setLoginEmail(e.target.value)}
                                        className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
                                        placeholder="seu@email.com"
                                        required
                                    />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                                    <input
                                        type="password"
                                        value={loginSenha}
                                        onChange={e => setLoginSenha(e.target.value)}
                                        className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>
                                {loginErro && (
                                    <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center">
                                        ⚠️ {loginErro}
                                    </div>
                                )}
                                <button
                                    type="submit"
                                    disabled={loginCarregando}
                                    className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all disabled:opacity-60"
                                >
                                    {loginCarregando ? '⏳ Entrando...' : '🔐 Entrar'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ========== APP PRINCIPAL (usuário logado) ==========
            return (
                <div className="min-h-screen p-4">
                    {/* Badge de usuários online - canto inferior */}
                    {user && (
                        <div className="online-users-badge" title={`${usuariosOnline} usuário(s) conectado(s)`}>
                            <div className="online-dot"></div>
                            <span>{usuariosOnline} online</span>
                        </div>
                    )}
                    {/* Botão Sair - canto inferior direito */}
                    {user && (
                        <button
                            onClick={handleLogout}
                            className="btn-sair-fixo"
                            title={`Sair (${user.email})`}
                        >
                            🚪 Sair
                        </button>
                    )}
                    <div className="max-w-7xl mx-auto">
                        <header className="bg-white rounded-2xl shadow-2xl p-6 mb-6">
                            <h1 className="text-4xl font-bold text-center bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                                <span className="icon-pulse inline-block">📊</span> Sistema de Gestão de Operações
                            </h1>
                            <div className="flex justify-center items-center gap-2 mt-2">
                                <div style={{width:8,height:8,borderRadius:'50%',background:'#10b981',boxShadow:'0 0 0 2px rgba(16,185,129,0.3)',animation:'pulse 2s infinite'}}></div>
                                <span className="text-xs text-gray-400 font-medium">Dados sincronizados em tempo real · {operacoes.length} operações carregadas</span>
                            </div>
                        </header>

                        <nav className="flex gap-2 mb-6 flex-wrap">
                            {['torre', 'dashboard', 'performance', 'otimizacao', 'graficos', 'capacidade', 'cadastrar', 'editar', 'gerenciar', 'relatorios', 'upload', 'configuracoes'].map(aba => (
                                <button
                                    key={aba}
                                    onClick={() => trocarAba(aba)}
                                    className={`px-6 py-3 rounded-xl font-bold transition-all ${
                                        abaSelecionada === aba ? 'tab-active' : 'tab-inactive'
                                    }`}
                                >
                                    {aba === 'torre' && <><span className="icon-pulse inline-block">🗼</span> Torre de Controle</>
                                    }
                                    {aba === 'dashboard' && <><span className="icon-bounce inline-block">📊</span> Dashboard</>}
                                    {aba === 'performance' && <><span className="icon-pulse inline-block">🏆</span> Performance</>}
                                    {aba === 'otimizacao' && <><span className="icon-bounce inline-block">🚚</span> Otimização</>}
                                    {aba === 'graficos' && <><span className="icon-pulse inline-block">📈</span> Gráficos</>}
                                    {aba === 'capacidade' && <><span className="icon-bounce inline-block">👥</span> Capacidade</>}
                                    {aba === 'cadastrar' && <><span className="icon-bounce inline-block">➕</span> Cadastrar</>}
                                    {aba === 'editar' && <><span className="icon-swing inline-block">✏️</span> Editar</>}
                                    {aba === 'gerenciar' && <><span className="icon-rotate inline-block">🔧</span> Gerenciar Operações</>}
                                    {aba === 'relatorios' && <><span className="icon-pulse inline-block">📋</span> Relatórios</>}
                                    {aba === 'upload' && <><span className="icon-bounce inline-block">📤</span> Upload & Backup</>}
                                    {aba === 'configuracoes' && <><span className="icon-rotate inline-block">⚙️</span> Configurações</>}
                                </button>
                            ))}
                        </nav>

                        <main className="bg-white rounded-2xl shadow-2xl p-6">
                            {abaSelecionada === 'torre' && (
                                <TorreDeControle operacoes={operacoes} listaOperacoes={listaOperacoes} />
                            )}
                            {abaSelecionada === 'dashboard' && (
                                <Dashboard 
                                    operacoes={operacoes} 
                                    dataSelecionada={dataSelecionada}
                                    setDataSelecionada={setDataSelecionada}
                                    listaOperacoes={listaOperacoes}
                                />
                            )}
                            {abaSelecionada === 'performance' && (
                                <Performance operacoes={operacoes} listaOperacoes={listaOperacoes} />
                            )}
                            {abaSelecionada === 'otimizacao' && (
                                <Otimizacao />
                            )}
                            {abaSelecionada === 'graficos' && (
                                <Graficos operacoes={operacoes} listaOperacoes={listaOperacoes} />
                            )}
                            {abaSelecionada === 'capacidade' && (
                                <AnaliseCapacidade operacoes={operacoes} />
                            )}
                            {abaSelecionada === 'cadastrar' && (
                                <Cadastrar 
                                    onSalvar={handleNovaOperacao}
                                    listaOperacoes={listaOperacoes}
                                />
                            )}
                            {abaSelecionada === 'editar' && (
                                <Editar 
                                    operacoes={operacoes}
                                    onEditar={handleEditarOperacao}
                                    onDeletar={handleDeletarOperacao}
                                />
                            )}
                            {abaSelecionada === 'gerenciar' && (
                                <GerenciarOperacoes
                                    listaOperacoes={listaOperacoes}
                                    onSalvar={handleSalvarListaOperacoes}
                                    setPendingChanges={setPendingChanges}
                                />
                            )}
                            {abaSelecionada === 'relatorios' && (
                                <Relatorios operacoes={operacoes} />
                            )}
                            {abaSelecionada === 'upload' && (
                                <UploadBackup db={db} operacoes={operacoes} listaOperacoes={listaOperacoes} onUpdate={carregarOperacoes} onSalvarLista={handleSalvarListaOperacoes} />
                            )}
                            {abaSelecionada === 'configuracoes' && (
                                <Configuracoes 
                                    db={db}
                                    operacoes={operacoes}
                                    onUpdate={carregarOperacoes}
                                />
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        // ========== TORRE DE CONTROLE ==========
        function TorreDeControle({ operacoes, listaOperacoes }) {
            const { useState, useEffect, useMemo, useRef } = React;

            const getBRT = () => {
                const n = new Date();
                const b = new Date(n.toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
                const y = b.getFullYear();
                const m = String(b.getMonth()+1).padStart(2,'0');
                const d = String(b.getDate()).padStart(2,'0');
                return `${y}-${m}-${d}`;
            };
            const hoje = getBRT();

            // Período
            const [periodo, setPeriodo] = useState('30d');
            const [dataIni, setDataIni] = useState(() => { const d=new Date(hoje); d.setDate(d.getDate()-29); return d.toISOString().split('T')[0]; });
            const [dataFim, setDataFim] = useState(hoje);
            const [opFiltro, setOpFiltro] = useState('TODAS');
            const [subAba, setSubAba] = useState('executivo'); // executivo | historico | ranking | tendencias
            const [metrica, setMetrica] = useState('pontualidade'); // pontualidade | nf | vol | cubagem

            // Chart refs
            const chartTendRef  = useRef(null);
            const chartDistRef  = useRef(null);
            const chartMesRef   = useRef(null);
            const chartOpRef    = useRef(null);
            const chartMultiRef = useRef(null);
            const instTend  = useRef(null);
            const instDist  = useRef(null);
            const instMes   = useRef(null);
            const instOp    = useRef(null);
            const instMulti = useRef(null);

            // Ajustar datas quando mudar período
            useEffect(() => {
                const d = new Date(hoje);
                if (periodo === '7d')  { d.setDate(d.getDate()-6);  setDataIni(d.toISOString().split('T')[0]); setDataFim(hoje); }
                if (periodo === '30d') { d.setDate(d.getDate()-29); setDataIni(d.toISOString().split('T')[0]); setDataFim(hoje); }
                if (periodo === '90d') { d.setDate(d.getDate()-89); setDataIni(d.toISOString().split('T')[0]); setDataFim(hoje); }
                if (periodo === '12m') { d.setMonth(d.getMonth()-11); d.setDate(1); setDataIni(d.toISOString().split('T')[0]); setDataFim(hoje); }
            }, [periodo]);

            // Lista de operações disponíveis
            const opsDisponiveis = useMemo(() => {
                const s = new Set(operacoes.map(o=>o.operacao).filter(Boolean));
                return ['TODAS', ...Array.from(s).sort()];
            }, [operacoes]);

            // Operações filtradas pelo período e operação
            const opsFiltradas = useMemo(() => {
                return operacoes.filter(o => {
                    const dataOk = o.data >= dataIni && o.data <= dataFim;
                    const opOk = opFiltro === 'TODAS' || o.operacao === opFiltro;
                    return dataOk && opOk;
                });
            }, [operacoes, dataIni, dataFim, opFiltro]);

            // KPIs gerais
            const kpis = useMemo(() => {
                const total    = opsFiltradas.length;
                const verde    = opsFiltradas.filter(o=>o.status==='verde').length;
                const vermelho = opsFiltradas.filter(o=>o.status==='vermelho').length;
                const amarelo  = opsFiltradas.filter(o=>o.status==='amarelo').length;
                const taxa     = total > 0 ? (verde/total*100) : 0;
                const nfTotal  = opsFiltradas.reduce((a,o)=>a+(o.nf||0),0);
                const volTotal = opsFiltradas.reduce((a,o)=>a+(o.vol||0),0);
                const cubTotal = opsFiltradas.reduce((a,o)=>a+parseFloat(o.cubagem||0),0);
                const diasUnicos = new Set(opsFiltradas.map(o=>o.data)).size;
                const mediaNF  = diasUnicos > 0 ? nfTotal/diasUnicos : 0;
                const mediaVol = diasUnicos > 0 ? volTotal/diasUnicos : 0;
                return { total, verde, vermelho, amarelo, taxa, nfTotal, volTotal, cubTotal, diasUnicos, mediaNF, mediaVol };
            }, [opsFiltradas]);

            // Dados por data (para gráficos de tendência)
            const dadosPorData = useMemo(() => {
                const map = {};
                opsFiltradas.forEach(o => {
                    if (!map[o.data]) map[o.data] = { data:o.data, total:0, verde:0, vermelho:0, amarelo:0, nf:0, vol:0, cub:0 };
                    map[o.data].total++;
                    map[o.data][o.status]++;
                    map[o.data].nf  += (o.nf||0);
                    map[o.data].vol += (o.vol||0);
                    map[o.data].cub += parseFloat(o.cubagem||0);
                });
                return Object.values(map).sort((a,b)=>a.data.localeCompare(b.data));
            }, [opsFiltradas]);

            // Dados por mês
            const dadosPorMes = useMemo(() => {
                const map = {};
                opsFiltradas.forEach(o => {
                    const mes = o.data.substring(0,7);
                    if (!map[mes]) map[mes] = { mes, total:0, verde:0, vermelho:0, nf:0, vol:0, cub:0 };
                    map[mes].total++;
                    map[mes][o.status]++;
                    map[mes].nf  += (o.nf||0);
                    map[mes].vol += (o.vol||0);
                    map[mes].cub += parseFloat(o.cubagem||0);
                });
                return Object.values(map).sort((a,b)=>a.mes.localeCompare(b.mes));
            }, [opsFiltradas]);

            // Ranking por operação
            const rankingOps = useMemo(() => {
                const map = {};
                opsFiltradas.forEach(o => {
                    if (!map[o.operacao]) map[o.operacao] = { nome:o.operacao, total:0, verde:0, vermelho:0, amarelo:0, nf:0, vol:0, cub:0 };
                    map[o.operacao].total++;
                    map[o.operacao][o.status]++;
                    map[o.operacao].nf  += (o.nf||0);
                    map[o.operacao].vol += (o.vol||0);
                    map[o.operacao].cub += parseFloat(o.cubagem||0);
                });
                return Object.values(map)
                    .map(r=>({...r, taxa: r.total>0 ? r.verde/r.total*100 : 0}))
                    .sort((a,b)=>b.taxa-a.taxa);
            }, [opsFiltradas]);

            // Tendência: comparar 2ª metade vs 1ª metade do período (por métrica)
            const tendencia = useMemo(() => {
                if (dadosPorData.length < 2) return null;
                const mid = Math.floor(dadosPorData.length/2);
                const primeira = dadosPorData.slice(0, mid);
                const segunda  = dadosPorData.slice(mid);
                const getVal = (arr) => {
                    if (metrica==='pontualidade') return arr.reduce((a,d)=>a+d.verde,0) / Math.max(arr.reduce((a,d)=>a+d.total,0),1) * 100;
                    if (metrica==='nf')           return arr.reduce((a,d)=>a+d.nf,0);
                    if (metrica==='vol')          return arr.reduce((a,d)=>a+d.vol,0);
                    if (metrica==='cubagem')      return arr.reduce((a,d)=>a+d.cub,0);
                    return 0;
                };
                const v1 = getVal(primeira), v2 = getVal(segunda);
                const diff = v2 - v1;
                const pct = v1 > 0 ? (diff/v1*100) : 0;
                const lbl = metrica==='pontualidade' ? '%' : metrica==='cubagem' ? ' m³' : '';
                return {
                    taxa1: metrica==='pontualidade' ? v1.toFixed(1) : Math.round(v1).toLocaleString('pt-BR'),
                    taxa2: metrica==='pontualidade' ? v2.toFixed(1) : Math.round(v2).toLocaleString('pt-BR'),
                    diff:  metrica==='pontualidade' ? diff.toFixed(1) : Math.round(diff).toLocaleString('pt-BR'),
                    pct: pct.toFixed(1), lbl,
                    up: diff > 0, down: diff < 0
                };
            }, [dadosPorData, metrica]);

            // Helpers de label e cor por métrica
            const mLabel = metrica==='pontualidade'?'Pontualidade':metrica==='nf'?'NFs':metrica==='vol'?'Volumes':'Cubagem';
            const mIcon  = metrica==='pontualidade'?'📊':metrica==='nf'?'📄':metrica==='vol'?'📦':'⚖️';
            const mCor   = metrica==='pontualidade'?'#7c3aed':metrica==='nf'?'#3b82f6':metrica==='vol'?'#10b981':'#f59e0b';
            const mValOp = (o) => metrica==='nf'?(o.nf||0):metrica==='vol'?(o.vol||0):metrica==='cubagem'?(o.cubagem||0):0;
            const mValDia = (d) => metrica==='nf'?d.nf:metrica==='vol'?d.vol:metrica==='cubagem'?d.cub:0;
            const mValMes = (m) => metrica==='nf'?m.nf:metrica==='vol'?m.vol:metrica==='cubagem'?m.cub:0;
            const mValRank= (r) => metrica==='nf'?r.nf:metrica==='vol'?r.vol:metrica==='cubagem'?r.cub:r.taxa;
            const mFmt   = (v) => metrica==='pontualidade'?v.toFixed(1)+'%':metrica==='cubagem'?v.toFixed(2):Math.round(v).toLocaleString('pt-BR');

            // Cores para linhas por operação (mesmo estilo da aba Gráficos)
            const TORRE_CORES = ['#667eea','#f093fb','#f5a623','#50e3c2','#e74c3c','#9b59b6','#3498db','#2ecc71','#e67e22','#1abc9c','#e91e63','#ff5722'];
            const getTorreCor = (idx) => TORRE_CORES[idx % TORRE_CORES.length];

            // Datasets multi-linha por operação (para o gráfico estilo Evolução Geral)
            const torredatasUnicas = useMemo(() => {
                const s = new Set(opsFiltradas.map(o=>o.data));
                return Array.from(s).sort();
            }, [opsFiltradas]);

            const torrefmtLabel = (s) => { if(!s) return ''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); };

            const torreOpsUnicas = useMemo(() => {
                const s = new Set(opsFiltradas.map(o=>o.operacao).filter(Boolean));
                return Array.from(s).sort();
            }, [opsFiltradas]);

            const torreDadosGeral = useMemo(() => {
                return torreOpsUnicas.map((op, idx) => {
                    const data = torredatasUnicas.map(d => {
                        const reg = opsFiltradas.filter(o=>o.data===d && o.operacao===op);
                        if (metrica==='pontualidade') { const t=reg.length, v=reg.filter(r=>r.status==='verde').length; return t>0?parseFloat((v/t*100).toFixed(1)):0; }
                        if (metrica==='nf')      return reg.reduce((a,r)=>a+(r.nf||0),0);
                        if (metrica==='vol')     return reg.reduce((a,r)=>a+(r.vol||0),0);
                        if (metrica==='cubagem') return parseFloat(reg.reduce((a,r)=>a+(r.cubagem||0),0).toFixed(2));
                        return 0;
                    });
                    const cor = getTorreCor(idx);
                    return { label: op, data, borderColor: cor, backgroundColor: cor+'18', tension: 0.4, pointRadius: 5, pointHoverRadius: 8, borderWidth: 2.5, fill: false };
                });
            }, [torreOpsUnicas, torredatasUnicas, opsFiltradas, metrica]);

            const fmtData = (s) => { if(!s) return ''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); };
            const fmtMes  = (s) => { if(!s) return ''; const [y,m]=s.split('-'); const ns=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return (ns[parseInt(m)-1]||m)+'/'+y.slice(2); };
            const fmtNum  = (n) => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(Math.round(n));

            // Gráfico tendência pontualidade por dia
            useEffect(() => {
                if (subAba !== 'tendencias' && subAba !== 'executivo') return;
                if (!chartTendRef.current) return;
                if (instTend.current) { instTend.current.destroy(); instTend.current = null; }
                if (dadosPorData.length === 0) return;
                const labels = dadosPorData.map(d=>fmtData(d.data));
                const isPorc = metrica === 'pontualidade';
                const taxas = dadosPorData.map(d => {
                    if (metrica==='pontualidade') return d.total>0 ? +(d.verde/d.total*100).toFixed(1) : 0;
                    if (metrica==='nf')           return d.nf;
                    if (metrica==='vol')          return d.vol;
                    if (metrica==='cubagem')      return +d.cub.toFixed(2);
                    return 0;
                });
                const labelMetrica = metrica==='pontualidade'?'Pontualidade (%)':metrica==='nf'?'NFs':metrica==='vol'?'Volumes':'Cubagem (m³)';
                const corLinha = metrica==='pontualidade'?'#7c3aed':metrica==='nf'?'#3b82f6':metrica==='vol'?'#10b981':'#f59e0b';
                const corFundo = metrica==='pontualidade'?'rgba(124,58,237,0.08)':metrica==='nf'?'rgba(59,130,246,0.08)':metrica==='vol'?'rgba(16,185,129,0.08)':'rgba(245,158,11,0.08)';
                instTend.current = new Chart(chartTendRef.current, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: labelMetrica,
                            data: taxas,
                            borderColor: corLinha,
                            backgroundColor: corFundo,
                            borderWidth: 2.5,
                            pointBackgroundColor: isPorc ? taxas.map(v=>v>=80?'#10b981':v>=60?'#f59e0b':'#ef4444') : corLinha,
                            pointRadius: 4,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend:{display:false}, datalabels:{display:false} },
                        scales: {
                            x: { grid:{display:false}, ticks:{font:{size:10}, maxTicksLimit:12} },
                            y: { min:0, ...(isPorc?{max:100}:{}), ticks:{callback:v=>isPorc?v+'%':v.toLocaleString('pt-BR'), font:{size:10}}, grid:{color:'rgba(0,0,0,0.05)'} }
                        }
                    }
                });
            }, [dadosPorData, subAba, metrica]);

            // Gráfico distribuição status
            useEffect(() => {
                if (subAba !== 'executivo' && subAba !== 'historico') return;
                if (!chartDistRef.current) return;
                if (instDist.current) { instDist.current.destroy(); instDist.current = null; }
                if (kpis.total === 0) return;
                instDist.current = new Chart(chartDistRef.current, {
                    type: 'doughnut',
                    data: {
                        labels: ['No prazo','Atrasadas','Pendentes'],
                        datasets: [{
                            data: [kpis.verde, kpis.vermelho, kpis.amarelo],
                            backgroundColor: ['#10b981','#ef4444','#f59e0b'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: {
                            legend: { position:'bottom', labels:{font:{size:11}, padding:10} },
                            datalabels: {
                                color:'#fff', font:{size:11, weight:'bold'},
                                formatter:(v,ctx) => { const t=ctx.dataset.data.reduce((a,b)=>a+b,0); return t>0&&v>0?Math.round(v/t*100)+'%':''; }
                            }
                        }
                    },
                    plugins: [ChartDataLabels]
                });
            }, [kpis, subAba]);

            // Gráfico volume por mês
            useEffect(() => {
                if (subAba !== 'historico') return;
                if (!chartMesRef.current) return;
                if (instMes.current) { instMes.current.destroy(); instMes.current = null; }
                if (dadosPorMes.length === 0) return;
                const isPorc2 = metrica === 'pontualidade';
                const mesDatasets = isPorc2
                    ? [{ label:'Pontualidade (%)', data:dadosPorMes.map(d=>d.total>0?+(d.verde/d.total*100).toFixed(1):0), backgroundColor:'rgba(124,58,237,0.75)', borderRadius:6 }]
                    : metrica==='nf'
                        ? [{ label:'NFs', data:dadosPorMes.map(d=>d.nf), backgroundColor:'rgba(59,130,246,0.75)', borderRadius:6 }]
                        : metrica==='vol'
                            ? [{ label:'Volumes', data:dadosPorMes.map(d=>d.vol), backgroundColor:'rgba(16,185,129,0.75)', borderRadius:6 }]
                            : [{ label:'Cubagem (m³)', data:dadosPorMes.map(d=>+d.vol.toFixed ? dadosPorData.filter(dd=>dd.data.startsWith(d.mes)).reduce((a,dd)=>a+dd.cub,0).toFixed(2) : 0), backgroundColor:'rgba(245,158,11,0.75)', borderRadius:6 }];
                instMes.current = new Chart(chartMesRef.current, {
                    type: isPorc2 ? 'line' : 'bar',
                    data: {
                        labels: dadosPorMes.map(d=>fmtMes(d.mes)),
                        datasets: mesDatasets
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend:{position:'top', labels:{font:{size:11}}}, datalabels:{display:false} },
                        scales: {
                            x: { grid:{display:false}, ticks:{font:{size:10}} },
                            y: { ...(isPorc2?{min:0,max:100}:{}), ticks:{callback:v=>isPorc2?v+'%':v.toLocaleString('pt-BR'), font:{size:10}}, grid:{color:'rgba(0,0,0,0.05)'} }
                        },
                        ...(isPorc2?{elements:{line:{tension:0.4,fill:true,backgroundColor:'rgba(124,58,237,0.08)'}}}:{})
                    }
                });
            }, [dadosPorMes, dadosPorData, subAba, metrica]);

            // Gráfico taxa por operação
            useEffect(() => {
                if (subAba !== 'ranking') return;
                if (!chartOpRef.current) return;
                if (instOp.current) { instOp.current.destroy(); instOp.current = null; }
                const isPorc3 = metrica==='pontualidade';
                const topSorted = [...rankingOps].sort((a,b)=>isPorc3?b.taxa-a.taxa:mValRank(b)-mValRank(a)).slice(0,10);
                if (topSorted.length === 0) return;
                const rankVals = topSorted.map(r=>isPorc3?+r.taxa.toFixed(1):metrica==='cubagem'?+r.cub.toFixed(2):metrica==='nf'?r.nf:r.vol);
                const rankCors = isPorc3
                    ? topSorted.map(r=>r.taxa>=80?'rgba(16,185,129,0.75)':r.taxa>=60?'rgba(245,158,11,0.75)':'rgba(239,68,68,0.75)')
                    : metrica==='nf'?'rgba(59,130,246,0.75)':metrica==='vol'?'rgba(16,185,129,0.75)':'rgba(245,158,11,0.75)';
                instOp.current = new Chart(chartOpRef.current, {
                    type: 'bar',
                    data: {
                        labels: topSorted.map(r=>r.nome.length>18?r.nome.substring(0,18)+'…':r.nome),
                        datasets: [{
                            label: mLabel,
                            data: rankVals,
                            backgroundColor: rankCors,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend:{display:false},
                            datalabels:{ anchor:'end', align:'right', color:'#374151', font:{size:11,weight:'bold'}, formatter:v=>isPorc3?v+'%':typeof v==='number'&&v>=1000?(v/1000).toFixed(1)+'k':String(v) }
                        },
                        scales: {
                            x: { ...(isPorc3?{min:0,max:100}:{}), ticks:{callback:v=>isPorc3?v+'%':v>=1000?(v/1000).toFixed(1)+'k':v, font:{size:10}}, grid:{color:'rgba(0,0,0,0.05)'} },
                            y: { grid:{display:false}, ticks:{font:{size:11}} }
                        }
                    },
                    plugins: [ChartDataLabels]
                });
            }, [rankingOps, subAba, metrica]);

            // Gráfico multi-linha estilo Evolução Geral
            useEffect(() => {
                if (subAba !== 'executivo' && subAba !== 'tendencias') return;
                if (!chartMultiRef.current) return;
                if (instMulti.current) { instMulti.current.destroy(); instMulti.current = null; }
                if (torredatasUnicas.length === 0 || torreDadosGeral.length === 0) return;
                instMulti.current = new Chart(chartMultiRef.current, {
                    type: 'line',
                    data: { labels: torredatasUnicas.map(torrefmtLabel), datasets: torreDadosGeral },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14, padding: 12 } },
                            datalabels: { display: false }
                        },
                        scales: {
                            x: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } },
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { callback: v => metrica==='pontualidade'?v+'%':v.toLocaleString('pt-BR'), font: { size: 10 } } }
                        }
                    }
                });
            }, [torreDadosGeral, torredatasUnicas, subAba, metrica]);

            // Cleanup ao desmontar
            useEffect(() => {
                return () => {
                    [instTend, instDist, instMes, instOp, instMulti].forEach(r => { if(r.current){r.current.destroy();r.current=null;} });
                };
            }, []);

            const subAbas = [
                { key:'executivo',  label:'🗼 Executivo'    },
                { key:'historico',  label:'📅 Histórico'    },
                { key:'ranking',    label:'🏅 Ranking'      },
                { key:'tendencias', label:'📈 Tendências'   },
            ];

            return (
                <div className="torre-wrapper animate-slide-in">
                    {/* Header */}
                    <div className="torre-header-bar">
                        <div>
                            <div className="torre-header-title">🗼 Torre de Controle</div>
                            <div className="torre-header-subtitle">Visão executiva consolidada — histórico e tendências</div>
                        </div>
                        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
                            <span className="torre-badge">📊 {opsFiltradas.length} registros</span>
                            <span className="torre-badge">📅 {dataIni} → {dataFim}</span>
                        </div>
                    </div>

                    {/* Filtros */}
                    <div className="torre-filtros">
                        <span className="torre-filtro-label">Período:</span>
                        {[['7d','7 dias'],['30d','30 dias'],['90d','90 dias'],['12m','12 meses'],['custom','Personalizado']].map(([k,l])=>(
                            <button key={k} className={`torre-btn-periodo${periodo===k?' active':''}`} onClick={()=>setPeriodo(k)}>{l}</button>
                        ))}
                        {periodo==='custom' && (<>
                            <input type="date" className="torre-input-date" value={dataIni} onChange={e=>setDataIni(e.target.value)} />
                            <span className="torre-filtro-label">até</span>
                            <input type="date" className="torre-input-date" value={dataFim} onChange={e=>setDataFim(e.target.value)} />
                        </>)}
                        <select className="torre-select" value={opFiltro} onChange={e=>setOpFiltro(e.target.value)}>
                            {opsDisponiveis.map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                        <span className="torre-filtro-label" style={{marginLeft:'8px'}}>Análise:</span>
                        {[['pontualidade','📊 Pontualidade'],['nf','📄 NFs'],['vol','📦 Volumes'],['cubagem','⚖️ Cubagem']].map(([k,l])=>(
                            <button key={k} className={`torre-btn-periodo${metrica===k?' active':''}`} onClick={()=>setMetrica(k)}>{l}</button>
                        ))}
                    </div>

                    {/* Sub-abas */}
                    <div style={{display:'flex',gap:'6px',marginBottom:'20px',flexWrap:'wrap'}}>
                        {subAbas.map(s=>(
                            <button key={s.key}
                                onClick={()=>setSubAba(s.key)}
                                style={{
                                    padding:'8px 18px', borderRadius:'10px', fontSize:'13px', fontWeight:'700',
                                    border:'none', cursor:'pointer', transition:'all 0.15s',
                                    background: subAba===s.key ? 'linear-gradient(135deg,#6d28d9,#7c3aed)' : '#f3f0ff',
                                    color: subAba===s.key ? '#fff' : '#6d28d9',
                                    boxShadow: subAba===s.key ? '0 4px 12px rgba(124,58,237,0.3)' : 'none'
                                }}>
                                {s.label}
                            </button>
                        ))}
                    </div>

                    {/* ── SUB-ABA: EXECUTIVO ── */}
                    {subAba==='executivo' && (<>
                        {kpis.total === 0 ? (
                            <div className="torre-empty">
                                <div className="torre-empty-icon">📭</div>
                                <p style={{fontWeight:'600',fontSize:'16px',marginBottom:'6px'}}>Nenhum dado no período selecionado</p>
                                <p style={{fontSize:'13px'}}>Ajuste os filtros de data ou cadastre operações.</p>
                            </div>
                        ) : (<>
                            {/* Resumo rápido — dinâmico por métrica */}
                            <div className="torre-resumo-periodo">
                                <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.total}</div><div className="torre-resumo-lbl">Total operações</div></div>
                                {metrica==='pontualidade' && <>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.taxa.toFixed(1)}%</div><div className="torre-resumo-lbl">Taxa pontualidade</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.verde}</div><div className="torre-resumo-lbl">No prazo</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.vermelho}</div><div className="torre-resumo-lbl">Atrasadas</div></div>
                                </>}
                                {metrica==='nf' && <>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.nfTotal.toLocaleString('pt-BR')}</div><div className="torre-resumo-lbl">Total NFs</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{Math.round(kpis.mediaNF).toLocaleString('pt-BR')}</div><div className="torre-resumo-lbl">Média NF/dia</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.diasUnicos}</div><div className="torre-resumo-lbl">Dias com registro</div></div>
                                </>}
                                {metrica==='vol' && <>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.volTotal.toLocaleString('pt-BR')}</div><div className="torre-resumo-lbl">Total volumes</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{Math.round(kpis.mediaVol).toLocaleString('pt-BR')}</div><div className="torre-resumo-lbl">Média Vol/dia</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.diasUnicos}</div><div className="torre-resumo-lbl">Dias com registro</div></div>
                                </>}
                                {metrica==='cubagem' && <>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.cubTotal.toFixed(2)}</div><div className="torre-resumo-lbl">Total m³</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.diasUnicos>0?(kpis.cubTotal/kpis.diasUnicos).toFixed(2):0}</div><div className="torre-resumo-lbl">Média m³/dia</div></div>
                                    <div className="torre-resumo-item"><div className="torre-resumo-val">{kpis.diasUnicos}</div><div className="torre-resumo-lbl">Dias com registro</div></div>
                                </>}
                                {tendencia && (
                                    <div className="torre-resumo-item">
                                        <div style={{fontSize:'22px',fontWeight:'800',color:tendencia.up?'#34d399':tendencia.down?'#f87171':'#fbbf24'}}>
                                            {tendencia.up?'↑':tendencia.down?'↓':'→'} {tendencia.diff}{tendencia.lbl}
                                        </div>
                                        <div className="torre-resumo-lbl">Tendência</div>
                                    </div>
                                )}
                            </div>
                            {/* KPI Cards — dinâmicos por métrica */}
                            <div className="torre-kpi-grid">
                                {metrica==='pontualidade' && <>
                                    <div className="torre-kpi-card green"><div className="torre-kpi-icon">✅</div><div className="torre-kpi-label">No Prazo</div><div className="torre-kpi-value">{kpis.verde}</div><div className="torre-kpi-sub">{kpis.total>0?(kpis.verde/kpis.total*100).toFixed(1):0}% do total</div></div>
                                    <div className="torre-kpi-card red"><div className="torre-kpi-icon">❌</div><div className="torre-kpi-label">Atrasadas</div><div className="torre-kpi-value">{kpis.vermelho}</div><div className="torre-kpi-sub">{kpis.total>0?(kpis.vermelho/kpis.total*100).toFixed(1):0}% do total</div></div>
                                    <div className="torre-kpi-card amber"><div className="torre-kpi-icon">⏳</div><div className="torre-kpi-label">Pendentes</div><div className="torre-kpi-value">{kpis.amarelo}</div><div className="torre-kpi-sub">{kpis.total>0?(kpis.amarelo/kpis.total*100).toFixed(1):0}% do total</div></div>
                                    <div className="torre-kpi-card purple"><div className="torre-kpi-icon">📊</div><div className="torre-kpi-label">Taxa pontualidade</div><div className="torre-kpi-value">{kpis.taxa.toFixed(1)}%</div><div className="torre-kpi-sub">{kpis.diasUnicos} dias</div></div>
                                </>}
                                {metrica==='nf' && <>
                                    <div className="torre-kpi-card blue"><div className="torre-kpi-icon">📄</div><div className="torre-kpi-label">Total NFs</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{kpis.nfTotal.toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">no período</div></div>
                                    <div className="torre-kpi-card purple"><div className="torre-kpi-icon">📅</div><div className="torre-kpi-label">Média NF/dia</div><div className="torre-kpi-value">{Math.round(kpis.mediaNF).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">{kpis.diasUnicos} dias</div></div>
                                    <div className="torre-kpi-card green"><div className="torre-kpi-icon">📄</div><div className="torre-kpi-label">NFs no prazo</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{opsFiltradas.filter(o=>o.status==='verde').reduce((a,o)=>a+(o.nf||0),0).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">operações verdes</div></div>
                                    <div className="torre-kpi-card red"><div className="torre-kpi-icon">📄</div><div className="torre-kpi-label">NFs em atraso</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{opsFiltradas.filter(o=>o.status==='vermelho').reduce((a,o)=>a+(o.nf||0),0).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">operações vermelhas</div></div>
                                </>}
                                {metrica==='vol' && <>
                                    <div className="torre-kpi-card green"><div className="torre-kpi-icon">📦</div><div className="torre-kpi-label">Total volumes</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{kpis.volTotal.toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">no período</div></div>
                                    <div className="torre-kpi-card purple"><div className="torre-kpi-icon">📅</div><div className="torre-kpi-label">Média Vol/dia</div><div className="torre-kpi-value">{Math.round(kpis.mediaVol).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">{kpis.diasUnicos} dias</div></div>
                                    <div className="torre-kpi-card blue"><div className="torre-kpi-icon">📦</div><div className="torre-kpi-label">Vols no prazo</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{opsFiltradas.filter(o=>o.status==='verde').reduce((a,o)=>a+(o.vol||0),0).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">operações verdes</div></div>
                                    <div className="torre-kpi-card red"><div className="torre-kpi-icon">📦</div><div className="torre-kpi-label">Vols em atraso</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{opsFiltradas.filter(o=>o.status==='vermelho').reduce((a,o)=>a+(o.vol||0),0).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">operações vermelhas</div></div>
                                </>}
                                {metrica==='cubagem' && <>
                                    <div className="torre-kpi-card amber"><div className="torre-kpi-icon">⚖️</div><div className="torre-kpi-label">Total cubagem</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{kpis.cubTotal.toFixed(2)}</div><div className="torre-kpi-sub">m³ no período</div></div>
                                    <div className="torre-kpi-card purple"><div className="torre-kpi-icon">📅</div><div className="torre-kpi-label">Média m³/dia</div><div className="torre-kpi-value">{kpis.diasUnicos>0?(kpis.cubTotal/kpis.diasUnicos).toFixed(2):0}</div><div className="torre-kpi-sub">{kpis.diasUnicos} dias</div></div>
                                    <div className="torre-kpi-card green"><div className="torre-kpi-icon">⚖️</div><div className="torre-kpi-label">m³ no prazo</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{opsFiltradas.filter(o=>o.status==='verde').reduce((a,o)=>a+parseFloat(o.cubagem||0),0).toFixed(2)}</div><div className="torre-kpi-sub">operações verdes</div></div>
                                    <div className="torre-kpi-card red"><div className="torre-kpi-icon">⚖️</div><div className="torre-kpi-label">m³ em atraso</div><div className="torre-kpi-value" style={{fontSize:'22px'}}>{opsFiltradas.filter(o=>o.status==='vermelho').reduce((a,o)=>a+parseFloat(o.cubagem||0),0).toFixed(2)}</div><div className="torre-kpi-sub">operações vermelhas</div></div>
                                </>}
                            </div>
                            {/* Gráfico multi-linha estilo Evolução Geral */}
                            <div className="torre-chart-panel">
                                <div className="torre-chart-header">
                                    <div className="torre-chart-title">{mIcon} Evolução Geral — {mLabel}</div>
                                    <span style={{fontSize:'11px',color:'#9ca3af'}}>{torredatasUnicas.length} dias · {torreOpsUnicas.length} operações</span>
                                </div>
                                <div style={{position:'relative', height:'320px'}}>
                                    {torredatasUnicas.length > 0
                                        ? <canvas ref={chartMultiRef}></canvas>
                                        : <div className="torre-empty" style={{padding:'30px'}}><p>Sem dados</p></div>
                                    }
                                </div>
                            </div>
                        </>)}
                    </>)}

                    {/* ── SUB-ABA: HISTÓRICO ── */}
                    {subAba==='historico' && (<>
                        {dadosPorMes.length === 0 ? (
                            <div className="torre-empty">
                                <div className="torre-empty-icon">📭</div>
                                <p style={{fontWeight:'600',fontSize:'16px',marginBottom:'6px'}}>Nenhum dado no período</p>
                            </div>
                        ) : (<>
                            <div className="torre-kpi-grid" style={{marginBottom:'16px'}}>
                                {dadosPorMes.map(m=>{
                                    const taxa = m.total>0?m.verde/m.total*100:0;
                                    const valMes = mValMes(m);
                                    const cor = metrica==='pontualidade'?(taxa>=80?'green':taxa>=60?'amber':'red'):'blue';
                                    return (
                                        <div key={m.mes} className={`torre-kpi-card ${cor}`}>
                                            <div className="torre-kpi-label">{fmtMes(m.mes)}</div>
                                            {metrica==='pontualidade' && <><div className="torre-kpi-value">{taxa.toFixed(1)}%</div><div className="torre-kpi-sub">{m.verde} ok / {m.vermelho} atraso</div></>}
                                            {metrica!=='pontualidade' && <><div className="torre-kpi-value" style={{fontSize:'20px'}}>{metrica==='cubagem'?valMes.toFixed(2):Math.round(valMes).toLocaleString('pt-BR')}</div><div className="torre-kpi-sub">{mLabel}{metrica==='cubagem'?' m³':''} · {m.total} ops</div></>}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="torre-chart-panel">
                                <div className="torre-chart-header">
                                    <div className="torre-chart-title">{mIcon} {mLabel} por mês</div>
                                    <span style={{fontSize:'11px',color:'#9ca3af'}}>{dadosPorMes.length} meses</span>
                                </div>
                                <div className="torre-canvas-wrap" style={{height:'260px'}}>
                                    <canvas ref={chartMesRef}></canvas>
                                </div>
                            </div>
                            {/* Tabela mensal — dinâmica por métrica */}
                            <div className="torre-chart-panel" style={{marginTop:'0'}}>
                                <div className="torre-chart-header">
                                    <div className="torre-chart-title">📋 {mLabel} — resumo mensal</div>
                                </div>
                                <div style={{overflowX:'auto'}}>
                                    <table className="torre-table">
                                        <thead><tr>
                                            <th>Mês</th>
                                            <th>Total ops</th>
                                            {metrica==='pontualidade' && <><th>✅ No prazo</th><th>❌ Atraso</th><th>⏳ Pendente</th><th>Pontualidade</th></>}
                                            {metrica==='nf'      && <><th>Total NFs</th><th>NFs/dia</th></>}
                                            {metrica==='vol'     && <><th>Total Vols</th><th>Vols/dia</th></>}
                                            {metrica==='cubagem' && <><th>Total m³</th><th>m³/dia</th></>}
                                        </tr></thead>
                                        <tbody>
                                            {dadosPorMes.map(m=>{
                                                const taxa=m.total>0?m.verde/m.total*100:0;
                                                const cor=taxa>=80?'#10b981':taxa>=60?'#f59e0b':'#ef4444';
                                                const diasMes = new Set(opsFiltradas.filter(o=>o.data.startsWith(m.mes)).map(o=>o.data)).size || 1;
                                                return (
                                                    <tr key={m.mes}>
                                                        <td><strong>{fmtMes(m.mes)}</strong></td>
                                                        <td>{m.total}</td>
                                                        {metrica==='pontualidade' && <>
                                                            <td style={{color:'#065f46',fontWeight:'700'}}>{m.verde}</td>
                                                            <td style={{color:'#991b1b',fontWeight:'700'}}>{m.vermelho}</td>
                                                            <td style={{color:'#92400e',fontWeight:'700'}}>{m.amarelo}</td>
                                                            <td><div style={{display:'flex',alignItems:'center',gap:'8px'}}><div className="torre-progress-bar" style={{width:'70px'}}><div className="torre-progress-fill" style={{width:taxa+'%',background:cor}}></div></div><span style={{fontWeight:'700',color:cor,minWidth:'40px'}}>{taxa.toFixed(1)}%</span></div></td>
                                                        </>}
                                                        {metrica==='nf'      && <><td style={{fontWeight:'700',color:'#3b82f6'}}>{m.nf.toLocaleString('pt-BR')}</td><td>{Math.round(m.nf/diasMes).toLocaleString('pt-BR')}</td></>}
                                                        {metrica==='vol'     && <><td style={{fontWeight:'700',color:'#10b981'}}>{m.vol.toLocaleString('pt-BR')}</td><td>{Math.round(m.vol/diasMes).toLocaleString('pt-BR')}</td></>}
                                                        {metrica==='cubagem' && <><td style={{fontWeight:'700',color:'#f59e0b'}}>{m.cub.toFixed(2)}</td><td>{(m.cub/diasMes).toFixed(2)}</td></>}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>)}
                    </>)}

                    {/* ── SUB-ABA: RANKING ── */}
                    {subAba==='ranking' && (<>
                        {rankingOps.length === 0 ? (
                            <div className="torre-empty">
                                <div className="torre-empty-icon">📭</div>
                                <p style={{fontWeight:'600',fontSize:'16px',marginBottom:'6px'}}>Nenhum dado no período</p>
                            </div>
                        ) : (<>
                            <div className="torre-chart-panel" style={{marginBottom:'16px'}}>
                                <div className="torre-chart-header">
                                    <div className="torre-chart-title">🏅 {mLabel} por operação (top 10)</div>
                                    <span style={{fontSize:'11px',color:'#9ca3af'}}>{rankingOps.length} operações no período</span>
                                </div>
                                <div style={{position:'relative',height:Math.max(200,rankingOps.slice(0,10).length*38)+'px'}}>
                                    <canvas ref={chartOpRef}></canvas>
                                </div>
                            </div>
                            <div className="torre-chart-panel">
                                <div className="torre-chart-header">

                                                        </>}
                                                        {metrica!=='pontualidade' && <td style={{fontWeight:'700',color:mCorRank}}>{metrica==='cubagem'?r.cub.toFixed(2):mVal.toLocaleString('pt-BR')}</td>}
                                                        <td>{r.vol.toLocaleString('pt-BR')}</td>
                                                        <td><span className={`torre-pill ${pill}`}>{r.taxa>=80?'Excelente':r.taxa>=60?'Atenção':'Crítico'}</span></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>)}
                    </>)}

                    {/* ── SUB-ABA: TENDÊNCIAS ── */}
                    {subAba==='tendencias' && (<>
                        {dadosPorData.length === 0 ? (
                            <div className="torre-empty">
                                <div className="torre-empty-icon">📭</div>

                                        {tendencia.up?'↑':tendencia.down?'↓':'→'}

                                        <div className="torre-resumo-val">2ª metade</div>
                                        <div style={{fontSize:'28px',fontWeight:'800',color:tendencia.up?'#34d399':tendencia.down?'#f87171':'#fbbf24'}}>{tendencia.taxa2}{tendencia.lbl}</div>
                                        <div className="torre-resumo-lbl">{mLabel}</div>

                                    <div className="torre-resumo-item">

                            <div className="torre-chart-panel">

                                            {[...dadosPorData].reverse().map(d=>{
